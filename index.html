<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도장격파 : Hand-drawn Edition</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* 폰트 및 기본 스타일 */
        * { font-family: 'Gaegu', cursive !important; }
        body { background-color: #ffffff; color: #1a1a1a; -webkit-font-smoothing: antialiased; }
        
        /* 슬롯 내부 디자인 - 간격 확보 */
        .slot-content { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100%; width: 100%; padding: 12px; gap: 10px; 
        }
        .slot-title { font-size: 18px; line-height: 1.2; text-align: center; font-weight: 700; color: #000; }
        .ott-container { display: flex; gap: 6px; margin-top: 2px; }
        .ott-icon { width: 22px; height: 22px; border-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.2); }

        /* 도장 스타일 및 중앙 정렬 */
        .stamp-wrapper { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
        .stamp-box { 
            display: flex !important; align-items: center !important; justify-content: center !important; 
            width: 60px; height: 60px; border: 3px solid; background: white;
            transform: rotate(-12deg); box-sizing: border-box;
        }
        .stamp-inner { font-size: 32px; font-weight: 900; line-height: 1; display: flex; align-items: center; justify-content: center; }

        /* 입력창 스타일 */
        .input-clean { background: transparent; border: none; outline: none; text-align: center; }
        .author-input { border-bottom: 1px dashed rgba(0,0,0,0.2); min-width: 100px; padding: 0 10px; }

        /* 애니메이션 및 기타 */
        @keyframes stamp-bang {
            0% { transform: scale(4) rotate(-45deg); opacity: 0; }
            100% { transform: scale(1) rotate(-12deg); opacity: 1; }
        }
        .animate-stamp { animation: stamp-bang 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .doodle-border { border: 2.5px solid #1a1a1a; border-radius: 255px 15px 225px 15px/15px 225px 15px 255px; }
        .doodle-button { border: 2px solid #1a1a1a; border-radius: 10px 20px 10px 25px; transition: all 0.2s; }
        .custom-scrollbar::-webkit-scrollbar { height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1a1a1a; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const API_KEY = "291299eef434b2f459b25d72c4c667a1"; 
        const IMAGE_BASE = "https://image.tmdb.org/t/p/w500";
        const getCORSImageUrl = (url) => url ? `${url}?t=${new Date().getTime()}` : null;

        const ICON_SUGGESTIONS = [
            { id: 'check', icon: 'check' }, { id: 'heart', icon: 'heart' },
            { id: 'star', icon: 'star' }, { id: 'award', icon: 'award' },
            { id: 'smile', icon: 'smile' }, { id: 'circle', icon: 'circle' }
        ];

        const getContrastColor = (hex) => {
            if(!hex) return "#1a1a1a";
            const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
            return ((r * 299) + (g * 587) + (b * 114)) / 1000 >= 128 ? "#1a1a1a" : "#ffffff";
        };

        function App() {
            const boardRef = useRef(null);
            const [album, setAlbum] = useState(() => JSON.parse(localStorage.getItem('sb_album') || '[]'));
            const [currentBoard, setCurrentBoard] = useState({
                id: Date.now(), title: "나의 정복 리스트", author: "YOUR NAME", color: "#fefefe", 
                stamp: "完", stampColor: "#e11d48", isIconMode: false, slots: Array(16).fill(null), dones: Array(16).fill(false)
            });

            const [isSearchOpen, setIsSearchOpen] = useState(false);
            const [activeIndex, setActiveIndex] = useState(null);
            const [results, setResults] = useState([]);

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [currentBoard, results, isSearchOpen, album]);
            useEffect(() => { localStorage.setItem('sb_album', JSON.stringify(album)); }, [album]);

            const exportAsImage = async () => {
                if (!boardRef.current) return;
                try {
                    await document.fonts.ready; // 폰트 로드 대기
                    const element = boardRef.current.querySelector('.board-to-export');
                    
                    const canvas = await html2canvas(element, {
                        useCORS: true,
                        scale: 2.5, // 고해상도
                        backgroundColor: currentBoard.color,
                        logging: false,
                        onclone: (clonedDoc) => {
                            // 캡처용 문서에서 input을 텍스트로 치환 (비율 유지 핵심)
                            const clonedBoard = clonedDoc.querySelector('.board-to-export');
                            clonedBoard.querySelectorAll('input[type="text"]').forEach(input => {
                                const span = clonedDoc.createElement('span');
                                span.innerText = input.value;
                                span.style.cssText = window.getComputedStyle(input).cssText;
                                span.style.display = 'inline-block';
                                span.style.border = 'none';
                                input.parentNode.replaceChild(span, input);
                            });
                            // 삭제 버튼 숨기기
                            clonedBoard.querySelectorAll('.delete-btn').forEach(btn => btn.style.display = 'none');
                        }
                    });

                    const link = document.createElement("a");
                    link.href = canvas.toDataURL("image/png");
                    link.download = `${currentBoard.title}.png`;
                    link.click();
                } catch (err) { alert("이미지 생성 중 오류가 발생했습니다."); }
            };

            const fetchSearchResults = async (q) => {
                if (q.length < 2) return;
                try {
                    const resp = await fetch(`https://api.themoviedb.org/3/search/tv?api_key=${API_KEY}&query=${q}&language=ko-KR`);
                    const data = await resp.json();
                    const withOtt = await Promise.all((data.results || []).map(async (item) => {
                        const ottResp = await fetch(`https://api.themoviedb.org/3/tv/${item.id}/watch/providers?api_key=${API_KEY}`);
                        const ottData = await ottResp.json();
                        return { ...item, ott: ottData.results?.KR?.flatrate?.slice(0, 2).map(p => IMAGE_BASE + p.logo_path) || [] };
                    }));
                    setResults(withOtt);
                } catch (e) { console.error(e); }
            };

            return (
                <div className="max-w-5xl mx-auto p-6 flex flex-col items-center pb-40">
                    <header className="py-8 flex justify-between items-end w-full max-w-2xl mb-12">
                        <h1 className="text-6xl font-black italic rotate-[-2deg] leading-none">
                            <span className="hand-underline">STAMP BREAK</span>
                        </h1>
                        <button onClick={() => setCurrentBoard({...currentBoard, id: Date.now(), slots: Array(16).fill(null), dones: Array(16).fill(false)})} className="doodle-button bg-gray-100 px-4 py-2 font-bold">+ NEW</button>
                    </header>

                    <div className="flex flex-col md:flex-row gap-10 items-start justify-center w-full">
                        {/* 왼쪽: 컨트롤러 */}
                        <div className="flex flex-col gap-6 w-full md:w-64 p-6 bg-gray-50 rounded-xl border-2 border-black/5">
                            <div className="flex flex-col gap-2">
                                <label className="text-xs font-bold text-gray-400 flex justify-between uppercase"><span>Slot Count</span><span className="text-black">{currentBoard.slots.length}</span></label>
                                <input type="range" min="9" max="25" value={currentBoard.slots.length} onChange={(e) => {
                                    const newCount = parseInt(e.target.value);
                                    let newSlots = [...currentBoard.slots];
                                    let newDones = [...currentBoard.dones];
                                    if (newCount > currentBoard.slots.length) {
                                        newSlots = [...newSlots, ...Array(newCount - currentBoard.slots.length).fill(null)];
                                        newDones = [...newDones, ...Array(newCount - currentBoard.dones.length).fill(false)];
                                    } else {
                                        newSlots = newSlots.slice(0, newCount);
                                        newDones = newDones.slice(0, newCount);
                                    }
                                    setCurrentBoard({...currentBoard, slots: newSlots, dones: newDones});
                                }} />
                            </div>
                            <div className="flex gap-4">
                                <div className="flex-1 text-center">
                                    <label className="text-xs font-bold text-gray-400 uppercase block mb-1">Board</label>
                                    <div className="palette-box" style={{ backgroundColor: currentBoard.color }}><input type="color" value={currentBoard.color} onChange={(e) => setCurrentBoard({...currentBoard, color: e.target.value})} /></div>
                                </div>
                                <div className="flex-1 text-center">
                                    <label className="text-xs font-bold text-gray-400 uppercase block mb-1">Stamp</label>
                                    <div className="palette-box" style={{ backgroundColor: currentBoard.stampColor }}><input type="color" value={currentBoard.stampColor} onChange={(e) => setCurrentBoard({...currentBoard, stampColor: e.target.value})} /></div>
                                </div>
                            </div>
                            <div className="flex flex-col gap-2">
                                <label className="text-xs font-bold text-gray-400 uppercase">Stamp Icon</label>
                                <div className="grid grid-cols-4 gap-1 bg-white p-2 rounded-md border border-black/10">
                                    {ICON_SUGGESTIONS.map(item => (
                                        <button key={item.id} onClick={() => setCurrentBoard({...currentBoard, stamp: item.icon, isIconMode: true})} className={`w-8 h-8 flex items-center justify-center rounded ${currentBoard.isIconMode && currentBoard.stamp === item.icon ? 'bg-black text-white' : 'text-gray-300'}`}><i data-lucide={item.icon} className="w-4 h-4"></i></button>
                                    ))}
                                </div>
                            </div>
                        </div>

                        {/* 오른쪽: 도장판 메인 */}
                        <div ref={boardRef} className="w-full max-w-2xl">
                            <div style={{ backgroundColor: currentBoard.color }} className="board-to-export p-10 doodle-border border-[3px] border-black shadow-[10px_10px_0px_#000] rotate-[0.5deg]">
                                <div className="flex justify-center mb-4">
                                    <input type="text" className="input-clean text-5xl font-bold w-full" style={{ color: getContrastColor(currentBoard.color) }} value={currentBoard.title} onChange={(e) => setCurrentBoard({...currentBoard, title: e.target.value})} />
                                </div>
                                <div className="flex items-center justify-center gap-2 text-sm font-bold opacity-60 mb-10">
                                    <span style={{ color: getContrastColor(currentBoard.color) }}>Created by</span>
                                    <input type="text" className="input-clean author-input text-xl inline-block w-auto" style={{ color: getContrastColor(currentBoard.color) }} value={currentBoard.author} onChange={(e) => setCurrentBoard({...currentBoard, author: e.target.value.toUpperCase()})} />
                                </div>
                                <div className={`grid gap-4 ${currentBoard.slots.length <= 12 ? 'grid-cols-3' : currentBoard.slots.length <= 20 ? 'grid-cols-4' : 'grid-cols-5'}`}>
                                    {currentBoard.slots.map((slot, i) => (
                                        <Slot key={i} data={slot} isDone={currentBoard.dones[i]} idx={i} stamp={currentBoard.stamp} stampColor={currentBoard.stampColor} isIconMode={currentBoard.isIconMode} onToggle={() => {
                                            const newDones = [...currentBoard.dones]; newDones[i] = !newDones[i]; setCurrentBoard({...currentBoard, dones: newDones});
                                        }} onSearch={() => { setActiveIndex(i); setIsSearchOpen(true); }} onClear={(e) => { e.stopPropagation(); const newSlots = [...currentBoard.slots]; newSlots[i] = null; setCurrentBoard({...currentBoard, slots: newSlots}); }} />
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* 하단 버튼 및 앨범 */}
                    <div className="w-full max-w-2xl mt-16 flex flex-col gap-10">
                        <div className="grid grid-cols-2 gap-4">
                            <button onClick={() => { setAlbum([...album, {...currentBoard, id: Date.now()}]); alert("앨범 저장 완료!"); }} className="doodle-button bg-white py-4 font-bold text-xl shadow-[4px_4px_0px_#000]">SAVE TO ALBUM</button>
                            <button onClick={exportAsImage} className="doodle-button bg-yellow-300 py-4 font-bold text-xl shadow-[4px_4px_0px_#000]">DOWNLOAD IMAGE</button>
                        </div>

                        {album.length > 0 && (
                            <div className="bg-gray-100 p-6 doodle-border border-2 border-black">
                                <h2 className="text-xs font-bold uppercase tracking-widest mb-4">My Collections ({album.length})</h2>
                                <div className="flex gap-4 overflow-x-auto pb-4 custom-scrollbar">
                                    {album.map(b => (
                                        <div key={b.id} onClick={() => setCurrentBoard(b)} className="relative min-w-[100px] aspect-square bg-white border-2 border-black p-2 flex flex-col cursor-pointer transition-all hover:scale-105">
                                            <button onClick={(e) => { e.stopPropagation(); setAlbum(album.filter(a => a.id !== b.id)); }} className="absolute -top-2 -right-2 w-6 h-6 bg-black text-white rounded-full flex items-center justify-center text-xs">×</button>
                                            <div className="flex-grow flex items-center justify-center text-2xl" style={{ color: b.stampColor }}>{b.isIconMode ? <i data-lucide={b.stamp} className="w-6 h-6"></i> : b.stamp}</div>
                                            <div className="text-[10px] font-bold truncate text-center">{b.title}</div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>

                    {/* 검색 모달 */}
                    {isSearchOpen && (
                        <div className="fixed inset-0 bg-white/95 z-50 p-6 flex flex-col items-center backdrop-blur-sm">
                            <div className="w-full max-w-md">
                                <div className="flex justify-between items-center mb-8 text-4xl font-black italic"><span>SEARCH</span><button onClick={() => setIsSearchOpen(false)}>&times;</button></div>
                                <input className="w-full bg-white p-4 border-4 border-black text-xl mb-8 font-bold doodle-border" placeholder="드라마 제목 입력..." onChange={(e) => fetchSearchResults(e.target.value)} autoFocus />
                                <div className="grid grid-cols-3 gap-4 overflow-y-auto max-h-[60vh] pr-2">
                                    {results.map(d => (
                                        <div key={d.id} onClick={() => { const newSlots = [...currentBoard.slots]; newSlots[activeIndex] = { title: d.name, poster: IMAGE_BASE + d.poster_path, ott: d.ott }; setCurrentBoard({...currentBoard, slots: newSlots}); setIsSearchOpen(false); }} className="cursor-pointer text-center bg-white p-1 border-2 border-black doodle-border hover:shadow-[3px_3px_0px_#000] transition-all">
                                            <img src={getCORSImageUrl(IMAGE_BASE + d.poster_path)} crossOrigin="anonymous" className="w-full aspect-[2/3] object-cover mb-1" />
                                            <p className="text-[12px] font-bold line-clamp-1">{d.name}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function Slot({ data, isDone, onToggle, onSearch, onClear, stamp, stampColor, isIconMode, idx }) {
            const randomRotate = [ -1.2, 1.0, -0.8, 1.5, -1.1, 0.9 ][idx % 6];
            return (
                <div onClick={() => data ? onToggle() : onSearch()} style={{ transform: `rotate(${randomRotate}deg)` }} className="relative aspect-[3/4] bg-white border-2 border-black overflow-hidden cursor-pointer shadow-[2px_2px_0px_#000]">
                    {data ? (
                        <>
                            <button onClick={onClear} className="delete-btn absolute top-1 right-1 w-5 h-5 bg-black text-white rounded-full flex items-center justify-center text-[10px] z-20">×</button>
                            <img src={getCORSImageUrl(data.poster)} crossOrigin="anonymous" className={`w-full h-full object-cover transition-all ${isDone ? 'opacity-100' : 'opacity-20 grayscale'}`} />
                            {!isDone && (
                                <div className="slot-content absolute inset-0 bg-white/40 backdrop-blur-[1px]">
                                    <div className="slot-title">{data.title}</div>
                                    <div className="ott-container">
                                        {data.ott?.map((logo, i) => (
                                            <img key={i} src={getCORSImageUrl(logo)} crossOrigin="anonymous" className="ott-icon" />
                                        ))}
                                    </div>
                                </div>
                            )}
                            {isDone && (
                                <div className="stamp-wrapper">
                                    <div className={`stamp-box animate-stamp`} style={{ borderColor: stampColor }}>
                                        <div className="stamp-inner" style={{ color: stampColor }}>
                                            {isIconMode ? <i data-lucide={stamp} className="w-8 h-8 stroke-[4px]"></i> : <span>{stamp}</span>}
                                        </div>
                                    </div>
                                </div>
                            )}
                        </>
                    ) : <div className="h-full flex items-center justify-center text-gray-200 text-4xl">+</div>}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
