<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도장격파 : 마스터 에디션</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #ffffff; color: #1a1a1a; font-family: 'Gaegu', cursive; -webkit-font-smoothing: antialiased; }
        .font-gaegu { font-family: 'Gaegu', cursive; }
        input:focus { outline: none; }
        
        input[type=range] { -webkit-appearance: none; background: #e5e7eb; border-radius: 10px; height: 8px; border: 1.5px solid #1a1a1a; width: 100%; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; background: #1a1a1a; border-radius: 50%; cursor: pointer; border: 1px solid #000; }

        @keyframes stamp-bang {
            0% { transform: scale(5) rotate(-45deg); opacity: 0; }
            100% { transform: scale(1.2) rotate(-15deg); opacity: 0.9; }
        }
        .animate-stamp { animation: stamp-bang 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        
        .doodle-border { border: 2.5px solid #1a1a1a; border-radius: 255px 15px 225px 15px/15px 225px 15px 255px; }
        .doodle-button { border: 2px solid #1a1a1a; border-radius: 10px 20px 10px 25px/15px 10px 25px 12px; transition: all 0.2s; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .doodle-button:active { transform: scale(0.95); }
        
        .palette-box { border: 2px solid #1a1a1a; border-radius: 4px; overflow: hidden; position: relative; width: 36px; height: 36px; cursor: pointer; }
        .palette-box input[type="color"] { position: absolute; top: -10px; left: -10px; width: 200%; height: 200%; cursor: pointer; opacity: 0; }
        .custom-scrollbar::-webkit-scrollbar { height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1a1a1a; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const IMAGE_BASE = "https://image.tmdb.org/t/p/w500";
        const STAMP_SOUND = new Audio("https://assets.mixkit.co/active_storage/sfx/2005/2005-preview.mp3");

        const ICON_SUGGESTIONS = [
            { id: 'check', icon: 'check' }, { id: 'heart', icon: 'heart' },
            { id: 'star', icon: 'star' }, { id: 'award', icon: 'award' },
            { id: 'zap', icon: 'zap' }, { id: 'smile', icon: 'smile' }
        ];

        const getContrastColor = (hex) => {
            if(!hex) return "#1a1a1a";
            const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
            return ((r * 299) + (g * 587) + (b * 114)) / 1000 >= 128 ? "#1a1a1a" : "#ffffff";
        };

        function App() {
            const [album, setAlbum] = useState(() => JSON.parse(localStorage.getItem('sb_album') || '[]'));
            const [currentBoard, setCurrentBoard] = useState(() => {
                const params = new URLSearchParams(window.location.search);
                const sharedData = params.get('data');
                if (sharedData) {
                    try { 
                        return { ...JSON.parse(decodeURIComponent(atob(sharedData))), id: Date.now() };
                    } catch(e) { console.error(e); }
                }
                return {
                    id: Date.now(), title: "나의 정복 리스트", author: "USER", color: "#fefefe", 
                    stamp: "完", stampColor: "#e11d48", isIconMode: false, slots: Array(16).fill(null), dones: Array(16).fill(false)
                };
            });

            const [isSearchOpen, setIsSearchOpen] = useState(false);
            const [activeIndex, setActiveIndex] = useState(null);
            const [results, setResults] = useState([]);

            const textColor = useMemo(() => getContrastColor(currentBoard.color), [currentBoard.color]);

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [currentBoard, results, isSearchOpen, album]);
            useEffect(() => { localStorage.setItem('sb_album', JSON.stringify(album)); }, [album]);

            const fetchSearchResults = async (q) => {
                if (q.length < 2) return;
                try {
                    const resp = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
                    const data = await resp.json();
                    setResults(data.results || []);
                } catch (e) { console.error(e); }
            };

            const toggleDone = (i) => {
                const newDones = [...currentBoard.dones];
                newDones[i] = !newDones[i];
                if (newDones[i]) { STAMP_SOUND.currentTime = 0; STAMP_SOUND.play().catch(() => {}); }
                setCurrentBoard({...currentBoard, dones: newDones});
            };

            return (
                <div className="max-w-4xl mx-auto p-6 flex flex-col items-center pb-20">
                    <header className="py-8 flex justify-between items-center w-full mb-4">
                        <h1 className="text-4xl md:text-5xl font-black italic font-gaegu tracking-tighter">STAMP BREAK</h1>
                        <button onClick={() => setCurrentBoard({id: Date.now(), title: "새로운 판", author: "USER", color: "#fefefe", stamp: "完", stampColor: "#e11d48", isIconMode: false, slots: Array(16).fill(null), dones: Array(16).fill(false)})} className="doodle-button bg-gray-100 px-4 py-2 font-bold font-gaegu shadow-[2px_2px_0px_#000]">+ NEW</button>
                    </header>

                    <main className="w-full">
                        <div style={{ backgroundColor: currentBoard.color }} className="p-6 md:p-12 doodle-border border-[3px] border-black shadow-[8px_8px_0px_#000]">
                            <div className="mb-10 flex flex-col items-center">
                                <input 
                                    className="bg-transparent text-5xl md:text-7xl font-bold w-full text-center outline-none font-gaegu border-b-4 border-dashed" 
                                    style={{ color: textColor, borderBottomColor: textColor + '44' }}
                                    value={currentBoard.title} 
                                    onChange={(e) => setCurrentBoard({...currentBoard, title: e.target.value})} 
                                />
                                <div className="flex items-center text-2xl md:text-3xl font-bold opacity-80 mt-4 font-gaegu" style={{ color: textColor }}>
                                    <span className="mr-2 italic opacity-60">Created by</span>
                                    <input className="bg-transparent border-b border-dashed border-current w-40 text-center" value={currentBoard.author} onChange={(e) => setCurrentBoard({...currentBoard, author: e.target.value})} />
                                </div>
                            </div>
                            
                            <div className={`grid gap-4 ${currentBoard.slots.length <= 11 ? 'grid-cols-3' : 'grid-cols-3 sm:grid-cols-4 md:grid-cols-5'}`}>
                                {currentBoard.slots.map((slot, i) => (
                                    <Slot key={i} data={slot} isDone={currentBoard.dones[i]} idx={i} stamp={currentBoard.stamp} stampColor={currentBoard.stampColor} isIconMode={currentBoard.isIconMode} onToggle={() => toggleDone(i)} onSearch={() => { setActiveIndex(i); setIsSearchOpen(true); }} onClear={(e) => { e.stopPropagation(); const newSlots = [...currentBoard.slots]; newSlots[i] = null; setCurrentBoard({...currentBoard, slots: newSlots}); }} />
                                ))}
                            </div>
                        </div>
                    </main>

                    {/* 설정 툴바 (재배치) */}
                    <section className="w-full mt-10 p-8 bg-gray-50 rounded-3xl border-2 border-black/10 flex flex-col gap-8 shadow-sm">
                        <div className="w-full flex flex-col gap-2">
                            <label className="text-sm font-bold text-gray-500 uppercase font-gaegu ml-1">Board Size: {currentBoard.slots.length} Slots</label>
                            <input type="range" min="9" max="25" value={currentBoard.slots.length} onChange={(e) => {
                                const n = parseInt(e.target.value);
                                let s = currentBoard.slots.slice(0, n);
                                let d = currentBoard.dones.slice(0, n);
                                if(n > currentBoard.slots.length) {
                                    const diff = n - currentBoard.slots.length;
                                    s = [...s, ...Array(diff).fill(null)]; d = [...d, ...Array(diff).fill(false)];
                                }
                                setCurrentBoard({...currentBoard, slots: s, dones: d});
                            }} />
                        </div>

                        <div className="flex flex-wrap items-center justify-between gap-6">
                            <div className="flex gap-8">
                                <div className="flex flex-col gap-2 items-center">
                                    <label className="text-[14px] font-bold text-gray-500 uppercase font-gaegu">Board</label>
                                    <div className="palette-box" style={{ backgroundColor: currentBoard.color }}><input type="color" value={currentBoard.color} onChange={(e) => setCurrentBoard({...currentBoard, color: e.target.value})} /></div>
                                </div>
                                <div className="flex flex-col gap-2 items-center">
                                    <label className="text-[14px] font-bold text-gray-500 uppercase font-gaegu">Stamp</label>
                                    <div className="palette-box" style={{ backgroundColor: currentBoard.stampColor }}><input type="color" value={currentBoard.stampColor} onChange={(e) => setCurrentBoard({...currentBoard, stampColor: e.target.value})} /></div>
                                </div>
                            </div>

                            <div className="flex flex-col gap-2 items-center">
                                <label className="text-[14px] font-bold text-gray-500 uppercase font-gaegu self-start ml-1">Stamp Style</label>
                                <div className="flex items-center gap-3">
                                    <input className="w-11 h-11 bg-white border-2 border-black rounded-xl text-center font-bold text-2xl font-gaegu" value={currentBoard.isIconMode ? "" : currentBoard.stamp} onChange={(e) => setCurrentBoard({...currentBoard, stamp: e.target.value.slice(-2), isIconMode: false})} />
                                    <div className="flex gap-1.5 bg-white p-1.5 rounded-xl border border-black/10">
                                        {ICON_SUGGESTIONS.map(item => (
                                            <button key={item.id} onClick={() => setCurrentBoard({...currentBoard, stamp: item.icon, isIconMode: true})} className={`w-9 h-9 flex items-center justify-center rounded-lg ${currentBoard.isIconMode && currentBoard.stamp === item.icon ? 'bg-black text-white' : 'text-gray-300'}`}><i data-lucide={item.icon} className="w-5 h-5"></i></button>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    <div className="grid grid-cols-2 gap-4 w-full mt-6">
                        <button onClick={() => { setAlbum([...album, { ...currentBoard, id: Date.now() }]); alert("앨범에 저장!"); }} className="doodle-button bg-white py-5 font-bold font-gaegu text-2xl shadow-[5px_5px_0px_#000]">ALBUM SAVE</button>
                        <button onClick={() => {
                            const data = btoa(encodeURIComponent(JSON.stringify(currentBoard)));
                            navigator.clipboard.writeText(`${window.location.origin}${window.location.pathname}?data=${data}`).then(() => alert("링크 복사 완료!"));
                        }} className="doodle-button bg-black text-white py-5 font-bold font-gaegu text-2xl shadow-[5px_5px_0px_#000]">SHARE LINK</button>
                    </div>

                    {/* 앨범 섹션 */}
                    {album.length > 0 && (
                        <div className="w-full mt-12 p-8 bg-gray-50 border-2 border-black doodle-border">
                            <h2 className="text-2xl font-bold uppercase mb-8 font-gaegu opacity-60">My Collections</h2>
                            <div className="flex gap-5 overflow-x-auto pb-4 custom-scrollbar">
                                {album.map(b => (
                                    <div key={b.id} onClick={() => setCurrentBoard(b)} className="relative min-w-[150px] aspect-square bg-white border-2 border-black p-4 cursor-pointer shadow-[4px_4px_0px_#000] flex flex-col group">
                                        <button onClick={(e) => { e.stopPropagation(); setAlbum(album.filter(i => i.id !== b.id)); }} className="absolute top-1 right-2 text-2xl font-bold text-gray-300 hover:text-red-500 z-10 transition-colors">×</button>
                                        <div className="flex-grow flex items-center justify-center text-4xl" style={{ color: b.stampColor }}>
                                            {b.isIconMode ? <i data-lucide={b.stamp} className="w-12 h-12"></i> : b.stamp}
                                        </div>
                                        <div className="text-lg font-bold truncate text-center border-t border-black/5 pt-2 font-gaegu">{b.title}</div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* 검색 모달 */}
                    {isSearchOpen && (
                        <div className="fixed inset-0 bg-white/95 z-50 p-6 flex flex-col items-center backdrop-blur-sm">
                            <div className="w-full max-w-md">
                                <div className="flex justify-between items-center mb-8 font-gaegu text-4xl font-black"><span>SEARCH</span><button onClick={() => setIsSearchOpen(false)} className="text-4xl">&times;</button></div>
                                <input className="w-full bg-white p-5 border-4 border-black text-2xl mb-8 font-bold doodle-border font-gaegu" placeholder="제목을 입력하세요..." onChange={(e) => fetchSearchResults(e.target.value)} autoFocus />
                                <div className="grid grid-cols-3 gap-4 overflow-y-auto max-h-[60vh] custom-scrollbar">
                                    {results.map(d => (
                                        <div key={d.id} onClick={() => { const newSlots = [...currentBoard.slots]; newSlots[activeIndex] = { title: d.name || d.title, poster: IMAGE_BASE + d.poster_path }; setCurrentBoard({...currentBoard, slots: newSlots}); setIsSearchOpen(false); }} className="cursor-pointer text-center bg-white p-1 border-2 border-black doodle-border">
                                            <img src={IMAGE_BASE + d.poster_path} className="w-full aspect-[2/3] object-cover mb-1" />
                                            <p className="text-[12px] font-bold font-gaegu line-clamp-1">{d.name || d.title}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function Slot({ data, isDone, onToggle, onSearch, onClear, stamp, stampColor, isIconMode, idx }) {
            const rotate = [ -1.5, 1.2, -0.8, 1.5, -1.1, 0.9 ][idx % 6];
            return (
                <div onClick={() => data ? onToggle() : onSearch()} style={{ transform: `rotate(${rotate}deg)` }} className="relative aspect-[3/4] bg-white border-2 border-black overflow-hidden cursor-pointer shadow-[3px_3px_0px_#000] group">
                    {data ? (
                        <>
                            <button onClick={onClear} className="absolute top-0 right-2 text-2xl font-bold text-white/80 hover:text-white z-20 transition-colors drop-shadow-md">×</button>
                            <img src={data.poster} className={`w-full h-full object-cover transition-all ${isDone ? 'opacity-100' : 'opacity-20 grayscale'}`} />
                            
                            {/* OTT 배지 (부활) */}
                            <div className="absolute bottom-1 left-1 flex gap-0.5 opacity-80 z-10">
                                <div className="w-3 h-3 bg-red-600 rounded-sm"></div>
                                <div className="w-3 h-3 bg-blue-500 rounded-sm"></div>
                                <div className="w-3 h-3 bg-black rounded-sm border border-white/20"></div>
                            </div>

                            {!isDone && <div className="absolute inset-0 flex items-center justify-center p-3 text-center text-xl font-bold font-gaegu leading-tight tracking-tight">{data.title}</div>}
                            
                            {isDone && (
                                <div className="absolute inset-0 flex items-center justify-center animate-stamp pointer-events-none z-30">
                                    <div className="border-[3px] flex items-center justify-center w-[80%] h-[60%] rotate-[-12deg] bg-transparent" style={{ borderColor: stampColor }}>
                                        <div className="font-gaegu font-black text-4xl md:text-5xl" style={{ color: stampColor }}>
                                            {isIconMode ? <i data-lucide={stamp} className="w-10 h-10 stroke-[4px]"></i> : <span>{stamp}</span>}
                                        </div>
                                    </div>
                                </div>
                            )}
                        </>
                    ) : <div className="h-full flex items-center justify-center text-gray-200 text-5xl hover:text-gray-400 transition-colors">+</div>}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
