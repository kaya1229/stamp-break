<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도장격파 : Stamp Break</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0a0a0a; color: white; font-family: 'Noto Sans KR', sans-serif; transition: all 0.3s; }
        .font-serif { font-family: 'Noto Serif KR', serif; }
        /* 입력창 포커스 시 테두리 제거 */
        input:focus { outline: none; }
        .title-input { background: transparent; border: none; text-align: center; width: 100%; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const API_KEY = "YOUR_TMDB_API_KEY_HERE"; 
        const IMAGE_BASE = "https://image.tmdb.org/t/p/w500";

        function App() {
            const [slots, setSlots] = useState(Array(16).fill(null));
            const [boardTitle, setBoardTitle] = useState("나의 필모 정복기"); // 제목 상태 추가
            const [isSearchOpen, setIsSearchOpen] = useState(false);
            const [activeIndex, setActiveIndex] = useState(null);
            const [query, setQuery] = useState("");
            const [results, setResults] = useState([]);
            const boardRef = useRef(null);

            useEffect(() => {
                if (query.length < 2) return;
                const delay = setTimeout(async () => {
                    const resp = await fetch(`https://api.themoviedb.org/3/search/tv?api_key=${API_KEY}&query=${query}&language=ko-KR`);
                    const data = await resp.json();
                    setResults(data.results || []);
                }, 500);
                return () => clearTimeout(delay);
            }, [query]);

            const selectDrama = (drama) => {
                const newSlots = [...slots];
                newSlots[activeIndex] = {
                    title: drama.name,
                    poster: drama.poster_path ? IMAGE_BASE + drama.poster_path : 'https://via.placeholder.com/300x400?text=No+Image'
                };
                setSlots(newSlots);
                setIsSearchOpen(false);
                setQuery("");
            };

            const downloadImage = async () => {
                const canvas = await html2canvas(boardRef.current, { 
                    backgroundColor: "#121212",
                    scale: 2 
                });
                const link = document.createElement('a');
                link.download = `${boardTitle}.png`;
                link.href = canvas.toDataURL();
                link.click();
            };

            return (
                <div className="max-w-md mx-auto p-4 min-h-screen flex flex-col items-center">
                    <header className="py-8 text-center">
                        <h1 className="text-4xl font-serif font-black text-red-600 tracking-tighter">STAMP BREAK</h1>
                        <p className="text-[10px] text-zinc-500 mt-2 tracking-[0.2em]">FILMOGRAPHY CONQUEST</p>
                    </header>

                    {/* 도장판 영역 */}
                    <div ref={boardRef} className="bg-[#121212] p-6 rounded-sm shadow-2xl border border-zinc-800 w-full">
                        {/* 중앙 정렬된 가변 제목 섹션 */}
                        <div className="flex flex-col items-center mb-6 border-b border-zinc-800 pb-4">
                            <input 
                                type="text"
                                value={boardTitle}
                                onChange={(e) => setBoardTitle(e.target.value)}
                                className="title-input text-2xl font-serif font-black text-zinc-100 hover:text-red-500 transition-colors cursor-edit"
                                placeholder="제목을 입력하세요"
                            />
                            <div className="text-red-700 font-serif font-bold text-xl mt-1">印</div>
                        </div>

                        <div className="grid grid-cols-4 gap-2">
                            {slots.map((slot, i) => (
                                <Slot key={i} data={slot} onClick={() => { setActiveIndex(i); setIsSearchOpen(true); }} />
                            ))}
                        </div>

                        <div className="mt-4 flex justify-center opacity-20">
                            <span className="text-[8px] font-mono tracking-widest uppercase">Certified by Stamp Break</span>
                        </div>
                    </div>

                    <button onClick={downloadImage} className="w-full mt-8 bg-red-800 hover:bg-red-700 py-4 rounded-xl font-bold transition-all shadow-lg shadow-red-900/20 active:scale-95">
                        도장판 이미지 저장하기
                    </button>

                    {/* 검색 모달 */}
                    {isSearchOpen && (
                        <div className="fixed inset-0 bg-black/95 z-50 p-6 flex flex-col animate-in fade-in duration-200">
                            <div className="flex justify-between items-center mb-6">
                                <h2 className="text-xl font-bold text-red-600 font-serif">작품 검색</h2>
                                <button onClick={() => setIsSearchOpen(false)} className="text-3xl text-zinc-500">&times;</button>
                            </div>
                            <input 
                                className="w-full bg-zinc-900 p-4 rounded-lg border border-zinc-700 outline-none focus:border-red-600 text-white shadow-inner"
                                placeholder="드라마 제목을 입력하세요..."
                                value={query}
                                onChange={(e) => setQuery(e.target.value)}
                                autoFocus
                            />
                            <div className="grid grid-cols-3 gap-3 mt-6 overflow-y-auto pb-10">
                                {results.map(d => (
                                    <div key={d.id} onClick={() => selectDrama(d)} className="cursor-pointer group">
                                        <div className="relative aspect-[3/4] overflow-hidden rounded border border-zinc-800 group-hover:border-red-600 transition-all">
                                            <img src={d.poster_path ? IMAGE_BASE + d.poster_path : 'https://via.placeholder.com/300x400?text=No+Image'} className="w-full h-full object-cover" />
                                        </div>
                                        <p className="text-[10px] mt-2 text-zinc-400 truncate text-center">{d.name}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function Slot({ data, onClick }) {
            const [done, setDone] = useState(false);
            
            const handleSlotClick = (e) => {
                if (!data) {
                    onClick();
                } else {
                    setDone(!done);
                    if (!done && window.navigator.vibrate) window.navigator.vibrate(50);
                }
            };

            return (
                <div onClick={handleSlotClick} className="relative aspect-[3/4] bg-zinc-900 rounded-sm overflow-hidden cursor-pointer border border-zinc-800 hover:border-zinc-600 transition-all">
                    {data ? (
                        <>
                            <img src={data.poster} className={`w-full h-full object-cover transition-all duration-500 ${done ? 'grayscale-0 scale-105' : 'grayscale'}`} />
                            {done && (
                                <div className="absolute inset-0 flex items-center justify-center">
                                    <div className="border-[3px] border-red-600 text-red-600 font-serif font-black text-2xl p-1 rotate-[-15deg] bg-white/5 backdrop-blur-[1px] shadow-2xl animate-[bounce_0.3s_ease-out]">完</div>
                                </div>
                            )}
                        </>
                    ) : (
                        <div className="h-full flex items-center justify-center text-zinc-800 text-lg font-light">+</div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
