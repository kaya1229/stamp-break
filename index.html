<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도장격파 : Stamp Break Ultimate Custom</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { color: white; font-family: 'Noto Sans KR', sans-serif; transition: background-color 0.5s ease; overflow-x: hidden; }
        .font-serif { font-family: 'Noto Serif KR', serif; }
        input:focus { outline: none; }
        .title-input { background: transparent; border: none; text-align: center; width: 100%; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        /* 컬러 피커 스타일링 */
        .color-dot { width: 32px; height: 32px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); cursor: pointer; position: relative; overflow: hidden; }
        .color-dot input[type="color"] { position: absolute; top: -5px; left: -5px; width: 50px; height: 50px; cursor: pointer; opacity: 0; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const API_KEY = "YOUR_TMDB_API_KEY_HERE"; 
        const IMAGE_BASE = "https://image.tmdb.org/t/p/w500";

        function App() {
            const [slots, setSlots] = useState(Array(16).fill(null));
            const [boardTitle, setBoardTitle] = useState("나의 필모 정복기");
            const [bgColor, setBgColor] = useState("#121212"); // 기본 배경색
            const [currentStamp, setCurrentStamp] = useState('完');
            const [isSearchOpen, setIsSearchOpen] = useState(false);
            const [activeIndex, setActiveIndex] = useState(null);
            const [query, setQuery] = useState("");
            const [results, setResults] = useState([]);
            const boardRef = useRef(null);

            // 배경색 변경 시 body 배경도 부드럽게 동기화
            useEffect(() => {
                document.body.style.backgroundColor = bgColor;
            }, [bgColor]);

            useEffect(() => {
                if (query.length < 2) return;
                const delay = setTimeout(async () => {
                    const resp = await fetch(`https://api.themoviedb.org/3/search/tv?api_key=${API_KEY}&query=${query}&language=ko-KR`);
                    const data = await resp.json();
                    setResults(data.results || []);
                }, 500);
                return () => clearTimeout(delay);
            }, [query]);

            const selectDrama = (drama) => {
                const newSlots = [...slots];
                newSlots[activeIndex] = {
                    title: drama.name,
                    poster: drama.poster_path ? IMAGE_BASE + drama.poster_path : 'https://via.placeholder.com/300x400?text=No+Image'
                };
                setSlots(newSlots);
                setIsSearchOpen(false);
                setQuery("");
            };

            const downloadImage = async () => {
                const canvas = await html2canvas(boardRef.current, { 
                    backgroundColor: bgColor,
                    scale: 2,
                    useCORS: true // 외부 이미지 허용
                });
                const link = document.createElement('a');
                link.download = `${boardTitle}.png`;
                link.href = canvas.toDataURL();
                link.click();
            };

            return (
                <div className="max-w-md mx-auto p-4 min-h-screen flex flex-col items-center pb-32">
                    <header className="py-6 text-center opacity-80">
                        <h1 className="text-3xl font-serif font-black text-red-600 tracking-tighter">STAMP BREAK</h1>
                    </header>

                    {/* 도장판 영역 */}
                    <div ref={boardRef} style={{ backgroundColor: bgColor }} className="p-6 rounded-sm shadow-2xl border border-white/10 w-full transition-colors duration-500 relative overflow-hidden">
                        <div className="flex flex-col items-center mb-6 border-b border-white/10 pb-4">
                            <input 
                                type="text"
                                value={boardTitle}
                                onChange={(e) => setBoardTitle(e.target.value)}
                                className="title-input text-2xl font-serif font-black text-zinc-100"
                            />
                            <div className="text-red-600 font-serif font-bold text-xl mt-1 opacity-80">{currentStamp}</div>
                        </div>

                        <div className="grid grid-cols-4 gap-2">
                            {slots.map((slot, i) => (
                                <Slot key={i} data={slot} stampText={currentStamp} onClick={() => { setActiveIndex(i); setIsSearchOpen(true); }} />
                            ))}
                        </div>
                    </div>

                    {/* 하단 커스텀 컨트롤 패널 */}
                    <div className="fixed bottom-0 left-0 right-0 bg-black/40 backdrop-blur-2xl border-t border-white/10 p-5 z-40">
                        <div className="max-w-md mx-auto flex flex-col gap-5">
                            <div className="flex justify-between items-center">
                                {/* 컬러 피커 섹션 */}
                                <div className="flex items-center gap-3">
                                    <span className="text-[10px] text-zinc-400 font-bold uppercase">Color</span>
                                    <div className="color-dot shadow-lg shadow-white/5" style={{ backgroundColor: bgColor }}>
                                        <input type="color" value={bgColor} onChange={(e) => setBgColor(e.target.value)} />
                                    </div>
                                    <span className="text-[10px] font-mono text-zinc-500 lowercase">{bgColor}</span>
                                </div>

                                {/* 낙관 변경 섹션 */}
                                <div className="flex items-center gap-2 bg-white/5 p-1 rounded-lg">
                                    {['完', '愛', '心', '★'].map(s => (
                                        <button 
                                            key={s}
                                            onClick={() => setCurrentStamp(s)}
                                            className={`w-8 h-8 flex items-center justify-center font-serif transition-all ${currentStamp === s ? 'text-red-600 font-black scale-125' : 'text-zinc-500 hover:text-zinc-300'}`}
                                        >
                                            {s}
                                        </button>
                                    ))}
                                    {/* 직접 입력 */}
                                    <input 
                                        type="text" 
                                        maxLength="1"
                                        placeholder="+"
                                        className="w-8 h-8 bg-transparent text-center border-l border-white/10 text-red-400 font-serif text-sm"
                                        onChange={(e) => e.target.value && setCurrentStamp(e.target.value)}
                                    />
                                </div>
                            </div>
                            
                            <button onClick={downloadImage} className="w-full bg-red-800 hover:bg-red-700 active:bg-red-900 py-4 rounded-xl font-bold text-sm shadow-2xl transition-all shadow-red-900/30">
                                현재 구성으로 이미지 저장
                            </button>
                        </div>
                    </div>

                    {/* 검색 모달 (기존과 동일) */}
                    {isSearchOpen && (
                        <div className="fixed inset-0 bg-black/95 z-50 p-6 flex flex-col">
                            <div className="flex justify-between items-center mb-6">
                                <h2 className="text-xl font-bold text-red-600 font-serif">작품 검색</h2>
                                <button onClick={() => setIsSearchOpen(false)} className="text-3xl text-zinc-500">&times;</button>
                            </div>
                            <input 
                                className="w-full bg-zinc-900 p-4 rounded-lg border border-zinc-700 outline-none focus:border-red-600 text-white shadow-xl"
                                placeholder="드라마 제목 입력..."
                                value={query}
                                onChange={(e) => setQuery(e.target.value)}
                                autoFocus
                            />
                            <div className="grid grid-cols-3 gap-3 mt-6 overflow-y-auto pb-10">
                                {results.map(d => (
                                    <div key={d.id} onClick={() => selectDrama(d)} className="cursor-pointer group text-center">
                                        <div className="relative aspect-[3/4] overflow-hidden rounded-md shadow-lg group-hover:ring-2 ring-red-600 transition-all">
                                            <img src={d.poster_path ? IMAGE_BASE + d.poster_path : 'https://via.placeholder.com/300x400?text=No+Image'} className="w-full h-full object-cover" />
                                        </div>
                                        <p className="text-[10px] mt-2 text-zinc-400 truncate px-1 font-light">{d.name}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function Slot({ data, onClick, stampText }) {
            const [done, setDone] = useState(false);
            
            const handleSlotClick = (e) => {
                if (!data) onClick();
                else {
                    setDone(!done);
                    if (!done && window.navigator.vibrate) window.navigator.vibrate(50);
                }
            };

            return (
                <div onClick={handleSlotClick} className="relative aspect-[3/4] bg-white/5 rounded-sm overflow-hidden cursor-pointer border border-white/5 transition-all">
                    {data ? (
                        <>
                            <img src={data.poster} className={`w-full h-full object-cover transition-all duration-700 ${done ? 'grayscale-0 scale-105' : 'grayscale brightness-[0.3]'}`} />
                            {done && (
                                <div className="absolute inset-0 flex items-center justify-center pointer-events-none">
                                    <div className="border-[3px] border-red-600 text-red-600 font-serif font-black text-2xl p-1 rotate-[-15deg] bg-white/10 backdrop-blur-[2px] shadow-2xl animate-[bounce_0.3s_ease-out]">
                                        {stampText}
                                    </div>
                                </div>
                            )}
                        </>
                    ) : (
                        <div className="h-full flex items-center justify-center text-white/5 text-xl">+</div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
