<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>도장 깨기</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #ffffff; color: #1a1a1a; font-family: 'Gaegu', cursive; overflow-x: hidden; touch-action: manipulation; }
        .font-gaegu { font-family: 'Gaegu', cursive; }
        input:focus { outline: none; }
        
        @keyframes stamp-bang {
            0% { transform: scale(3); opacity: 0; }
            100% { transform: scale(1); opacity: 0.9; }
        }
        .animate-stamp { animation: stamp-bang 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        
        .doodle-border { border: 2.5px solid #1a1a1a; border-radius: 255px 15px 225px 15px/15px 225px 15px 255px; }
        .doodle-button { border: 2px solid #1a1a1a; border-radius: 10px 20px 10px 25px/15px 10px 25px 12px; transition: all 0.2s; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .palette-box { border: 2px solid #1a1a1a; border-radius: 4px; overflow: hidden; position: relative; width: 32px; height: 32px; cursor: pointer; }
        .palette-box input[type="color"] { position: absolute; top: -10px; left: -10px; width: 200%; height: 200%; cursor: pointer; opacity: 0; }
        
        input[type=range] { -webkit-appearance: none; background: transparent; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 6px; background: #1a1a1a; border-radius: 3px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 18px; width: 18px; border-radius: 50%; background: #ffffff; border: 3px solid #1a1a1a; margin-top: -6px; cursor: pointer; }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1a1a1a; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const IMAGE_BASE = "https://image.tmdb.org/t/p/w500";
        const STAMP_SOUND = new Audio("https://assets.mixkit.co/active_storage/sfx/2005/2005-preview.mp3");

        function App() {
            const [album, setAlbum] = useState(() => JSON.parse(localStorage.getItem('sb_album') || '[]'));
            const [viewerMode, setViewerMode] = useState(false);
            const [otherBoards, setOtherBoards] = useState([]); 
            const [isSearchOpen, setIsSearchOpen] = useState(false);
            const [activeIndex, setActiveIndex] = useState(null);
            const [results, setResults] = useState([]);
            const [manualAdd, setManualAdd] = useState(false);
            const [manualData, setManualData] = useState({ title: '', poster: '' });

            const [currentBoard, setCurrentBoard] = useState({
                id: Date.now(), title: "나의 리스트", author: "USER", color: "#fefefe", 
                stamp: "完", stampColor: "#e11d48", isIconMode: false, useStampBorder: true,
                slots: Array(16).fill(null), dones: Array(16).fill(false)
            });

            const saveToAlbum = () => {
                setAlbum(prevAlbum => {
                    const existingIndex = prevAlbum.findIndex(item => item.id === currentBoard.id);
                    if (existingIndex !== -1) {
                        const newAlbum = [...prevAlbum];
                        newAlbum[existingIndex] = { ...currentBoard };
                        alert("기존 리스트가 업데이트되었습니다! ✨");
                        return newAlbum;
                    } else {
                        alert("앨범에 새로 저장되었습니다! 💾");
                        return [{ ...currentBoard }, ...prevAlbum];
                    }
                });
            };

            const realParticipantCount = useMemo(() => album.length + otherBoards.length + (album.length > 0 ? 0 : 1), [album, otherBoards]);

            useEffect(() => { localStorage.setItem('sb_album', JSON.stringify(album)); }, [album]);

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const data = params.get('data');
                if (data) {
                    try {
                        const parsed = JSON.parse(decodeURIComponent(atob(data)));
                        const newBoard = { ...parsed, id: Date.now(), dones: Array(parsed.slots.length).fill(false) };
                        setCurrentBoard(newBoard);
                        setOtherBoards([newBoard]);
                    } catch(e) { console.error(e); }
                }
            }, []);

            const textColor = useMemo(() => {
                const hex = currentBoard.color;
                const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
                return ((r * 299) + (g * 587) + (b * 114)) / 1000 >= 128 ? "#1a1a1a" : "#ffffff";
            }, [currentBoard.color]);

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [currentBoard, viewerMode, album, isSearchOpen, manualAdd, results]);

            const fetchSearchResults = async (q) => {
                if (q.length < 2) { setResults([]); return; }
                try {
                    const resp = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
                    const data = await resp.json();
                    const filtered = (data.results || []).filter(item => item.media_type === 'movie' || item.media_type === 'tv');
                    setResults(filtered);
                } catch (e) { console.error("검색 에러:", e); }
            };

            return (
                <div className="max-w-4xl mx-auto p-4 md:p-6 flex flex-col items-center pb-24 relative">
                    <header className="py-4 md:py-8 flex justify-between items-center w-full mb-2">
                        <h1 className="text-4xl md:text-6xl font-black italic font-gaegu tracking-tighter">도장깨기</h1>
                        <div className="flex items-center gap-2">
                            <button onClick={() => setViewerMode(!viewerMode)} className={`doodle-button px-3 py-1.5 text-xs md:text-base font-bold font-gaegu shadow-[2px_2px_0px_#000] ${viewerMode ? 'bg-yellow-300' : 'bg-white opacity-40'}`}>
                                {viewerMode ? '💡 VIEW' : '💡 EDIT'}
                            </button>
                            <button onClick={() => window.location.search = ""} className="doodle-button bg-gray-100 px-3 py-1.5 text-xs md:text-base font-bold font-gaegu shadow-[2px_2px_0px_#000]">+ NEW</button>
                        </div>
                    </header>

                    <main className={`w-full transition-all duration-500 ${viewerMode ? 'scale-95 opacity-80' : 'scale-100'}`}>
                        {viewerMode && (
                            <div className="w-full text-center mb-4 font-gaegu text-lg font-bold text-gray-400">
                                참여 중: <span className="text-black underline decoration-yellow-400">{realParticipantCount.toLocaleString()}명</span>
                            </div>
                        )}

                        <div style={{ backgroundColor: currentBoard.color }} className="p-4 md:p-12 doodle-border border-[2.5px] md:border-[3px] border-black shadow-[6px_6px_0px_#000] md:shadow-[12px_12px_0px_#000] relative">
                            <div className="mb-8 md:mb-14 flex flex-col items-center">
                                <input className="bg-transparent text-2xl md:text-5xl font-bold w-full text-center outline-none font-gaegu pb-2 md:pb-6 mb-2" style={{ color: textColor, borderBottom: `3px dashed ${textColor}44` }} value={currentBoard.title} onChange={(e) => setCurrentBoard({...currentBoard, title: e.target.value})} />
                                <div className="flex items-center text-lg md:text-2xl font-bold opacity-80 mt-1 font-gaegu" style={{ color: textColor }}>
                                    <span className="mr-1 italic opacity-60 text-xs md:text-base">BY | </span>
                                    <input className="bg-transparent border-b border-dashed border-current w-24 md:w-32 text-center" value={currentBoard.author} onChange={(e) => setCurrentBoard({...currentBoard, author: e.target.value})} />
                                </div>
                            </div>
                            
                            <div className={`grid gap-2 md:gap-4 ${currentBoard.slots.length <= 11 ? 'grid-cols-3' : 'grid-cols-3 sm:grid-cols-4 md:grid-cols-5'}`}>
                                {currentBoard.slots.map((slot, i) => (
                                    <Slot key={i} data={slot} isDone={currentBoard.dones[i]} idx={i} 
                                        stamp={currentBoard.stamp} stampColor={currentBoard.stampColor} 
                                        isIconMode={currentBoard.isIconMode} useStampBorder={currentBoard.useStampBorder}
                                        onToggle={() => {
                                            const newDones = [...currentBoard.dones];
                                            newDones[i] = !newDones[i];
                                            if (newDones[i]) { STAMP_SOUND.currentTime = 0; STAMP_SOUND.play().catch(()=>{}); }
                                            setCurrentBoard({...currentBoard, dones: newDones});
                                        }} 
                                        onSearch={() => { setActiveIndex(i); setIsSearchOpen(true); }}
                                        onClear={() => { const newSlots = [...currentBoard.slots]; newSlots[i] = null; setCurrentBoard({...currentBoard, slots: newSlots}); }} 
                                    />
                                ))}
                            </div>
                        </div>
                    </main>

                    <section className="w-full mt-8 p-6 bg-gray-50 rounded-2xl border-2 border-black/10 flex flex-col gap-6 shadow-sm">
                        <div className="w-full flex flex-col gap-2">
                            <label className="text-xs font-bold text-gray-500 uppercase font-gaegu ml-1">Slots: {currentBoard.slots.length}</label>
                            <input type="range" min="9" max="25" value={currentBoard.slots.length} onChange={(e) => {
                                const n = parseInt(e.target.value);
                                let s = currentBoard.slots.slice(0, n);
                                let d = currentBoard.dones.slice(0, n);
                                if(n > currentBoard.slots.length) {
                                    const diff = n - currentBoard.slots.length;
                                    s = [...s, ...Array(diff).fill(null)]; d = [...d, ...Array(diff).fill(false)];
                                }
                                setCurrentBoard({...currentBoard, slots: s, dones: d});
                            }} />
                        </div>

                        <div className="flex flex-wrap items-center justify-start gap-4 md:gap-8">
                            <div className="flex flex-col gap-1 items-center">
                                <label className="text-[10px] font-bold text-gray-400 font-gaegu uppercase">Board</label>
                                <div className="palette-box" style={{ backgroundColor: currentBoard.color }}><input type="color" value={currentBoard.color} onChange={(e) => setCurrentBoard({...currentBoard, color: e.target.value})} /></div>
                            </div>
                            <div className="flex flex-col gap-1 items-center">
                                <label className="text-[10px] font-bold text-gray-400 font-gaegu uppercase">Stamp</label>
                                <div className="palette-box" style={{ backgroundColor: currentBoard.stampColor }}><input type="color" value={currentBoard.stampColor} onChange={(e) => setCurrentBoard({...currentBoard, stampColor: e.target.value})} /></div>
                            </div>
                            <div className="flex flex-col gap-1">
                                <label className="text-[10px] font-bold text-gray-400 font-gaegu uppercase ml-1">Stamp Style</label>
                                <div className="flex items-center gap-2">
                                    <input className="w-8 h-8 bg-white border-2 border-black rounded text-center font-bold font-gaegu" value={currentBoard.isIconMode ? "" : currentBoard.stamp} onChange={(e) => setCurrentBoard({...currentBoard, stamp: e.target.value.slice(-2), isIconMode: false})} />
                                    <div className="flex gap-0.5">
                                        {['heart', 'star', 'check', 'smile'].map(icon => (
                                            <button key={icon} onClick={() => setCurrentBoard({...currentBoard, stamp: icon, isIconMode: true})} className={`w-7 h-7 flex items-center justify-center rounded border border-black/5 ${currentBoard.isIconMode && currentBoard.stamp === icon ? 'bg-black text-white' : 'bg-white'}`}><i data-lucide={icon} className="w-3.5 h-3.5"></i></button>
                                        ))}
                                    </div>
                                    <button onClick={() => setCurrentBoard({...currentBoard, useStampBorder: !currentBoard.useStampBorder})} className={`px-2 py-1 rounded border-2 border-black font-bold font-gaegu text-xs ${currentBoard.useStampBorder ? 'bg-black text-white' : 'bg-white'}`}>BORDER</button>
                                </div>
                            </div>
                        </div>
                    </section>

                    <div className="flex gap-3 mt-8 w-full">
                        <button onClick={saveToAlbum} className="flex-1 doodle-button bg-white py-3 font-bold font-gaegu text-lg shadow-[3px_3px_0px_#000]">SAVE</button>
                        <button onClick={() => {
                            const { dones, ...safeData } = currentBoard;
                            const data = btoa(encodeURIComponent(JSON.stringify(safeData)));
                            navigator.clipboard.writeText(`${window.location.origin}${window.location.pathname}?data=${data}`).then(() => alert("링크 복사 완료!"));
                        }} className="flex-1 doodle-button bg-black text-white py-3 font-bold font-gaegu text-lg shadow-[3px_3px_0px_rgba(0,0,0,0.3)]">SHARE</button>
                    </div>

                    {album.length > 0 && (
                        <div className="w-full mt-10 p-4 md:p-8 bg-gray-50 border-2 border-black doodle-border shadow-sm">
                            <h2 className="text-xl font-bold uppercase mb-4 md:mb-8 font-gaegu opacity-50">Album</h2>
                            <div className="flex gap-3 md:gap-5 overflow-x-auto pb-2 custom-scrollbar">
                                {album.map(b => (
                                    <div key={b.id} onClick={() => setCurrentBoard(b)} className="relative min-w-[110px] md:min-w-[150px] aspect-square bg-white border-2 border-black p-2 md:p-4 cursor-pointer shadow-[3px_3px_0px_#000] flex flex-col group">
                                        <button onClick={(e) => { e.stopPropagation(); setAlbum(album.filter(i => i.id !== b.id)); }} className="absolute top-1 right-1 text-xl font-bold text-gray-300 hover:text-red-500 z-10">×</button>
                                        <div className="flex-grow flex items-center justify-center text-2xl md:text-4xl" style={{ color: b.stampColor }}>
                                            {b.isIconMode ? <i data-lucide={b.stamp} className="w-8 h-8 md:w-12 md:h-12"></i> : b.stamp}
                                        </div>
                                        <div className="text-xs md:text-lg font-bold truncate text-center border-t border-black/5 pt-1 font-gaegu">{b.title}</div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {isSearchOpen && (
                        <div className="fixed inset-0 bg-white z-[100] p-4 flex flex-col items-center overflow-y-auto">
                            <div className="w-full max-w-md mt-4">
                                <div className="flex justify-between items-center mb-6 font-gaegu">
                                    <span className="text-3xl font-black italic">SEARCH</span>
                                    <div className="flex items-center gap-2">
                                        <button onClick={() => setManualAdd(!manualAdd)} className="text-xs border-2 border-black px-2 py-1 rounded font-bold">{manualAdd ? '검색' : '직접'}</button>
                                        <button onClick={() => { setIsSearchOpen(false); setManualAdd(false); setResults([]); }} className="text-4xl leading-none">&times;</button>
                                    </div>
                                </div>
                                {manualAdd ? (
                                    <div className="flex flex-col gap-4 p-6 border-4 border-black doodle-border font-gaegu bg-white">
                                        <input className="w-full border-b-2 border-black p-2 text-lg outline-none" placeholder="제목" value={manualData.title} onChange={e => setManualData({...manualData, title: e.target.value})} />
                                        <input className="w-full border-b-2 border-black p-2 text-sm outline-none" placeholder="이미지 URL" value={manualData.poster} onChange={e => setManualData({...manualData, poster: e.target.value})} />
                                        <button onClick={() => {
                                            const newSlots = [...currentBoard.slots];
                                            newSlots[activeIndex] = { title: manualData.title, poster: manualData.poster };
                                            setCurrentBoard({...currentBoard, slots: newSlots});
                                            setManualAdd(false); setIsSearchOpen(false); setManualData({ title: '', poster: '' });
                                        }} className="doodle-button bg-black text-white p-3 text-xl font-bold">ADD</button>
                                    </div>
                                ) : (
                                    <>
                                        <input className="w-full bg-white p-4 border-4 border-black text-xl mb-6 font-bold doodle-border font-gaegu" placeholder="검색어..." onChange={(e) => fetchSearchResults(e.target.value)} autoFocus />
                                        <div className="grid grid-cols-3 gap-2 pb-10">
                                            {results.map(d => (
                                                <div key={d.id} onClick={() => {
                                                    const newSlots = [...currentBoard.slots];
                                                    newSlots[activeIndex] = { title: d.name || d.title, poster: d.poster_path ? IMAGE_BASE + d.poster_path : '' };
                                                    setCurrentBoard({...currentBoard, slots: newSlots});
                                                    setIsSearchOpen(false); setResults([]);
                                                }} className="cursor-pointer text-center bg-white p-1 border-2 border-black doodle-border">
                                                    <img src={d.poster_path ? IMAGE_BASE + d.poster_path : 'https://via.placeholder.com/200x300'} className="w-full aspect-[2/3] object-cover mb-1" />
                                                    <p className="text-[10px] font-bold line-clamp-1 font-gaegu">{d.name || d.title}</p>
                                                </div>
                                            ))}
                                        </div>
                                    </>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function Slot({ data, isDone, onToggle, idx, stamp, stampColor, isIconMode, useStampBorder, onClear, onSearch }) {
            const rotate = [ -1.2, 1, -0.7, 1.2, -1, 0.8 ][idx % 6];
            return (
                <div onClick={() => data ? onToggle() : onSearch()} style={{ transform: `rotate(${rotate}deg)` }} className="relative aspect-[3/4] bg-white border-[1.5px] md:border-2 border-black overflow-hidden cursor-pointer shadow-[2px_2px_0px_#000] md:shadow-[3px_3px_0px_#000] group transition-transform active:scale-95">
                    {data ? (
                        <>
                            <button onClick={(e) => { e.stopPropagation(); onClear(); }} className="absolute top-0 right-1 text-xl md:text-2xl font-bold text-white z-20 drop-shadow-[0_1px_2px_rgba(0,0,0,0.8)] opacity-100 md:opacity-0 group-hover:opacity-100 transition-opacity">×</button>
                            {data.poster ? (
                                <img src={data.poster} className={`w-full h-full object-cover transition-all duration-300 ${isDone ? 'opacity-100' : 'opacity-20 grayscale'}`} />
                            ) : (
                                <div className="w-full h-full bg-gray-50 flex items-center justify-center p-2 text-center text-[10px] md:text-xl font-bold font-gaegu leading-tight">{data.title}</div>
                            )}
                            
                            {(!isDone && data.poster) && <div className="absolute inset-0 flex items-center justify-center p-2 text-center text-[10px] md:text-xl font-bold font-gaegu leading-tight drop-shadow-sm">{data.title}</div>}
                            
                            {isDone && (
                                <div className="absolute bottom-1 right-1 md:bottom-3 md:right-3 flex items-center justify-center animate-stamp pointer-events-none z-30">
                                    <div className={`p-0.5 md:p-1 bg-transparent ${useStampBorder ? 'border-[2px] md:border-[3.5px]' : ''}`} style={{ borderColor: stampColor }}>
                                        <div className="font-gaegu font-black text-2xl md:text-5xl leading-none" style={{ color: stampColor }}>
                                            {isIconMode ? <i data-lucide={stamp} className="w-6 h-6 md:w-10 md:h-10 stroke-[4px] md:stroke-[5px]"></i> : <span>{stamp}</span>}
                                        </div>
                                    </div>
                                </div>
                            )}
                        </>
                    ) : <div className="h-full flex items-center justify-center text-gray-100 text-3xl md:text-5xl font-gaegu">+</div>}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
