<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도장격파 : Stamp Break</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0a0a0a; color: white; font-family: 'Noto Sans KR', sans-serif; }
        .font-serif { font-family: 'Noto Serif KR', serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- 설정 ---
        const API_KEY = "YOUR_TMDB_API_KEY_HERE"; // 발급받은 TMDB API 키를 여기에 넣으세요!
        const IMAGE_BASE = "https://image.tmdb.org/t/p/w500";

        function App() {
            const [slots, setSlots] = useState(Array(16).fill(null));
            const [isSearchOpen, setIsSearchOpen] = useState(false);
            const [activeIndex, setActiveIndex] = useState(null);
            const [query, setQuery] = useState("");
            const [results, setResults] = useState([]);
            const boardRef = useRef(null);

            // 검색 기능
            useEffect(() => {
                if (query.length < 2) return;
                const delay = setTimeout(async () => {
                    const resp = await fetch(`https://api.themoviedb.org/3/search/tv?api_key=${API_KEY}&query=${query}&language=ko-KR`);
                    const data = await resp.json();
                    setResults(data.results || []);
                }, 500);
                return () => clearTimeout(delay);
            }, [query]);

            const selectDrama = (drama) => {
                const newSlots = [...slots];
                newSlots[activeIndex] = {
                    title: drama.name,
                    poster: drama.poster_path ? IMAGE_BASE + drama.poster_path : 'https://via.placeholder.com/300x400'
                };
                setSlots(newSlots);
                setIsSearchOpen(false);
                setQuery("");
            };

            const downloadImage = async () => {
                const canvas = await html2canvas(boardRef.current, { backgroundColor: "#121212" });
                const link = document.createElement('a');
                link.download = 'stamp-break.png';
                link.href = canvas.toDataURL();
                link.click();
            };

            return (
                <div className="max-w-md mx-auto p-4 min-h-screen">
                    <header className="py-8 text-center">
                        <h1 className="text-4xl font-serif font-black text-red-600 tracking-tighter">STAMP BREAK</h1>
                        <p className="text-[10px] text-zinc-500 mt-2 tracking-[0.2em]">FILMOGRAPHY CONQUEST</p>
                    </header>

                    {/* 도장판 */}
                    <div ref={boardRef} className="bg-[#121212] p-4 rounded shadow-2xl border border-zinc-800">
                        <div className="flex justify-between mb-4 items-end border-b border-zinc-800 pb-2">
                            <span className="text-lg font-serif font-bold text-zinc-300">나의 정복기</span>
                            <span className="text-red-700 font-serif font-bold text-xl">印</span>
                        </div>
                        <div className="grid grid-cols-4 gap-2">
                            {slots.map((slot, i) => (
                                <Slot key={i} data={slot} onClick={() => { setActiveIndex(i); setIsSearchOpen(true); }} />
                            ))}
                        </div>
                    </div>

                    <button onClick={downloadImage} className="w-full mt-8 bg-red-800 hover:bg-red-700 py-4 rounded-xl font-bold transition-all shadow-lg shadow-red-900/20">
                        이미지 저장 (공유용)
                    </button>

                    {/* 검색창 모달 */}
                    {isSearchOpen && (
                        <div className="fixed inset-0 bg-black/95 z-50 p-6 flex flex-col">
                            <div className="flex justify-between items-center mb-6">
                                <h2 className="text-xl font-bold">작품 검색</h2>
                                <button onClick={() => setIsSearchOpen(false)} className="text-2xl">&times;</button>
                            </div>
                            <input 
                                className="w-full bg-zinc-800 p-4 rounded-lg border border-zinc-700 outline-none focus:border-red-600"
                                placeholder="드라마 제목 입력..."
                                value={query}
                                onChange={(e) => setQuery(e.target.value)}
                                autoFocus
                            />
                            <div className="grid grid-cols-3 gap-3 mt-6 overflow-y-auto">
                                {results.map(d => (
                                    <div key={d.id} onClick={() => selectDrama(d)} className="cursor-pointer group">
                                        <img src={IMAGE_BASE + d.poster_path} className="rounded border border-transparent group-hover:border-red-600" />
                                        <p className="text-[10px] mt-1 truncate">{d.name}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function Slot({ data, onClick }) {
            const [done, setDone] = useState(false);
            
            const handleSlotClick = (e) => {
                if (!data) {
                    onClick();
                } else {
                    setDone(!done);
                }
            };

            return (
                <div onClick={handleSlotClick} className="relative aspect-[3/4] bg-zinc-800 rounded-sm overflow-hidden cursor-pointer border border-zinc-700">
                    {data ? (
                        <>
                            <img src={data.poster} className={`w-full h-full object-cover ${done ? 'grayscale-0' : 'grayscale'}`} />
                            {done && (
                                <div className="absolute inset-0 flex items-center justify-center animate-[ping_0.2s_ease-out_1]">
                                    <div className="border-[3px] border-red-600 text-red-600 font-serif font-black text-2xl p-1 rotate-[-15deg] bg-white/10 backdrop-blur-sm">完</div>
                                </div>
                            )}
                        </>
                    ) : (
                        <div className="h-full flex items-center justify-center text-zinc-600 text-xs">+</div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
