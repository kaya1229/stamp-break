<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도장격파 : Stamp Break Pro Max</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; color: white; font-family: 'Noto Sans KR', sans-serif; }
        .font-serif { font-family: 'Noto Serif KR', serif; }
        input:focus { outline: none; }
        @keyframes stamp-bang {
            0% { transform: scale(5) rotate(-45deg); opacity: 0; }
            80% { transform: scale(0.9) rotate(-10deg); opacity: 1; }
            100% { transform: scale(1) rotate(-15deg); opacity: 1; }
        }
        .animate-stamp { animation: stamp-bang 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .side-picker { position: relative; width: 44px; height: 44px; border-radius: 12px; cursor: pointer; border: 2px solid rgba(255,255,255,0.1); transition: all 0.2s; overflow: hidden; }
        .side-picker input[type="color"] { position: absolute; top: -10px; left: -10px; width: 80px; height: 80px; cursor: pointer; opacity: 0; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const API_KEY = "YOUR_TMDB_API_KEY_HERE"; 
        const IMAGE_BASE = "https://image.tmdb.org/t/p/w500";

        const getContrastColor = (hex) => {
            const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
            return ((r * 299) + (g * 587) + (b * 114)) / 1000 >= 128 ? "#1a1a1a" : "#ffffff";
        };

        function App() {
            const [album, setAlbum] = useState(() => JSON.parse(localStorage.getItem('sb_album') || '[]'));
            const [currentBoard, setCurrentBoard] = useState(() => {
                const saved = localStorage.getItem('sb_current');
                return saved ? JSON.parse(saved) : {
                    id: Date.now(), title: "나의 정복 리스트", color: "#121212", stamp: "完", slots: Array(16).fill(null), dones: Array(16).fill(false)
                };
            });

            const [isSearchOpen, setIsSearchOpen] = useState(false);
            const [activeIndex, setActiveIndex] = useState(null);
            const [query, setQuery] = useState("");
            const [results, setResults] = useState([]);
            const boardRef = useRef(null);

            useEffect(() => {
                localStorage.setItem('sb_album', JSON.stringify(album));
                localStorage.setItem('sb_current', JSON.stringify(currentBoard));
            }, [album, currentBoard]);

            const fetchSearchResults = async (q) => {
                if (q.length < 2) return;
                const resp = await fetch(`https://api.themoviedb.org/3/search/tv?api_key=${API_KEY}&query=${q}&language=ko-KR`);
                const data = await resp.json();
                const withOtt = await Promise.all((data.results || []).map(async (item) => {
                    const ottResp = await fetch(`https://api.themoviedb.org/3/tv/${item.id}/watch/providers?api_key=${API_KEY}`);
                    const ottData = await ottResp.json();
                    return { ...item, ott: ottData.results?.KR?.flatrate?.slice(0, 2).map(p => IMAGE_BASE + p.logo_path) || [] };
                }));
                setResults(withOtt);
            };

            const downloadImage = async () => {
                if(!boardRef.current) return;
                const canvas = await html2canvas(boardRef.current, {
                    backgroundColor: currentBoard.color,
                    scale: 3,
                    useCORS: true,
                    allowTaint: false,
                    logging: false
                });
                const link = document.createElement('a');
                link.download = `${currentBoard.title}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            };

            const saveToAlbum = () => {
                const exists = album.find(b => b.id === currentBoard.id);
                setAlbum(exists ? album.map(b => b.id === currentBoard.id ? currentBoard : b) : [...album, currentBoard]);
                alert("앨범에 저장되었습니다!");
            };

            return (
                <div className="max-w-4xl mx-auto p-4 flex flex-col items-center pb-40">
                    <header className="py-10 text-center w-full">
                        <h1 className="text-4xl font-serif font-black text-red-600 tracking-tighter italic">STAMP BREAK</h1>
                    </header>

                    <div className="flex flex-col md:flex-row gap-6 items-start justify-center w-full max-w-2xl">
                        {/* 사이드 툴박스 */}
                        <div className="flex md:flex-col gap-4 order-2 md:order-1 w-full md:w-auto justify-center">
                            <div className="flex flex-col items-center gap-1">
                                <label className="text-[9px] font-bold text-zinc-500 uppercase">Color</label>
                                <div className="side-picker" style={{ backgroundColor: currentBoard.color }}>
                                    <input type="color" value={currentBoard.color} onChange={(e) => setCurrentBoard({...currentBoard, color: e.target.value})} />
                                </div>
                            </div>
                            <div className="flex flex-col items-center gap-1">
                                <label className="text-[9px] font-bold text-zinc-500 uppercase">Stamp</label>
                                <input 
                                    className="w-11 h-11 bg-zinc-900 border-2 border-white/10 rounded-xl text-center font-serif text-red-600 text-xl font-bold"
                                    value={currentBoard.stamp} 
                                    onChange={(e) => setCurrentBoard({...currentBoard, stamp: e.target.value.slice(-1)})} 
                                />
                            </div>
                        </div>

                        {/* 도장판 영역 */}
                        <div className="order-1 md:order-2 flex-grow w-full">
                            <div ref={boardRef} style={{ backgroundColor: currentBoard.color }} className="p-8 rounded-2xl shadow-2xl transition-colors duration-500">
                                <div className="flex flex-col items-center mb-10 border-b border-white/10 pb-6 text-center">
                                    <input 
                                        className="bg-transparent text-4xl font-serif font-black w-full text-center outline-none" 
                                        style={{ color: getContrastColor(currentBoard.color) }}
                                        value={currentBoard.title}
                                        onChange={(e) => setCurrentBoard({...currentBoard, title: e.target.value})}
                                    />
                                    <div className="text-red-600 font-serif font-bold text-2xl mt-2">{currentBoard.stamp}</div>
                                </div>
                                <div className="grid grid-cols-4 gap-3">
                                    {currentBoard.slots.map((slot, i) => (
                                        <Slot 
                                            key={i} data={slot} isDone={currentBoard.dones[i]} stamp={currentBoard.stamp}
                                            onToggle={() => {
                                                const newDones = [...currentBoard.dones];
                                                newDones[i] = !newDones[i];
                                                setCurrentBoard({...currentBoard, dones: newDones});
                                            }}
                                            onSearch={() => { setActiveIndex(i); setIsSearchOpen(true); }}
                                        />
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* 하단 제어 및 앨범 */}
                    <div className="w-full max-w-2xl mt-12 space-y-8">
                        <div className="grid grid-cols-3 gap-3">
                            <button onClick={saveToAlbum} className="bg-zinc-800 py-4 rounded-xl font-bold text-xs hover:bg-zinc-700">앨범 저장</button>
                            <button onClick={() => alert("공유 기능은 기존과 동일하게 작동합니다.")} className="bg-zinc-800 py-4 rounded-xl font-bold text-xs hover:bg-zinc-700">🔗 링크 공유</button>
                            <button onClick={downloadImage} className="bg-red-700 py-4 rounded-xl font-bold text-xs hover:bg-red-600">💾 이미지 저장</button>
                        </div>

                        <div className="pb-10">
                            <h2 className="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-4">My Album ({album.length})</h2>
                            <div className="flex gap-4 overflow-x-auto pb-4 custom-scrollbar">
                                {album.map(b => (
                                    <div key={b.id} onClick={() => setCurrentBoard(b)} className={`min-w-[120px] aspect-square rounded-2xl border-2 p-3 flex flex-col justify-between cursor-pointer transition-all ${currentBoard.id === b.id ? 'border-red-600 bg-red-900/10 scale-95' : 'border-zinc-800 bg-zinc-900'}`}>
                                        <div className="text-[10px] font-black leading-tight truncate">{b.title}</div>
                                        <div className="text-right text-red-600 font-serif text-lg">{b.stamp}</div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* 검색 모달 */}
                    {isSearchOpen && (
                        <div className="fixed inset-0 bg-black/95 z-50 p-6 flex flex-col items-center">
                            <div className="w-full max-w-md">
                                <div className="flex justify-between items-center mb-8 font-serif text-2xl font-bold text-red-600"><span>DRAMA SEARCH</span><button onClick={() => setIsSearchOpen(false)} className="text-4xl text-zinc-500">&times;</button></div>
                                <input className="w-full bg-zinc-900 p-5 rounded-2xl border border-zinc-800 text-lg mb-8" placeholder="드라마 제목 입력..." onChange={(e) => fetchSearchResults(e.target.value)} autoFocus />
                                <div className="grid grid-cols-3 gap-4 overflow-y-auto max-h-[60vh]">
                                    {results.map(d => (
                                        <div key={d.id} onClick={() => {
                                            const newSlots = [...currentBoard.slots];
                                            newSlots[activeIndex] = { title: d.name, poster: IMAGE_BASE + d.poster_path, ott: d.ott };
                                            setCurrentBoard({...currentBoard, slots: newSlots});
                                            setIsSearchOpen(false);
                                        }} className="cursor-pointer group text-center">
                                            <img src={IMAGE_BASE + d.poster_path} className="rounded-xl group-hover:ring-4 ring-red-600 transition-all" />
                                            <p className="text-[10px] mt-2 truncate opacity-50">{d.name}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function Slot({ data, isDone, onToggle, onSearch, stamp }) {
            return (
                <div onClick={() => data ? onToggle() : onSearch()} className="relative aspect-[3/4] bg-black/40 rounded-xl overflow-hidden border border-white/5 cursor-pointer">
                    {data ? (
                        <>
                            {/* 핵심: crossOrigin="anonymous" 추가하여 이미지 저장 문제 해결 */}
                            <img 
                                src={data.poster} 
                                crossOrigin="anonymous"
                                className={`w-full h-full object-cover transition-all duration-700 ${isDone ? 'grayscale-0 scale-110' : 'grayscale brightness-[0.4]'}`} 
                            />
                            {!isDone && (
                                <div className="absolute inset-0 flex flex-col items-center justify-center p-3 text-center bg-black/20">
                                    <div className="text-[9px] font-black leading-tight text-white/90 mb-2 drop-shadow-md">{data.title}</div>
                                    <div className="flex gap-1 justify-center">
                                        {data.ott?.map((logo, idx) => (
                                            <img key={idx} src={logo} crossOrigin="anonymous" className="w-4 h-4 rounded-sm shadow-md" />
                                        ))}
                                    </div>
                                </div>
                            )}
                            {isDone && (
                                <div className="absolute inset-0 flex items-center justify-center animate-stamp pointer-events-none">
                                    <div className="border-[3px] border-red-600 text-red-600 font-serif font-black text-2xl p-1 bg-white/10 backdrop-blur-sm shadow-2xl">
                                        {stamp}
                                    </div>
                                </div>
                            )}
                        </>
                    ) : <div className="h-full flex items-center justify-center text-white/5 text-2xl">+</div>}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
