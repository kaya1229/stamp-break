<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도장격파 : Minimal Edition</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #ffffff; color: #1a1a1a; font-family: 'Gaegu', cursive; -webkit-font-smoothing: antialiased; }
        .font-gaegu { font-family: 'Gaegu', cursive; }
        input:focus { outline: none; }
        
        input[type=range] { -webkit-appearance: none; background: #e5e7eb; border-radius: 10px; height: 6px; border: 1px solid #1a1a1a; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; background: #1a1a1a; border-radius: 50%; cursor: pointer; border: 1px solid #000; }

        @keyframes stamp-bang {
            0% { transform: scale(5) rotate(-45deg); opacity: 0; }
            100% { transform: scale(1) rotate(-12deg); opacity: 1; }
        }
        .animate-stamp { animation: stamp-bang 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        
        .doodle-border { border: 2.5px solid #1a1a1a; border-radius: 255px 15px 225px 15px/15px 225px 15px 255px; }
        .doodle-button { border: 2px solid #1a1a1a; border-radius: 10px 20px 10px 25px/15px 10px 25px 12px; transition: all 0.2s; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .doodle-button:active { transform: scale(0.95); }
        
        .palette-box { border: 2px solid #1a1a1a; border-radius: 4px; overflow: hidden; position: relative; width: 32px; height: 32px; cursor: pointer; }
        .palette-box input[type="color"] { position: absolute; top: -10px; left: -10px; width: 200%; height: 200%; cursor: pointer; opacity: 0; }
        .custom-scrollbar::-webkit-scrollbar { height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1a1a1a; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const IMAGE_BASE = "https://image.tmdb.org/t/p/w500";
        const STAMP_SOUND = new Audio("https://assets.mixkit.co/active_storage/sfx/2005/2005-preview.mp3");

        const ICON_SUGGESTIONS = [
            { id: 'check', icon: 'check' }, { id: 'heart', icon: 'heart' },
            { id: 'star', icon: 'star' }, { id: 'award', icon: 'award' },
            { id: 'zap', icon: 'zap' }, { id: 'smile', icon: 'smile' }
        ];

        function App() {
            const [album, setAlbum] = useState(() => JSON.parse(localStorage.getItem('sb_album') || '[]'));
            const [currentBoard, setCurrentBoard] = useState({
                id: Date.now(), title: "나의 정복 리스트", author: "USER", color: "#fefefe", 
                stamp: "完", stampColor: "#e11d48", isIconMode: false, slots: Array(16).fill(null), dones: Array(16).fill(false)
            });

            const [isSearchOpen, setIsSearchOpen] = useState(false);
            const [activeIndex, setActiveIndex] = useState(null);
            const [results, setResults] = useState([]);

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [currentBoard, results, isSearchOpen]);
            useEffect(() => { localStorage.setItem('sb_album', JSON.stringify(album)); }, [album]);

            const fetchSearchResults = async (q) => {
                if (q.length < 2) return;
                try {
                    // Vercel 서버리스 함수 호출 (보안 유지)
                    const resp = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
                    const data = await resp.json();
                    setResults(data.results || []);
                } catch (e) { console.error(e); }
            };

            const toggleDone = (i) => {
                const newDones = [...currentBoard.dones];
                newDones[i] = !newDones[i];
                if (newDones[i]) { STAMP_SOUND.currentTime = 0; STAMP_SOUND.play().catch(() => {}); }
                setCurrentBoard({...currentBoard, dones: newDones});
            };

            const getGridClass = () => {
                const count = currentBoard.slots.length;
                if (count <= 11) return "grid-cols-3";
                return "grid-cols-3 sm:grid-cols-4 md:grid-cols-5";
            };

            return (
                <div className="max-w-4xl mx-auto p-6 flex flex-col items-center pb-20">
                    <header className="py-8 flex justify-between items-center w-full mb-4">
                        <h1 className="text-4xl md:text-5xl font-black italic font-gaegu">STAMP BREAK</h1>
                        <div className="flex gap-2">
                            <button onClick={() => setAlbum([...album, {...currentBoard, id: Date.now()}])} className="doodle-button bg-white px-4 py-2 font-bold font-gaegu shadow-[2px_2px_0px_#000]">SAVE</button>
                            <button onClick={() => window.location.reload()} className="doodle-button bg-gray-100 px-4 py-2 font-bold font-gaegu shadow-[2px_2px_0px_#000]">RESET</button>
                        </div>
                    </header>

                    {/* 메인 보드 영역 (중앙 집중형) */}
                    <main className="w-full">
                        <div style={{ backgroundColor: currentBoard.color }} className="p-6 md:p-10 doodle-border border-[3px] border-black shadow-[8px_8px_0px_#000]">
                            <div className="mb-6 flex flex-col items-center">
                                <input className="bg-transparent text-4xl font-bold w-full text-center outline-none border-b-2 border-black/5 font-gaegu" value={currentBoard.title} onChange={(e) => setCurrentBoard({...currentBoard, title: e.target.value})} />
                                <input className="bg-transparent text-sm opacity-50 w-24 text-center mt-2 font-gaegu" value={currentBoard.author} onChange={(e) => setCurrentBoard({...currentBoard, author: e.target.value})} />
                            </div>
                            
                            <div className={`grid gap-3 ${getGridClass()}`}>
                                {currentBoard.slots.map((slot, i) => (
                                    <Slot key={i} data={slot} isDone={currentBoard.dones[i]} idx={i} stamp={currentBoard.stamp} stampColor={currentBoard.stampColor} isIconMode={currentBoard.isIconMode} onToggle={() => toggleDone(i)} onSearch={() => { setActiveIndex(i); setIsSearchOpen(true); }} onClear={(e) => { e.stopPropagation(); const newSlots = [...currentBoard.slots]; newSlots[i] = null; setCurrentBoard({...currentBoard, slots: newSlots}); }} />
                                ))}
                            </div>
                        </div>
                    </main>

                    {/* 하단 툴바 (사이드바 대신 위치) */}
                    <footer className="w-full mt-10 p-6 bg-gray-50 rounded-2xl border-2 border-black/5 flex flex-wrap items-center justify-between gap-6">
                        <div className="flex items-center gap-4">
                            <div className="flex flex-col gap-1">
                                <label className="text-[10px] font-bold text-gray-400 uppercase">Slots</label>
                                <input type="range" min="9" max="25" value={currentBoard.slots.length} onChange={(e) => {
                                    const n = parseInt(e.target.value);
                                    let s = currentBoard.slots.slice(0, n);
                                    let d = currentBoard.dones.slice(0, n);
                                    if(n > currentBoard.slots.length) {
                                        const diff = n - currentBoard.slots.length;
                                        s = [...s, ...Array(diff).fill(null)]; d = [...d, ...Array(diff).fill(false)];
                                    }
                                    setCurrentBoard({...currentBoard, slots: s, dones: d});
                                }} />
                            </div>
                            <div className="flex gap-2">
                                <div className="palette-box" style={{ backgroundColor: currentBoard.color }} title="Board Color"><input type="color" value={currentBoard.color} onChange={(e) => setCurrentBoard({...currentBoard, color: e.target.value})} /></div>
                                <div className="palette-box" style={{ backgroundColor: currentBoard.stampColor }} title="Stamp Color"><input type="color" value={currentBoard.stampColor} onChange={(e) => setCurrentBoard({...currentBoard, stampColor: e.target.value})} /></div>
                            </div>
                        </div>

                        <div className="flex items-center gap-2">
                            <input className="w-10 h-10 bg-white border-2 border-black rounded-lg text-center font-bold text-xl font-gaegu" value={currentBoard.isIconMode ? "" : currentBoard.stamp} onChange={(e) => setCurrentBoard({...currentBoard, stamp: e.target.value.slice(-2), isIconMode: false})} />
                            <div className="flex gap-1 bg-white p-1 rounded-lg border border-black/10">
                                {ICON_SUGGESTIONS.map(item => (
                                    <button key={item.id} onClick={() => setCurrentBoard({...currentBoard, stamp: item.icon, isIconMode: true})} className={`w-8 h-8 flex items-center justify-center rounded ${currentBoard.isIconMode && currentBoard.stamp === item.icon ? 'bg-black text-white' : 'text-gray-300'}`}><i data-lucide={item.icon} className="w-4 h-4"></i></button>
                                ))}
                            </div>
                        </div>
                    </footer>

                    {/* 검색 모달 */}
                    {isSearchOpen && (
                        <div className="fixed inset-0 bg-white/95 z-50 p-6 flex flex-col items-center backdrop-blur-sm">
                            <div className="w-full max-w-md">
                                <div className="flex justify-between items-center mb-8 font-gaegu text-4xl font-black"><span>SEARCH</span><button onClick={() => setIsSearchOpen(false)} className="text-4xl">&times;</button></div>
                                <input className="w-full bg-white p-4 border-4 border-black text-xl mb-8 font-bold doodle-border font-gaegu" placeholder="제목을 입력하세요..." onChange={(e) => fetchSearchResults(e.target.value)} autoFocus />
                                <div className="grid grid-cols-3 gap-4 overflow-y-auto max-h-[60vh] custom-scrollbar">
                                    {results.map(d => (
                                        <div key={d.id} onClick={() => { const newSlots = [...currentBoard.slots]; newSlots[activeIndex] = { title: d.name || d.title, poster: IMAGE_BASE + d.poster_path }; setCurrentBoard({...currentBoard, slots: newSlots}); setIsSearchOpen(false); }} className="cursor-pointer text-center bg-white p-1 border-2 border-black doodle-border">
                                            <img src={IMAGE_BASE + d.poster_path} className="w-full aspect-[2/3] object-cover mb-1" />
                                            <p className="text-[14px] font-bold font-gaegu line-clamp-1">{d.name || d.title}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function Slot({ data, isDone, onToggle, onSearch, onClear, stamp, stampColor, isIconMode, idx }) {
            const rotate = [ -1.5, 1.2, -0.8, 1.5, -1.1, 0.9 ][idx % 6];
            return (
                <div onClick={() => data ? onToggle() : onSearch()} style={{ transform: `rotate(${rotate}deg)` }} className="relative aspect-[3/4] bg-white border-2 border-black overflow-hidden cursor-pointer shadow-[2px_2px_0px_#000]">
                    {data ? (
                        <>
                            <button onClick={onClear} className="absolute top-1 right-1 w-5 h-5 bg-black/50 text-white rounded-full flex items-center justify-center text-[10px] z-20">×</button>
                            <img src={data.poster} className={`w-full h-full object-cover transition-all ${isDone ? 'opacity-100' : 'opacity-20 grayscale'}`} />
                            {!isDone && <div className="absolute inset-0 flex items-center justify-center p-2 text-center text-[12px] font-bold font-gaegu leading-tight">{data.title}</div>}
                            {isDone && (
                                <div className="absolute inset-0 flex items-center justify-center animate-stamp pointer-events-none">
                                    <div className="border-[2px] bg-white shadow-md flex items-center justify-center min-w-[40px] min-h-[40px] rotate-[-10deg]" style={{ borderColor: stampColor }}>
                                        <div className="font-gaegu font-black text-2xl" style={{ color: stampColor }}>
                                            {isIconMode ? <i data-lucide={stamp} className="w-6 h-6 stroke-[3.5px]"></i> : <span>{stamp}</span>}
                                        </div>
                                    </div>
                                </div>
                            )}
                        </>
                    ) : <div className="h-full flex items-center justify-center text-gray-200 text-3xl">+</div>}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
