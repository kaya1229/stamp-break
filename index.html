<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도장격파 : Hand-drawn Edition</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #ffffff; color: #1a1a1a; font-family: 'Gaegu', cursive; -webkit-font-smoothing: antialiased; }
        .font-gaegu { font-family: 'Gaegu', cursive; }
        input:focus { outline: none; }
        
        .hand-underline { 
            position: relative; 
            display: inline-block;
            font-weight: 700;
        }
        .hand-underline::after {
            content: "";
            position: absolute;
            left: -5%;
            bottom: -2px;
            width: 110%;
            height: 10px;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 50% 20% / 10% 80%;
            z-index: -1;
        }

        @keyframes stamp-bang {
            0% { transform: scale(5) rotate(-45deg); opacity: 0; }
            100% { transform: scale(1) rotate(-12deg); opacity: 1; }
        }
        .animate-stamp { animation: stamp-bang 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        
        .doodle-border { border: 2.5px solid #1a1a1a; border-radius: 255px 15px 225px 15px/15px 225px 15px 255px; }
        .doodle-button { border: 2px solid #1a1a1a; border-radius: 10px 20px 10px 25px/15px 10px 25px 12px; transition: all 0.2s; }
        
        .palette-box { border: 2px solid #1a1a1a; border-radius: 4px; overflow: hidden; position: relative; width: 100%; height: 44px; cursor: pointer; }
        .palette-box input[type="color"] { position: absolute; top: -10px; left: -10px; width: 200%; height: 200%; cursor: pointer; opacity: 0; }

        /* 짤림 방지를 위한 패딩 및 폰트 수직 정렬 보정 */
        .board-container { padding: 40px !important; box-sizing: border-box; }
        .slot-title { line-height: 1.2; padding: 2px 0; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const API_KEY = "291299eef434b2f459b25d72c4c667a1"; 
        const IMAGE_BASE = "https://image.tmdb.org/t/p/w500";

        // 이미지 URL에 캐시 방지 파라미터 추가 함수
        const getCORSImageUrl = (url) => url ? `${url}?t=${new Date().getTime()}` : null;

        const ICON_SUGGESTIONS = [
            { id: 'check', icon: 'check' }, { id: 'heart', icon: 'heart' },
            { id: 'star', icon: 'star' }, { id: 'award', icon: 'award' },
            { id: 'zap', icon: 'zap' }, { id: 'flag', icon: 'flag' },
            { id: 'smile', icon: 'smile' }, { id: 'circle', icon: 'circle' }
        ];

        const getContrastColor = (hex) => {
            const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
            return ((r * 299) + (g * 587) + (b * 114)) / 1000 >= 128 ? "#1a1a1a" : "#ffffff";
        };

        function App() {
            const boardRef = useRef(null);
            const [album, setAlbum] = useState(() => JSON.parse(localStorage.getItem('sb_album') || '[]'));
            const [currentBoard, setCurrentBoard] = useState(() => {
                const params = new URLSearchParams(window.location.search);
                const sharedData = params.get('data');
                if (sharedData) {
                    try { return JSON.parse(decodeURIComponent(atob(sharedData))); } catch(e) { console.error(e); }
                }
                return {
                    id: Date.now(), title: "나의 정복 리스트", author: "YOUR NAME", color: "#fefefe", 
                    stamp: "完", stampColor: "#000000", isIconMode: false, slots: Array(16).fill(null), dones: Array(16).fill(false)
                };
            });

            const [isSearchOpen, setIsSearchOpen] = useState(false);
            const [activeIndex, setActiveIndex] = useState(null);
            const [results, setResults] = useState([]);

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [currentBoard, results, isSearchOpen, album]);
            useEffect(() => {
                localStorage.setItem('sb_album', JSON.stringify(album));
                localStorage.setItem('sb_current', JSON.stringify(currentBoard));
            }, [album, currentBoard]);

            const exportAsImage = async () => {
                if (!boardRef.current) return;
                
                // 1. 폰트 로딩 대기
                await document.fonts.ready;

                // 2. 캡처 옵션 최적화
                const options = {
                    useCORS: true,           // CORS 허용
                    allowTaint: false,       // 오염된 캔버스 방지
                    scale: 2,                // 고화질
                    backgroundColor: "#ffffff",
                    logging: true,
                    onclone: (clonedDoc) => {
                        const el = clonedDoc.querySelector('.board-to-export');
                        if (el) {
                            el.style.transform = "none"; // 회전 제거 (짤림 방지 핵심)
                            el.style.margin = "0";
                            el.style.boxShadow = "none"; // 캡처 시 그림자 짤림 방지
                        }
                    }
                };

                html2canvas(boardRef.current, options).then(canvas => {
                    const link = document.createElement("a");
                    link.href = canvas.toDataURL("image/png", 1.0);
                    link.download = `${currentBoard.title}.png`;
                    link.click();
                });
            };

            const fetchSearchResults = async (q) => {
                if (q.length < 2) return;
                try {
                    const resp = await fetch(`https://api.themoviedb.org/3/search/tv?api_key=${API_KEY}&query=${q}&language=ko-KR`);
                    const data = await resp.json();
                    const withOtt = await Promise.all((data.results || []).map(async (item) => {
                        const ottResp = await fetch(`https://api.themoviedb.org/3/tv/${item.id}/watch/providers?api_key=${API_KEY}`);
                        const ottData = await ottResp.json();
                        return { ...item, ott: ottData.results?.KR?.flatrate?.slice(0, 2).map(p => IMAGE_BASE + p.logo_path) || [] };
                    }));
                    setResults(withOtt);
                } catch (e) { console.error(e); }
            };

            const shareLink = () => {
                const dataToShare = { ...currentBoard, dones: Array(currentBoard.slots.length).fill(false) };
                const encodedData = btoa(encodeURIComponent(JSON.stringify(dataToShare)));
                navigator.clipboard.writeText(`${window.location.origin}${window.location.pathname}?data=${encodedData}`).then(() => alert("공유 링크 복사 완료!"));
            };

            const saveToAlbum = () => { setAlbum([...album.filter(b => b.id !== currentBoard.id), currentBoard]); alert("저장 완료!"); };

            const deleteFromAlbum = (id, e) => { e.stopPropagation(); if(confirm("삭제할까요?")) setAlbum(album.filter(b => b.id !== id)); };

            const changeSlotCount = (newCount) => {
                const currentCount = currentBoard.slots.length;
                let newSlots = [...currentBoard.slots];
                let newDones = [...currentBoard.dones];
                if (newCount > currentCount) {
                    const diff = newCount - currentCount;
                    newSlots = [...newSlots, ...Array(diff).fill(null)];
                    newDones = [...newDones, ...Array(diff).fill(false)];
                } else {
                    newSlots = newSlots.slice(0, newCount);
                    newDones = newDones.slice(0, newCount);
                }
                setCurrentBoard({...currentBoard, slots: newSlots, dones: newDones});
            };

            return (
                <div className="max-w-5xl mx-auto p-6 flex flex-col items-center pb-40">
                    <header className="py-8 flex justify-between items-end w-full max-w-2xl mb-12">
                        <h1 className="text-6xl font-black italic rotate-[-2deg] font-gaegu leading-none">
                            <span className="hand-underline">STAMP BREAK</span>
                        </h1>
                        <button onClick={() => setCurrentBoard({...currentBoard, id: Date.now(), title: "새로운 판", author: "YOUR NAME", slots: Array(16).fill(null), dones: Array(16).fill(false)})} className="doodle-button bg-gray-100 px-4 py-2 font-bold border-2 border-black font-gaegu mb-1">+ NEW</button>
                    </header>

                    <div className="flex flex-col md:flex-row gap-10 items-start justify-center w-full">
                        {/* 설정 영역 */}
                        <div className="flex flex-col gap-6 order-2 md:order-1 w-full md:w-64 p-6 bg-gray-50 rounded-xl border-2 border-black/5 shadow-sm">
                            <div className="flex flex-col w-full gap-2">
                                <label className="text-xs font-bold text-gray-400 flex justify-between"><span>Slot Count</span><span className="text-black">{currentBoard.slots.length}</span></label>
                                <input type="range" min="9" max="25" value={currentBoard.slots.length} onChange={(e) => changeSlotCount(parseInt(e.target.value))} className="w-full" />
                            </div>
                            <div className="flex gap-4">
                                <div className="flex-1">
                                    <label className="text-xs font-bold text-gray-400">Board Color</label>
                                    <div className="palette-box" style={{ backgroundColor: currentBoard.color }}><input type="color" value={currentBoard.color} onChange={(e) => setCurrentBoard(prev => ({...prev, color: e.target.value}))} /></div>
                                </div>
                                <div className="flex-1">
                                    <label className="text-xs font-bold text-gray-400">Stamp Color</label>
                                    <div className="palette-box" style={{ backgroundColor: currentBoard.stampColor }}><input type="color" value={currentBoard.stampColor} onChange={(e) => setCurrentBoard(prev => ({...prev, stampColor: e.target.value}))} /></div>
                                </div>
                            </div>
                            <div className="flex flex-col gap-2">
                                <label className="text-xs font-bold text-gray-400">Stamp Style</label>
                                <div className="flex gap-2">
                                    <input className="w-12 h-10 bg-white border-2 border-black rounded-lg text-center font-bold text-xl font-gaegu" value={currentBoard.isIconMode ? "" : currentBoard.stamp} onChange={(e) => setCurrentBoard({...currentBoard, stamp: e.target.value.slice(-2), isIconMode: false})} />
                                    <div className="grid grid-cols-4 gap-0.5 bg-white p-1 rounded-md border border-black/10 flex-grow">
                                        {ICON_SUGGESTIONS.map(item => (
                                            <button key={item.id} onClick={() => setCurrentBoard({...currentBoard, stamp: item.icon, isIconMode: true})} className={`w-7 h-7 flex items-center justify-center rounded ${currentBoard.isIconMode && currentBoard.stamp === item.icon ? 'bg-black text-white' : 'text-gray-300'}`}><i data-lucide={item.icon} className="w-3 h-3"></i></button>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* 도장판 캔버스 영역 */}
                        <div className="order-1 md:order-2 flex-grow w-full max-w-3xl" ref={boardRef}>
                            <div style={{ backgroundColor: currentBoard.color }} className="board-to-export board-container doodle-border border-[3px] border-black shadow-[8px_8px_0px_#000] rotate-[0.5deg]">
                                <input className="bg-transparent text-5xl font-bold w-full text-center outline-none border-b-2 border-black/10 focus:border-black/30 font-gaegu mb-4 py-2" style={{ color: getContrastColor(currentBoard.color) }} value={currentBoard.title} onChange={(e) => setCurrentBoard({...currentBoard, title: e.target.value})} />
                                
                                <div className="flex items-center justify-center gap-2 text-sm font-bold opacity-60 mb-8">
                                    <span style={{ color: getContrastColor(currentBoard.color) }}>Created by</span>
                                    <input className="bg-transparent border-b border-dashed border-black/30 w-24 text-center font-gaegu text-lg" style={{ color: getContrastColor(currentBoard.color) }} value={currentBoard.author} onChange={(e) => setCurrentBoard({...currentBoard, author: e.target.value.toUpperCase()})} />
                                </div>

                                <div className={`grid gap-4 ${currentBoard.slots.length <= 11 ? 'grid-cols-3' : currentBoard.slots.length <= 20 ? 'grid-cols-4' : 'grid-cols-5'}`}>
                                    {currentBoard.slots.map((slot, i) => (
                                        <Slot key={i} data={slot} isDone={currentBoard.dones[i]} idx={i} stamp={currentBoard.stamp} stampColor={currentBoard.stampColor} isIconMode={currentBoard.isIconMode} totalSlots={currentBoard.slots.length} onToggle={() => { const newDones = [...currentBoard.dones]; newDones[i] = !newDones[i]; setCurrentBoard({...currentBoard, dones: newDones}); }} onSearch={() => { setActiveIndex(i); setIsSearchOpen(true); }} onClear={(e) => { e.stopPropagation(); const newSlots = [...currentBoard.slots]; newSlots[i] = null; setCurrentBoard({...currentBoard, slots: newSlots}); }} />
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* 하단 버튼 및 앨범 영역 (이전과 동일) */}
                    <div className="w-full max-w-2xl mt-16 flex flex-col gap-8">
                        <div className="grid grid-cols-3 gap-4">
                            <button onClick={saveToAlbum} className="doodle-button bg-white py-4 font-bold font-gaegu text-xl">ALBUM SAVE</button>
                            <button onClick={shareLink} className="doodle-button bg-black text-white py-4 font-bold font-gaegu text-xl">SHARE LINK</button>
                            <button onClick={exportAsImage} className="doodle-button bg-yellow-300 py-4 font-bold font-gaegu text-xl">IMAGE DOWNLOAD</button>
                        </div>
                    </div>

                    {/* 검색 팝업 */}
                    {isSearchOpen && (
                        <div className="fixed inset-0 bg-white/95 z-50 p-6 flex flex-col items-center backdrop-blur-sm">
                            <div className="w-full max-w-md">
                                <div className="flex justify-between items-center mb-8 font-gaegu text-4xl font-black"><span>SEARCH</span><button onClick={() => setIsSearchOpen(false)} className="text-4xl">&times;</button></div>
                                <input className="w-full bg-white p-4 border-4 border-black text-xl mb-8 font-bold doodle-border font-gaegu" placeholder="드라마 제목 입력..." onChange={(e) => fetchSearchResults(e.target.value)} autoFocus />
                                <div className="grid grid-cols-3 gap-4 overflow-y-auto max-h-[60vh]">
                                    {results.map(d => (
                                        <div key={d.id} onClick={() => { const newSlots = [...currentBoard.slots]; newSlots[activeIndex] = { title: d.name, poster: IMAGE_BASE + d.poster_path, ott: d.ott }; setCurrentBoard({...currentBoard, slots: newSlots}); setIsSearchOpen(false); }} className="cursor-pointer text-center bg-white p-1 border-2 border-black doodle-border">
                                            <img src={getCORSImageUrl(IMAGE_BASE + d.poster_path)} crossOrigin="anonymous" className="w-full aspect-[2/3] object-cover mb-1" />
                                            <p className="text-xs font-bold font-gaegu line-clamp-1">{d.name}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function Slot({ data, isDone, onToggle, onSearch, onClear, stamp, stampColor, isIconMode, idx, totalSlots }) {
            const randomRotate = [ -1.5, 1.2, -0.8, 1.5, -1.1, 0.9 ][idx % 6];
            return (
                <div onClick={() => data ? onToggle() : onSearch()} style={{ transform: `rotate(${randomRotate}deg)` }} className="relative aspect-[3/4] bg-white border-2 border-black overflow-hidden cursor-pointer shadow-[2px_2px_0px_#000]">
                    {data ? (
                        <>
                            <button onClick={onClear} className="absolute top-1 right-1 w-5 h-5 bg-black text-white rounded-full flex items-center justify-center text-[10px] z-20">×</button>
                            <img src={getCORSImageUrl(data.poster)} crossOrigin="anonymous" className={`w-full h-full object-cover transition-opacity ${isDone ? 'opacity-100' : 'opacity-20 grayscale'}`} />
                            {!isDone && (
                                <div className="absolute inset-0 flex flex-col items-center justify-center p-2 text-center">
                                    <div className="slot-title text-[15px] font-bold text-black font-gaegu mb-1">{data.title}</div>
                                    <div className="flex gap-1">
                                        {data.ott?.map((logo, i) => <img key={i} src={getCORSImageUrl(logo)} crossOrigin="anonymous" className="w-4 h-4 rounded-sm border border-black/10" />)}
                                    </div>
                                </div>
                            )}
                            {isDone && (
                                <div className="absolute inset-0 flex items-center justify-center animate-stamp pointer-events-none">
                                    <div className="border-[3px] font-gaegu font-black text-3xl p-1 bg-white shadow-md flex items-center justify-center min-w-[45px] min-h-[45px] rotate-[-10deg]" style={{ borderColor: stampColor, color: stampColor }}>
                                        {isIconMode ? <i data-lucide={stamp} className="w-8 h-8 stroke-[3px]"></i> : <span>{stamp}</span>}
                                    </div>
                                </div>
                            )}
                        </>
                    ) : <div className="h-full flex items-center justify-center text-gray-200 text-3xl font-gaegu">+</div>}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
