<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도장격파 : Hand-drawn Edition</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #ffffff; color: #1a1a1a; font-family: 'Gaegu', cursive; -webkit-font-smoothing: antialiased; }
        .font-gaegu { font-family: 'Gaegu', cursive; }
        input:focus { outline: none; }
        
        @keyframes stamp-bang {
            0% { transform: scale(5) rotate(-45deg); opacity: 0; }
            80% { transform: scale(0.9) rotate(-5deg); opacity: 1; }
            100% { transform: scale(1) rotate(-12deg); opacity: 1; }
        }
        .animate-stamp { animation: stamp-bang 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        
        .doodle-border { border: 2px solid #1a1a1a; border-radius: 255px 15px 225px 15px/15px 225px 15px 255px; }
        .doodle-button { border: 2px solid #1a1a1a; border-radius: 10px 20px 10px 25px/15px 10px 25px 12px; transition: all 0.2s; }
        .doodle-button:hover { transform: translateY(-2px) rotate(1deg); box-shadow: 4px 4px 0px #1a1a1a; }
        
        .palette-box { border: 2px solid #1a1a1a; border-radius: 4px; overflow: hidden; position: relative; width: 100%; height: 44px; cursor: pointer; transition: transform 0.1s; flex-shrink: 0; }
        .palette-box input[type="color"] { position: absolute; top: -10px; left: -10px; width: 200%; height: 200%; cursor: pointer; opacity: 0; }
        
        .custom-scrollbar::-webkit-scrollbar { height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1a1a1a; border-radius: 10px; }

        input[type=range] { -webkit-appearance: none; background: #e5e7eb; border-radius: 10px; height: 6px; border: 1px solid #1a1a1a; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; background: #1a1a1a; border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const API_KEY = "291299eef434b2f459b25d72c4c667a1"; 
        const IMAGE_BASE = "https://image.tmdb.org/t/p/w500";

        const ICON_SUGGESTIONS = [
            { id: 'check', icon: 'check' }, { id: 'heart', icon: 'heart' },
            { id: 'star', icon: 'star' }, { id: 'award', icon: 'award' },
            { id: 'zap', icon: 'zap' }, { id: 'flag', icon: 'flag' },
            { id: 'smile', icon: 'smile' }, { id: 'circle', icon: 'circle' }
        ];

        const getContrastColor = (hex) => {
            if(!hex) return "#000000";
            const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
            const brightness = ((r * 299) + (g * 587) + (b * 114)) / 1000;
            return brightness >= 128 ? "#1a1a1a" : "#ffffff";
        };

        function App() {
            const [album, setAlbum] = useState(() => JSON.parse(localStorage.getItem('sb_album') || '[]'));
            const [currentBoard, setCurrentBoard] = useState(() => {
                const params = new URLSearchParams(window.location.search);
                const sharedData = params.get('data');
                if (sharedData) {
                    try { return JSON.parse(decodeURIComponent(atob(sharedData))); } catch(e) { console.error(e); }
                }
                return {
                    id: Date.now(), title: "나의 정복 리스트", author: "YOUR NAME", color: "#fefefe", 
                    stamp: "完", stampColor: "#000000", isIconMode: false, slots: Array(16).fill(null), dones: Array(16).fill(false)
                };
            });

            const [isSearchOpen, setIsSearchOpen] = useState(false);
            const [activeIndex, setActiveIndex] = useState(null);
            const [results, setResults] = useState([]);

            const dynamicTextColor = getContrastColor(currentBoard.color);

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [currentBoard, results, isSearchOpen, album]);
            
            useEffect(() => {
                localStorage.setItem('sb_album', JSON.stringify(album));
                localStorage.setItem('sb_current', JSON.stringify(currentBoard));
            }, [album, currentBoard]);

            const fetchSearchResults = async (q) => {
                if (q.length < 2) return;
                try {
                    const resp = await fetch(`https://api.themoviedb.org/3/search/tv?api_key=${API_KEY}&query=${q}&language=ko-KR`);
                    const data = await resp.json();
                    const withOtt = await Promise.all((data.results || []).map(async (item) => {
                        const ottResp = await fetch(`https://api.themoviedb.org/3/tv/${item.id}/watch/providers?api_key=${API_KEY}`);
                        const ottData = await ottResp.json();
                        return { ...item, ott: ottData.results?.KR?.flatrate?.slice(0, 2).map(p => IMAGE_BASE + p.logo_path) || [] };
                    }));
                    setResults(withOtt);
                } catch (e) { console.error(e); }
            };

            const shareLink = () => {
                const dataToShare = { ...currentBoard, dones: Array(currentBoard.slots.length).fill(false) };
                const encodedData = btoa(encodeURIComponent(JSON.stringify(dataToShare)));
                navigator.clipboard.writeText(`${window.location.origin}${window.location.pathname}?data=${encodedData}`)
                    .then(() => alert("공유 링크가 복사되었습니다!"));
            };

            const saveToAlbum = () => {
                setAlbum([...album.filter(b => b.id !== currentBoard.id), currentBoard]);
                alert("앨범에 저장 완료!");
            };

            const deleteFromAlbum = (id, e) => {
                e.stopPropagation();
                if(confirm("이 보드를 앨범에서 삭제할까요?")) {
                    setAlbum(album.filter(b => b.id !== id));
                }
            };

            const clearSlot = (idx, e) => {
                e.stopPropagation();
                const newSlots = [...currentBoard.slots];
                const newDones = [...currentBoard.dones];
                newSlots[idx] = null;
                newDones[idx] = false;
                setCurrentBoard({...currentBoard, slots: newSlots, dones: newDones});
            };

            const changeSlotCount = (newCount) => {
                const currentCount = currentBoard.slots.length;
                let newSlots = [...currentBoard.slots];
                let newDones = [...currentBoard.dones];

                if (newCount > currentCount) {
                    const diff = newCount - currentCount;
                    newSlots = [...newSlots, ...Array(diff).fill(null)];
                    newDones = [...newDones, ...Array(diff).fill(false)];
                } else {
                    newSlots = newSlots.slice(0, newCount);
                    newDones = newDones.slice(0, newCount);
                }
                setCurrentBoard({...currentBoard, slots: newSlots, dones: newDones});
            };

            const getGridCols = (count) => {
                if (count <= 11) return 'grid-cols-3';
                if (count <= 20) return 'grid-cols-4';
                return 'grid-cols-5';
            };

            return (
                <div className="max-w-5xl mx-auto p-6 flex flex-col items-center pb-40">
                    <header className="py-8 flex justify-between items-center w-full max-w-2xl mb-12">
                        <h1 className="text-5xl font-bold italic rotate-[-2deg] font-gaegu leading-none">STAMP BREAK</h1>
                        <button onClick={() => setCurrentBoard({...currentBoard, id: Date.now(), title: "새로운 판", author: "YOUR NAME", slots: Array(16).fill(null), dones: Array(16).fill(false)})} 
                                className="doodle-button bg-gray-100 px-4 py-2 font-bold border-2 border-black font-gaegu text-base">+ NEW BOARD</button>
                    </header>

                    <div className="flex flex-col md:flex-row gap-10 items-start justify-center w-full">
                        {/* 📍 설정 사이드바 */}
                        <div className="flex flex-col gap-6 order-2 md:order-1 w-full md:w-64 p-6 bg-gray-50 rounded-xl border-2 border-black/5 shadow-sm">
                            <div className="flex flex-col w-full gap-2">
                                <label className="text-xs font-bold uppercase text-gray-400 flex justify-between">
                                    <span>Slot Count</span>
                                    <span className="text-black">{currentBoard.slots.length}</span>
                                </label>
                                <input type="range" min="9" max="25" step="1" value={currentBoard.slots.length} onChange={(e) => changeSlotCount(parseInt(e.target.value))} className="w-full cursor-pointer" />
                            </div>

                            <div className="flex gap-4">
                                <div className="flex flex-col gap-2 flex-1">
                                    <label className="text-xs font-bold uppercase text-gray-400">Board Color</label>
                                    <div className="palette-box" style={{ backgroundColor: currentBoard.color }}>
                                        <input type="color" value={currentBoard.color} onChange={(e) => setCurrentBoard(prev => ({...prev, color: e.target.value}))} />
                                    </div>
                                </div>
                                <div className="flex flex-col gap-2 flex-1">
                                    <label className="text-xs font-bold uppercase text-gray-400">Stamp Color</label>
                                    <div className="palette-box" style={{ backgroundColor: currentBoard.stampColor }}>
                                        <input type="color" value={currentBoard.stampColor} onChange={(e) => setCurrentBoard(prev => ({...prev, stampColor: e.target.value}))} />
                                    </div>
                                </div>
                            </div>

                            <div className="flex flex-col gap-3">
                                <label className="text-xs font-bold uppercase text-gray-400">Stamp Style</label>
                                <div className="flex flex-row items-center gap-2">
                                    <input className="w-12 h-10 bg-white border-2 border-black rounded-lg text-center font-bold text-xl font-gaegu shrink-0" style={{ color: currentBoard.stampColor }} value={currentBoard.isIconMode ? "" : currentBoard.stamp} onChange={(e) => setCurrentBoard({...currentBoard, stamp: e.target.value.slice(-2), isIconMode: false})} placeholder="글자" />
                                    <div className="grid grid-cols-4 gap-1 bg-white p-1 rounded-md border border-black/10 flex-grow">
                                        {ICON_SUGGESTIONS.map(item => (
                                            <button key={item.id} onClick={() => setCurrentBoard({...currentBoard, stamp: item.icon, isIconMode: true})} className={`w-full aspect-square flex items-center justify-center rounded transition-all ${currentBoard.isIconMode && currentBoard.stamp === item.icon ? 'bg-black text-white' : 'hover:bg-gray-100 text-gray-300'}`}><i data-lucide={item.icon} className="w-3.5 h-3.5"></i></button>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div className="order-1 md:order-2 flex-grow w-full max-w-3xl">
                            <div style={{ backgroundColor: currentBoard.color }} className="p-8 doodle-border border-[3px] border-black shadow-[8px_8px_0px_#000] rotate-[1deg]">
                                <input className="bg-transparent text-5xl font-bold w-full text-center outline-none border-b-2 border-black/10 focus:border-black/30 font-gaegu" style={{ color: dynamicTextColor }} value={currentBoard.title} onChange={(e) => setCurrentBoard({...currentBoard, title: e.target.value})} />
                                
                                <div className="flex items-center justify-center gap-2 text-sm font-bold opacity-60 mb-6 mt-2">
                                    <span style={{ color: dynamicTextColor }}>Created by</span>
                                    <div className="relative inline-block min-w-[60px]">
                                        <span className="invisible px-2 text-lg font-gaegu whitespace-pre">{currentBoard.author || " "}</span>
                                        <input 
                                            className="absolute inset-0 bg-transparent border-b border-dashed border-black/30 focus:border-black w-full text-center font-gaegu text-lg" 
                                            style={{ color: dynamicTextColor }} 
                                            value={currentBoard.author} 
                                            onChange={(e) => setCurrentBoard({...currentBoard, author: e.target.value.toUpperCase()})} 
                                        />
                                    </div>
                                </div>

                                <div className={`grid gap-4 ${getGridCols(currentBoard.slots.length)}`}>
                                    {currentBoard.slots.map((slot, i) => (
                                        <Slot key={i} data={slot} isDone={currentBoard.dones[i]} idx={i} stamp={currentBoard.stamp} stampColor={currentBoard.stampColor} isIconMode={currentBoard.isIconMode} totalSlots={currentBoard.slots.length} onToggle={() => { const newDones = [...currentBoard.dones]; newDones[i] = !newDones[i]; setCurrentBoard({...currentBoard, dones: newDones}); }} onSearch={() => { setActiveIndex(i); setIsSearchOpen(true); }} onClear={(e) => clearSlot(i, e)} />
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* 하단 앨범/공유 버튼 */}
                    <div className="w-full max-w-2xl mt-16 flex flex-col gap-8 text-center">
                        <div className="grid grid-cols-2 gap-6">
                            <button onClick={saveToAlbum} className="doodle-button bg-white py-4 font-bold border-2 border-black font-gaegu text-xl">ALBUM SAVE</button>
                            <button onClick={shareLink} className="doodle-button bg-black text-white py-4 font-bold font-gaegu text-xl text-center">SHARE LINK</button>
                        </div>

                        <div className="bg-gray-100 p-6 doodle-border border-2 border-black">
                            <h2 className="text-xs font-bold uppercase tracking-widest mb-4 text-left">My Collections ({album.length})</h2>
                            <div className="flex gap-4 overflow-x-auto pb-2 custom-scrollbar">
                                {album.map(b => (
                                    <div key={b.id} onClick={() => setCurrentBoard(b)} className={`relative min-w-[120px] aspect-square bg-white border-2 border-black p-3 flex flex-col cursor-pointer transition-all ${currentBoard.id === b.id ? 'scale-105 shadow-[4px_4px_0px_#000]' : 'opacity-40 hover:opacity-100'}`}>
                                        <button onClick={(e) => deleteFromAlbum(b.id, e)} className="absolute top-2 right-2 w-5 h-5 bg-black/80 text-white rounded-full flex items-center justify-center text-[10px] font-bold z-10 hover:bg-red-500 transition-colors">×</button>
                                        <div className="flex-grow flex items-center justify-center">
                                            <div className="font-gaegu text-3xl" style={{ color: b.stampColor }}>
                                                {b.isIconMode ? <i data-lucide={b.stamp} className="w-8 h-8"></i> : b.stamp}
                                            </div>
                                        </div>
                                        <div className="text-[14px] font-bold leading-tight truncate font-gaegu mt-auto pt-2 border-t border-black/5 w-full text-center">
                                            {b.title}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* 검색 모달 */}
                    {isSearchOpen && (
                        <div className="fixed inset-0 bg-white/95 z-50 p-6 flex flex-col items-center backdrop-blur-sm">
                            <div className="w-full max-w-md">
                                <div className="flex justify-between items-center mb-8 font-gaegu text-4xl font-black"><span>SEARCH</span><button onClick={() => setIsSearchOpen(false)} className="text-4xl">&times;</button></div>
                                <input className="w-full bg-white p-4 border-4 border-black text-xl mb-8 font-bold doodle-border font-gaegu" placeholder="드라마를 입력해봐요..." onChange={(e) => fetchSearchResults(e.target.value)} autoFocus />
                                <div className="grid grid-cols-3 gap-6 overflow-y-auto max-h-[60vh] pr-2 custom-scrollbar">
                                    {results.map(d => (
                                        <div key={d.id} onClick={() => { const newSlots = [...currentBoard.slots]; newSlots[activeIndex] = { title: d.name, poster: IMAGE_BASE + d.poster_path, ott: d.ott }; setCurrentBoard({...currentBoard, slots: newSlots}); setIsSearchOpen(false); }} className="cursor-pointer group text-center bg-white p-2 border-2 border-black doodle-border hover:shadow-[4px_4px_0px_#000] transition-all">
                                            <img src={IMAGE_BASE + d.poster_path} className="rounded-sm mb-2" />
                                            <p className="text-[16px] font-bold leading-[1.2] font-gaegu text-black px-1 line-clamp-2">{d.name}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function Slot({ data, isDone, onToggle, onSearch, onClear, stamp, stampColor, isIconMode, idx, totalSlots }) {
            const randomRotate = [ -1.5, 1.2, -0.8, 1.5, -1.1, 0.9 ][idx % 6];
            // 폰트 및 아이콘 크기를 기존 대비 약 1.5배 상향 조정
            const fontSizeClass = totalSlots > 16 ? 'text-[15px]' : 'text-[19px]';
            const iconSizeClass = totalSlots > 16 ? 'w-5 h-5' : 'w-6 h-6';

            return (
                <div onClick={() => data ? onToggle() : onSearch()} style={{ transform: `rotate(${randomRotate}deg)` }} className="relative aspect-[3/4] bg-white border-2 border-black overflow-hidden cursor-pointer hover:scale-105 transition-transform shadow-[2px_2px_0px_#000]">
                    {data ? (
                        <>
                            <button onClick={onClear} className="absolute top-1 right-1 w-5 h-5 bg-black/80 text-white rounded-full flex items-center justify-center text-[10px] font-bold z-20 hover:bg-red-600 transition-colors">×</button>
                            
                            <img src={data.poster} className={`w-full h-full object-cover transition-all duration-700 ${isDone ? 'grayscale-0 opacity-100' : 'grayscale opacity-25'}`} />
                            
                            {!isDone && (
                                <div className="absolute inset-0 flex flex-col items-center justify-center p-3 text-center bg-white/50">
                                    <div className={`${fontSizeClass} font-bold leading-[1.1] text-black line-clamp-3 font-gaegu mb-3 drop-shadow-sm`}>
                                        {data.title}
                                    </div>
                                    <div className="flex gap-1.5 justify-center">
                                        {data.ott?.map((logoUrl, i) => (
                                            <img key={i} src={logoUrl} className={`${iconSizeClass} rounded-sm shadow-md border border-black/10`} />
                                        ))}
                                    </div>
                                </div>
                            )}

                            {isDone && (
                                <div className="absolute inset-0 flex items-center justify-center animate-stamp pointer-events-none">
                                    {/* 도장 크기도 1.5배 확대: text-2xl -> text-4xl */}
                                    <div className="border-[3px] font-gaegu font-black text-4xl p-1.5 bg-white shadow-lg flex items-center justify-center min-w-[50px] min-h-[50px] rotate-[-10deg]" style={{ borderColor: stampColor, color: stampColor }}>
                                        {isIconMode ? <i data-lucide={stamp} className="w-9 h-9 stroke-[3px]"></i> : <span>{stamp}</span>}
                                    </div>
                                </div>
                            )}
                        </>
                    ) : <div className="h-full flex items-center justify-center text-gray-300 text-4xl font-gaegu">+</div>}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
