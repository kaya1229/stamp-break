<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도장격파 : Hand-drawn Edition</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #ffffff; color: #1a1a1a; font-family: 'Gaegu', cursive; -webkit-font-smoothing: antialiased; }
        .font-gaegu { font-family: 'Gaegu', cursive; }
        input:focus { outline: none; }
        
        @keyframes stamp-bang {
            0% { transform: scale(5) rotate(-45deg); opacity: 0; }
            80% { transform: scale(0.9) rotate(-5deg); opacity: 1; }
            100% { transform: scale(1) rotate(-12deg); opacity: 1; }
        }
        .animate-stamp { animation: stamp-bang 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        
        /* 삐뚤빼뚤 스타일 */
        .doodle-border { border: 2px solid #1a1a1a; border-radius: 255px 15px 225px 15px/15px 225px 15px 255px; }
        .doodle-button { border: 2px solid #1a1a1a; border-radius: 10px 20px 10px 25px/15px 10px 25px 12px; transition: all 0.2s; }
        .doodle-button:hover { transform: translateY(-2px) rotate(1deg); box-shadow: 4px 4px 0px #1a1a1a; }
        
        /* 팔레트 전용: 딱 떨어지는 사각형 */
        .palette-box { border: 2px solid #1a1a1a; border-radius: 4px; overflow: hidden; position: relative; width: 44px; height: 44px; cursor: pointer; transition: transform 0.1s; }
        .palette-box:active { transform: scale(0.95); }
        .palette-box input[type="color"] { position: absolute; top: -10px; left: -10px; width: 80px; height: 80px; cursor: pointer; opacity: 0; }
        
        .custom-scrollbar::-webkit-scrollbar { height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1a1a1a; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const API_KEY = "291299eef434b2f459b25d72c4c667a1"; 
        const IMAGE_BASE = "https://image.tmdb.org/t/p/w500";

        const ICON_SUGGESTIONS = [
            { id: 'check', icon: 'check' }, { id: 'heart', icon: 'heart' },
            { id: 'star', icon: 'star' }, { id: 'award', icon: 'award' },
            { id: 'zap', icon: 'zap' }, { id: 'flag', icon: 'flag' },
            { id: 'smile', icon: 'smile' }, { id: 'circle', icon: 'circle' }
        ];

        const getContrastColor = (hex) => {
            if(!hex) return "#000000";
            const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
            const brightness = ((r * 299) + (g * 587) + (b * 114)) / 1000;
            return brightness >= 128 ? "#1a1a1a" : "#ffffff";
        };

        function App() {
            const [album, setAlbum] = useState(() => JSON.parse(localStorage.getItem('sb_album') || '[]'));
            const [currentBoard, setCurrentBoard] = useState(() => {
                const params = new URLSearchParams(window.location.search);
                const sharedData = params.get('data');
                if (sharedData) {
                    try { return JSON.parse(decodeURIComponent(atob(sharedData))); } catch(e) { console.error(e); }
                }
                return {
                    id: Date.now(), title: "나의 정복 리스트", author: "YOUR NAME", color: "#fefefe", 
                    stamp: "完", stampColor: "#000000", isIconMode: false, slots: Array(16).fill(null), dones: Array(16).fill(false)
                };
            });

            const [isSearchOpen, setIsSearchOpen] = useState(false);
            const [activeIndex, setActiveIndex] = useState(null);
            const [results, setResults] = useState([]);

            const dynamicTextColor = getContrastColor(currentBoard.color);

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [currentBoard, results, isSearchOpen]);
            useEffect(() => {
                localStorage.setItem('sb_album', JSON.stringify(album));
                localStorage.setItem('sb_current', JSON.stringify(currentBoard));
            }, [album, currentBoard]);

            const fetchSearchResults = async (q) => {
                if (q.length < 2) return;
                try {
                    const resp = await fetch(`https://api.themoviedb.org/3/search/tv?api_key=${API_KEY}&query=${q}&language=ko-KR`);
                    const data = await resp.json();
                    const withOtt = await Promise.all((data.results || []).map(async (item) => {
                        const ottResp = await fetch(`https://api.themoviedb.org/3/tv/${item.id}/watch/providers?api_key=${API_KEY}`);
                        const ottData = await ottResp.json();
                        return { ...item, ott: ottData.results?.KR?.flatrate?.slice(0, 2).map(p => IMAGE_BASE + p.logo_path) || [] };
                    }));
                    setResults(withOtt);
                } catch (e) { console.error(e); }
            };

            const shareLink = () => {
                const dataToShare = { ...currentBoard, dones: Array(16).fill(false) };
                const encodedData = btoa(encodeURIComponent(JSON.stringify(dataToShare)));
                navigator.clipboard.writeText(`${window.location.origin}${window.location.pathname}?data=${encodedData}`)
                    .then(() => alert("공유 링크가 복사되었습니다!"));
            };

            const saveToAlbum = () => {
                setAlbum([...album.filter(b => b.id !== currentBoard.id), currentBoard]);
                alert("앨범에 저장 완료!");
            };

            return (
                <div className="max-w-4xl mx-auto p-6 flex flex-col items-center pb-40">
                    <header className="py-8 flex justify-between items-end w-full max-w-2xl border-b-4 border-black mb-12">
                        
                        </div>
                        <button onClick={() => setCurrentBoard({...currentBoard, id: Date.now(), title: "새로운 판", slots: Array(16).fill(null), dones: Array(16).fill(false)})} 
                                className="doodle-button bg-gray-100 px-4 py-2 text-xs font-bold border-2 border-black font-gaegu text-base">+ NEW BOARD</button>
                    </header>

                    <div className="flex flex-col md:flex-row gap-10 items-start justify-center w-full max-w-2xl">
                        {/* 정렬된 사이드 설정 바 */}
                        <div className="flex md:flex-col gap-6 order-2 md:order-1 w-full md:w-auto items-center md:items-start p-4 bg-gray-50 rounded-xl border-2 border-black/5">
                            <div className="flex flex-col items-center md:items-start gap-1">
                                <label className="text-[10px] font-bold uppercase text-gray-400">Board Color</label>
                                <div className="palette-box" style={{ backgroundColor: currentBoard.color }}>
                                    <input type="color" value={currentBoard.color} onChange={(e) => setCurrentBoard({...currentBoard, color: e.target.value})} />
                                </div>
                            </div>
                            
                            <div className="flex flex-col items-center md:items-start gap-1">
                                <label className="text-[10px] font-bold uppercase text-gray-400">Stamp Color</label>
                                <div className="palette-box" style={{ backgroundColor: currentBoard.stampColor }}>
                                    <input type="color" value={currentBoard.stampColor} onChange={(e) => setCurrentBoard({...currentBoard, stampColor: e.target.value})} />
                                </div>
                            </div>

                            <div className="flex flex-col items-center md:items-start gap-2">
                                <label className="text-[10px] font-bold uppercase text-gray-400">Stamp Style</label>
                                <div className="flex flex-row gap-3">
                                    <input 
                                        className="w-11 h-11 bg-white border-2 border-black rounded-lg text-center font-bold text-xl font-gaegu"
                                        style={{ color: currentBoard.stampColor }}
                                        value={currentBoard.isIconMode ? "" : currentBoard.stamp} 
                                        onChange={(e) => setCurrentBoard({...currentBoard, stamp: e.target.value.slice(-2), isIconMode: false})} 
                                    />
                                    <div className="grid grid-cols-4 gap-1 bg-white p-1 rounded-md border border-black/10">
                                        {ICON_SUGGESTIONS.map(item => (
                                            <button key={item.id} onClick={() => setCurrentBoard({...currentBoard, stamp: item.icon, isIconMode: true})} 
                                                    className={`w-7 h-7 flex items-center justify-center rounded transition-all ${currentBoard.isIconMode && currentBoard.stamp === item.icon ? 'bg-black text-white' : 'hover:bg-gray-100 text-gray-300'}`}>
                                                <i data-lucide={item.icon} className="w-4 h-4"></i>
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* 도장판 본체 */}
                        <div className="order-1 md:order-2 flex-grow w-full">
                            <div style={{ backgroundColor: currentBoard.color }} className="p-8 doodle-border border-[3px] border-black shadow-[8px_8px_0px_#000] rotate-[1deg]">
                                <input 
                                    className="bg-transparent text-5xl font-bold w-full text-center outline-none mb-6 border-b-2 border-black/10 focus:border-black/30 font-gaegu" 
                                    style={{ color: dynamicTextColor }}
                                    value={currentBoard.title}
                                    onChange={(e) => setCurrentBoard({...currentBoard, title: e.target.value})}
                                />
                                <div>
                            <h1 className="text-5xl font-bold italic rotate-[-2deg] font-gaegu leading-none">STAMP BREAK</h1>
                            <div className="mt-4 flex items-center gap-2 text-sm font-bold text-gray-500">
                                <span>Created by</span>
                                <input 
                                    className="bg-transparent border-b-2 border-dashed border-gray-400 focus:border-black w-32 px-1 text-black font-gaegu text-lg"
                                    value={currentBoard.author}
                                    onChange={(e) => setCurrentBoard({...currentBoard, author: e.target.value.toUpperCase()})}
                                />
                            </div>
                                <div className="grid grid-cols-4 gap-4">
                                    {currentBoard.slots.map((slot, i) => (
                                        <Slot 
                                            key={i} data={slot} isDone={currentBoard.dones[i]} 
                                            idx={i}
                                            stamp={currentBoard.stamp} stampColor={currentBoard.stampColor} isIconMode={currentBoard.isIconMode}
                                            onToggle={() => {
                                                const newDones = [...currentBoard.dones];
                                                newDones[i] = !newDones[i];
                                                setCurrentBoard({...currentBoard, dones: newDones});
                                            }}
                                            onSearch={() => { setActiveIndex(i); setIsSearchOpen(true); }}
                                        />
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="w-full max-w-2xl mt-16 flex flex-col gap-8">
                        <div className="grid grid-cols-2 gap-6">
                            <button onClick={saveToAlbum} className="doodle-button bg-white py-4 font-bold border-2 border-black font-gaegu text-xl">ALBUM SAVE</button>
                            <button onClick={shareLink} className="doodle-button bg-black text-white py-4 font-bold font-gaegu text-xl text-center">SHARE LINK</button>
                        </div>

                        <div className="bg-gray-100 p-6 doodle-border border-2 border-black">
                            <h2 className="text-xs font-bold uppercase tracking-widest mb-4">My Collections ({album.length})</h2>
                            <div className="flex gap-4 overflow-x-auto pb-2 custom-scrollbar">
                                {album.map(b => (
                                    <div key={b.id} onClick={() => setCurrentBoard(b)} className={`min-w-[120px] aspect-square bg-white border-2 border-black p-3 flex flex-col justify-between cursor-pointer transition-all ${currentBoard.id === b.id ? 'scale-105 shadow-[4px_4px_0px_#000]' : 'opacity-40 hover:opacity-100'}`}>
                                        <div className="text-[14px] font-bold leading-tight truncate font-gaegu">{b.title}</div>
                                        <div className="text-right font-gaegu text-2xl" style={{ color: b.stampColor }}>
                                            {b.isIconMode ? <i data-lucide={b.stamp} className="w-5 h-5 ml-auto"></i> : b.stamp}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    {isSearchOpen && (
                        <div className="fixed inset-0 bg-white/95 z-50 p-6 flex flex-col items-center backdrop-blur-sm">
                            <div className="w-full max-w-md">
                                <div className="flex justify-between items-center mb-8 font-gaegu text-4xl font-black"><span>SEARCH</span><button onClick={() => setIsSearchOpen(false)} className="text-4xl">&times;</button></div>
                                <input className="w-full bg-white p-4 border-4 border-black text-xl mb-8 font-bold doodle-border font-gaegu" placeholder="드라마를 입력해봐요..." onChange={(e) => fetchSearchResults(e.target.value)} autoFocus />
                                <div className="grid grid-cols-3 gap-4 overflow-y-auto max-h-[60vh] pr-2 custom-scrollbar">
                                    {results.map(d => (
                                        <div key={d.id} onClick={() => {
                                            const newSlots = [...currentBoard.slots];
                                            newSlots[activeIndex] = { title: d.name, poster: IMAGE_BASE + d.poster_path, ott: d.ott };
                                            setCurrentBoard({...currentBoard, slots: newSlots});
                                            setIsSearchOpen(false);
                                        }} className="cursor-pointer group text-center bg-white p-2 border-2 border-black doodle-border">
                                            <img src={IMAGE_BASE + d.poster_path} className="rounded-sm mb-2" />
                                            <p className="text-[12px] font-bold truncate font-gaegu">{d.name}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function Slot({ data, isDone, onToggle, onSearch, stamp, stampColor, isIconMode, idx }) {
            const randomRotate = [ -1.5, 1.2, -0.8, 1.5, -1.1, 0.9 ][idx % 6];
            
            return (
                <div onClick={() => data ? onToggle() : onSearch()} 
                     style={{ transform: `rotate(${randomRotate}deg)` }}
                     className="relative aspect-[3/4] bg-white border-2 border-black overflow-hidden cursor-pointer hover:scale-105 transition-transform shadow-[2px_2px_0px_#000]">
                    {data ? (
                        <>
                            <img src={data.poster} className={`w-full h-full object-cover transition-all duration-700 ${isDone ? 'grayscale-0 opacity-100' : 'grayscale opacity-25'}`} />
                            {!isDone && (
                                <div className="absolute inset-0 flex flex-col items-center justify-between p-2 text-center bg-white/10">
                                    <div className="text-[13px] font-bold leading-tight text-black line-clamp-3 font-gaegu pt-2">{data.title}</div>
                                    {/* 🔥 OTT 아이콘 다시 추가 */}
                                    <div className="flex gap-1 justify-center pb-2">
                                        {data.ott?.map((logoUrl, i) => (
                                            <img key={i} src={logoUrl} className="w-6 h-6 rounded shadow-md border border-black/10" />
                                        ))}
                                    </div>
                                </div>
                            )}
                            {isDone && (
                                <div className="absolute inset-0 flex items-center justify-center animate-stamp pointer-events-none">
                                    <div className="border-[4px] font-gaegu font-black text-4xl p-2 bg-white shadow-lg flex items-center justify-center min-w-[50px] min-h-[50px] rotate-[-10deg]"
                                         style={{ borderColor: stampColor, color: stampColor }}>
                                        {isIconMode ? <i data-lucide={stamp} className="w-8 h-8 stroke-[3px]"></i> : <span>{stamp}</span>}
                                    </div>
                                </div>
                            )}
                        </>
                    ) : <div className="h-full flex items-center justify-center text-gray-300 text-3xl">+</div>}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
