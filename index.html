<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도장격파 : Hand-drawn Edition</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #ffffff; color: #1a1a1a; font-family: 'Gaegu', cursive; -webkit-font-smoothing: antialiased; }
        .font-gaegu { font-family: 'Gaegu', cursive; }
        input:focus { outline: none; }
        
        /* 제목 잘림 방지를 위한 기본 스타일 보강 */
        .title-input { line-height: 1.4; padding-top: 10px; padding-bottom: 5px; }
        
        input[type=range] { -webkit-appearance: none; background: #e5e7eb; border-radius: 10px; height: 6px; border: 1px solid #1a1a1a; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; background: #1a1a1a; border-radius: 50%; cursor: pointer; border: 1px solid #000; }

        .hand-underline { position: relative; display: inline-block; font-weight: 700; }
        .hand-underline::after { content: ""; position: absolute; left: -5%; bottom: -2px; width: 110%; height: 10px; background: rgba(0, 0, 0, 0.1); border-radius: 50% 20% / 10% 80%; z-index: -1; }

        @keyframes stamp-bang {
            0% { transform: scale(5) rotate(-45deg); opacity: 0; }
            100% { transform: scale(1) rotate(-12deg); opacity: 1; }
        }
        .animate-stamp { animation: stamp-bang 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        
        .doodle-border { border: 2.5px solid #1a1a1a; border-radius: 255px 15px 225px 15px/15px 225px 15px 255px; }
        .doodle-button { border: 2px solid #1a1a1a; border-radius: 10px 20px 10px 25px/15px 10px 25px 12px; transition: all 0.2s; cursor: pointer; }
        
        .palette-box { border: 2px solid #1a1a1a; border-radius: 4px; overflow: hidden; position: relative; width: 100%; height: 40px; cursor: pointer; }
        .palette-box input[type="color"] { position: absolute; top: -10px; left: -10px; width: 200%; height: 200%; cursor: pointer; opacity: 0; }

        .custom-scrollbar::-webkit-scrollbar { height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1a1a1a; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const API_KEY = "291299eef434b2f459b25d72c4c667a1"; 
        const IMAGE_BASE = "https://image.tmdb.org/t/p/w500";
        const getCORSImageUrl = (url) => url ? `${url}?t=${new Date().getTime()}` : null;

        const ICON_SUGGESTIONS = [
            { id: 'check', icon: 'check' }, { id: 'heart', icon: 'heart' },
            { id: 'star', icon: 'star' }, { id: 'award', icon: 'award' },
            { id: 'zap', icon: 'zap' }, { id: 'flag', icon: 'flag' },
            { id: 'smile', icon: 'smile' }, { id: 'circle', icon: 'circle' }
        ];

        const getContrastColor = (hex) => {
            if(!hex) return "#1a1a1a";
            const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
            return ((r * 299) + (g * 587) + (b * 114)) / 1000 >= 128 ? "#1a1a1a" : "#ffffff";
        };

        function App() {
            const boardRef = useRef(null);
            const [album, setAlbum] = useState(() => JSON.parse(localStorage.getItem('sb_album') || '[]'));
            const [currentBoard, setCurrentBoard] = useState(() => {
                const params = new URLSearchParams(window.location.search);
                const sharedData = params.get('data');
                if (sharedData) {
                    try { 
                        const parsed = JSON.parse(decodeURIComponent(atob(sharedData)));
                        return { ...parsed, id: Date.now() };
                    } catch(e) { console.error(e); }
                }
                return {
                    id: Date.now(), title: "나의 정복 리스트", author: "YOUR NAME", color: "#fefefe", 
                    stamp: "完", stampColor: "#e11d48", isIconMode: false, slots: Array(16).fill(null), dones: Array(16).fill(false)
                };
            });

            const [isSearchOpen, setIsSearchOpen] = useState(false);
            const [activeIndex, setActiveIndex] = useState(null);
            const [results, setResults] = useState([]);

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [currentBoard, results, isSearchOpen, album]);
            useEffect(() => { localStorage.setItem('sb_album', JSON.stringify(album)); }, [album]);

            const exportAsImage = async () => {
                if (!boardRef.current) return;
                try {
                    await document.fonts.ready;
                    const element = boardRef.current;
                    const options = {
                        useCORS: true,
                        allowTaint: false,
                        scale: 2,
                        backgroundColor: "#ffffff",
                        windowWidth: 1400, // 윈도우 폭 넉넉히 조정
                        windowHeight: 1400,
                        onclone: (clonedDoc) => {
                            const clonedBoard = clonedDoc.querySelector('.board-to-export');
                            if (!clonedBoard) return;
                            
                            clonedDoc.querySelectorAll('.delete-btn').forEach(btn => btn.style.display = 'none');
                            
                            const parent = clonedBoard.parentElement;
                            parent.style.padding = "80px"; // 전체 여백 증폭
                            parent.style.display = "inline-block";
                            parent.style.backgroundColor = "#ffffff";
                            
                            clonedBoard.style.transform = "none"; 
                            clonedBoard.style.margin = "0 auto";
                            clonedBoard.style.boxShadow = "8px 8px 0px #000";

                            // 제목/텍스트 잘림 및 간격 수정 로직
                            clonedDoc.querySelectorAll('input, div, p, span').forEach(el => {
                                el.style.fontFamily = "'Gaegu', cursive";
                                el.style.letterSpacing = "0.5px"; // 자간 미세 확대
                                el.style.lineHeight = "1.5";    // 행간 확보
                                
                                // 제목 입력창 상단 패딩 강제 부여 (잘림 방지)
                                if (el.classList.contains('title-input')) {
                                    el.style.paddingTop = "25px"; 
                                    el.style.display = "block";
                                }
                            });

                            // 슬롯 내 아이콘/텍스트 간격(gap) 강제 고정
                            clonedDoc.querySelectorAll('.slot-info').forEach(info => {
                                info.style.gap = "8px"; // 웹보다 좁아지는 현상 방지
                            });
                        }
                    };
                    const canvas = await html2canvas(element, options);
                    const link = document.createElement("a");
                    link.href = canvas.toDataURL("image/png", 1.0);
                    link.download = `${currentBoard.title}.png`;
                    link.click();
                } catch (err) { console.error(err); }
            };

            const fetchSearchResults = async (q) => {
                if (q.length < 2) return;
                try {
                    const resp = await fetch(`https://api.themoviedb.org/3/search/tv?api_key=${API_KEY}&query=${q}&language=ko-KR`);
                    const data = await resp.json();
                    const withOtt = await Promise.all((data.results || []).map(async (item) => {
                        const ottResp = await fetch(`https://api.themoviedb.org/3/tv/${item.id}/watch/providers?api_key=${API_KEY}`);
                        const ottData = await ottResp.json();
                        return { ...item, ott: ottData.results?.KR?.flatrate?.slice(0, 2).map(p => IMAGE_BASE + p.logo_path) || [] };
                    }));
                    setResults(withOtt);
                } catch (e) { console.error(e); }
            };

            const saveToAlbum = () => {
                const newAlbum = [...album.filter(b => b.id !== currentBoard.id), { ...currentBoard, id: Date.now() }];
                setAlbum(newAlbum);
                alert("앨범에 저장되었습니다!");
            };

            return (
                <div className="max-w-5xl mx-auto p-6 flex flex-col items-center pb-40">
                    <header className="py-8 flex justify-between items-end w-full max-w-2xl mb-12">
                        <h1 className="text-6xl font-black italic rotate-[-2deg] font-gaegu leading-none">
                            <span className="hand-underline">STAMP BREAK</span>
                        </h1>
                        <button onClick={() => setCurrentBoard({...currentBoard, id: Date.now(), title: "나의 정복 리스트", author: "YOUR NAME", slots: Array(16).fill(null), dones: Array(16).fill(false)})} className="doodle-button bg-gray-100 px-4 py-2 font-bold font-gaegu">+ NEW</button>
                    </header>

                    <div className="flex flex-col md:flex-row gap-10 items-start justify-center w-full">
                        <div className="flex flex-col gap-6 order-2 md:order-1 w-full md:w-64 p-6 bg-gray-50 rounded-xl border-2 border-black/5">
                            <div className="flex flex-col gap-2">
                                <label className="text-xs font-bold text-gray-400 flex justify-between uppercase"><span>Slot Count</span><span className="text-black">{currentBoard.slots.length}</span></label>
                                <input type="range" min="9" max="25" value={currentBoard.slots.length} onChange={(e) => {
                                    const newCount = parseInt(e.target.value);
                                    let newSlots = [...currentBoard.slots];
                                    let newDones = [...currentBoard.dones];
                                    if (newCount > currentBoard.slots.length) {
                                        const diff = newCount - currentBoard.slots.length;
                                        newSlots = [...newSlots, ...Array(diff).fill(null)];
                                        newDones = [...newDones, ...Array(diff).fill(false)];
                                    } else {
                                        newSlots = newSlots.slice(0, newCount);
                                        newDones = newDones.slice(0, newCount);
                                    }
                                    setCurrentBoard({...currentBoard, slots: newSlots, dones: newDones});
                                }} />
                            </div>
                            <div className="flex gap-4">
                                <div className="flex-1">
                                    <label className="text-xs font-bold text-gray-400 uppercase">Board</label>
                                    <div className="palette-box" style={{ backgroundColor: currentBoard.color }}><input type="color" value={currentBoard.color} onChange={(e) => setCurrentBoard(prev => ({...prev, color: e.target.value}))} /></div>
                                </div>
                                <div className="flex-1">
                                    <label className="text-xs font-bold text-gray-400 uppercase">Stamp</label>
                                    <div className="palette-box" style={{ backgroundColor: currentBoard.stampColor }}><input type="color" value={currentBoard.stampColor} onChange={(e) => setCurrentBoard(prev => ({...prev, stampColor: e.target.value}))} /></div>
                                </div>
                            </div>
                            <div className="flex flex-col gap-2">
                                <label className="text-xs font-bold text-gray-400 uppercase">Stamp Style</label>
                                <div className="flex gap-2">
                                    <input className="w-12 h-10 bg-white border-2 border-black rounded-lg text-center font-bold text-xl font-gaegu" value={currentBoard.isIconMode ? "" : currentBoard.stamp} onChange={(e) => setCurrentBoard({...currentBoard, stamp: e.target.value.slice(-2), isIconMode: false})} />
                                    <div className="grid grid-cols-4 gap-0.5 bg-white p-1 rounded-md border border-black/10 flex-grow">
                                        {ICON_SUGGESTIONS.map(item => (
                                            <button key={item.id} onClick={() => setCurrentBoard({...currentBoard, stamp: item.icon, isIconMode: true})} className={`w-7 h-7 flex items-center justify-center rounded ${currentBoard.isIconMode && currentBoard.stamp === item.icon ? 'bg-black text-white' : 'text-gray-300'}`}><i data-lucide={item.icon} className="w-3.5 h-3.5"></i></button>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div className="order-1 md:order-2 flex-grow w-full max-w-3xl overflow-visible" ref={boardRef}>
                            <div style={{ backgroundColor: currentBoard.color }} className="board-to-export p-8 md:p-12 doodle-border border-[3px] border-black shadow-[8px_8px_0px_#000] rotate-[0.5deg] overflow-visible">
                                <div className="py-4 mb-2">
                                    <input className="title-input bg-transparent text-5xl font-bold w-full text-center outline-none border-b-2 border-black/10 focus:border-black/30 font-gaegu" style={{ color: getContrastColor(currentBoard.color) }} value={currentBoard.title} onChange={(e) => setCurrentBoard({...currentBoard, title: e.target.value})} />
                                </div>
                                <div className="flex items-center justify-center gap-2 text-sm font-bold opacity-60 mb-8">
                                    <span style={{ color: getContrastColor(currentBoard.color) }}>Created by</span>
                                    <input className="bg-transparent border-b border-dashed border-black/30 w-24 text-center font-gaegu text-lg" style={{ color: getContrastColor(currentBoard.color) }} value={currentBoard.author} onChange={(e) => setCurrentBoard({...currentBoard, author: e.target.value.toUpperCase()})} />
                                </div>
                                <div className={`grid gap-4 ${currentBoard.slots.length <= 11 ? 'grid-cols-3' : currentBoard.slots.length <= 20 ? 'grid-cols-4' : 'grid-cols-5'}`}>
                                    {currentBoard.slots.map((slot, i) => (
                                        <Slot key={i} data={slot} isDone={currentBoard.dones[i]} idx={i} stamp={currentBoard.stamp} stampColor={currentBoard.stampColor} isIconMode={currentBoard.isIconMode} onToggle={() => { const newDones = [...currentBoard.dones]; newDones[i] = !newDones[i]; setCurrentBoard({...currentBoard, dones: newDones}); }} onSearch={() => { setActiveIndex(i); setIsSearchOpen(true); }} onClear={(e) => { e.stopPropagation(); const newSlots = [...currentBoard.slots]; newSlots[i] = null; setCurrentBoard({...currentBoard, slots: newSlots}); }} />
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="w-full max-w-2xl mt-16 flex flex-col gap-10">
                        <div className="grid grid-cols-3 gap-4">
                            <button onClick={saveToAlbum} className="doodle-button bg-white py-4 font-bold font-gaegu text-xl shadow-[4px_4px_0px_#000]">ALBUM SAVE</button>
                            <button onClick={exportAsImage} className="doodle-button bg-yellow-300 py-4 font-bold font-gaegu text-xl shadow-[4px_4px_0px_#000]">DOWNLOAD IMAGE</button>
                            <button onClick={() => {
                                const dataToShare = { title: currentBoard.title, author: currentBoard.author, color: currentBoard.color, stamp: currentBoard.stamp, stampColor: currentBoard.stampColor, isIconMode: currentBoard.isIconMode, slots: currentBoard.slots };
                                navigator.clipboard.writeText(`${window.location.origin}${window.location.pathname}?data=${btoa(encodeURIComponent(JSON.stringify(dataToShare)))}`).then(() => alert("링크 복사 완료!"));
                            }} className="doodle-button bg-black text-white py-4 font-bold font-gaegu text-xl shadow-[4px_4px_0px_#000]">SHARE LINK</button>
                        </div>

                        {album.length > 0 && (
                            <div className="bg-gray-100 p-6 doodle-border border-2 border-black">
                                <h2 className="text-xs font-bold uppercase tracking-widest mb-4 text-left">My Collections ({album.length})</h2>
                                <div className="flex gap-4 overflow-x-auto pb-4 custom-scrollbar">
                                    {album.map(b => (
                                        <div key={b.id} onClick={() => setCurrentBoard(b)} className={`relative min-w-[120px] aspect-square bg-white border-2 border-black p-3 flex flex-col cursor-pointer transition-all ${currentBoard.id === b.id ? 'scale-105 shadow-[4px_4px_0px_#000]' : 'opacity-50 hover:opacity-100'}`}>
                                            <button onClick={(e) => { e.stopPropagation(); setAlbum(album.filter(item => item.id !== b.id)); }} className="absolute top-1 right-1 w-5 h-5 bg-black text-white rounded-full flex items-center justify-center text-[10px]">×</button>
                                            <div className="flex-grow flex items-center justify-center">
                                                <div className="font-gaegu text-2xl" style={{ color: b.stampColor }}>{b.isIconMode ? <i data-lucide={b.stamp} className="w-8 h-8"></i> : b.stamp}</div>
                                            </div>
                                            <div className="text-[14px] font-bold truncate font-gaegu text-center border-t border-black/5 pt-1">{b.title}</div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>

                    {isSearchOpen && (
                        <div className="fixed inset-0 bg-white/95 z-50 p-6 flex flex-col items-center backdrop-blur-sm">
                            <div className="w-full max-w-md">
                                <div className="flex justify-between items-center mb-8 font-gaegu text-4xl font-black"><span>SEARCH</span><button onClick={() => setIsSearchOpen(false)} className="text-4xl">&times;</button></div>
                                <input className="w-full bg-white p-4 border-4 border-black text-xl mb-8 font-bold doodle-border font-gaegu" placeholder="드라마 제목 입력..." onChange={(e) => fetchSearchResults(e.target.value)} autoFocus />
                                <div className="grid grid-cols-3 gap-4 overflow-y-auto max-h-[60vh] pr-2 custom-scrollbar">
                                    {results.map(d => (
                                        <div key={d.id} onClick={() => { const newSlots = [...currentBoard.slots]; newSlots[activeIndex] = { title: d.name, poster: IMAGE_BASE + d.poster_path, ott: d.ott }; setCurrentBoard({...currentBoard, slots: newSlots}); setIsSearchOpen(false); }} className="cursor-pointer text-center bg-white p-1 border-2 border-black doodle-border hover:shadow-[3px_3px_0px_#000] transition-all">
                                            <img src={getCORSImageUrl(IMAGE_BASE + d.poster_path)} crossOrigin="anonymous" className="w-full aspect-[2/3] object-cover mb-1" />
                                            <p className="text-[14px] font-bold font-gaegu line-clamp-1">{d.name}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function Slot({ data, isDone, onToggle, onSearch, onClear, stamp, stampColor, isIconMode, idx }) {
            const randomRotate = [ -1.5, 1.2, -0.8, 1.5, -1.1, 0.9 ][idx % 6];
            return (
                <div onClick={() => data ? onToggle() : onSearch()} style={{ transform: `rotate(${randomRotate}deg)` }} className="relative aspect-[3/4] bg-white border-2 border-black overflow-hidden cursor-pointer shadow-[2px_2px_0px_#000]">
                    {data ? (
                        <>
                            <button onClick={onClear} className="delete-btn absolute top-1 right-1 w-5 h-5 bg-black text-white rounded-full flex items-center justify-center text-[10px] z-20 hover:bg-red-500">×</button>
                            <img src={getCORSImageUrl(data.poster)} crossOrigin="anonymous" className={`w-full h-full object-cover transition-all ${isDone ? 'opacity-100 grayscale-0' : 'opacity-20 grayscale'}`} />
                            {!isDone && (
                                <div className="slot-info absolute inset-0 flex flex-col items-center justify-center p-2 text-center bg-white/10">
                                    <div className="text-[15px] font-bold text-black font-gaegu leading-tight mb-1">{data.title}</div>
                                    <div className="flex gap-1.5">{data.ott?.map((logo, i) => <img key={i} src={getCORSImageUrl(logo)} crossOrigin="anonymous" className="w-4 h-4 rounded-sm" />)}</div>
                                </div>
                            )}
                            {isDone && (
                                <div className="absolute inset-0 flex items-center justify-center animate-stamp pointer-events-none">
                                    <div className="border-[3px] bg-white shadow-md flex items-center justify-center min-w-[50px] min-h-[50px] rotate-[-10deg] p-1" style={{ borderColor: stampColor }}>
                                        <div className="flex items-center justify-center w-full h-full font-gaegu font-black text-3xl" style={{ color: stampColor }}>
                                            {isIconMode ? <i data-lucide={stamp} className="w-8 h-8 stroke-[3.5px]"></i> : <span>{stamp}</span>}
                                        </div>
                                    </div>
                                </div>
                            )}
                        </>
                    ) : <div className="h-full flex items-center justify-center text-gray-200 text-3xl font-gaegu">+</div>}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
