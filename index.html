<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도장격파 : Stamp Break Share</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0a0a0a; color: white; font-family: 'Noto Sans KR', sans-serif; overflow-x: hidden; }
        .font-serif { font-family: 'Noto Serif KR', serif; }
        input:focus { outline: none; }
        .title-input { background: transparent; border: none; text-align: center; width: 100%; }
        .color-dot { width: 32px; height: 32px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); cursor: pointer; position: relative; overflow: hidden; }
        .color-dot input[type="color"] { position: absolute; top: -5px; left: -5px; width: 50px; height: 50px; cursor: pointer; opacity: 0; }
        .grid-bg { background-image: radial-gradient(circle, #222 1px, transparent 1px); background-size: 20px 20px; }
    </style>
</head>
<body class="grid-bg">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const API_KEY = "291299eef434b2f459b25d72c4c667a1"; 
        const IMAGE_BASE = "https://image.tmdb.org/t/p/w500";

        // 배경색에 따라 텍스트 색상(검정/하양) 결정하는 함수
        const getContrastColor = (hexcolor) => {
            if (!hexcolor) return "#dc2626"; // 기본 레드
            const r = parseInt(hexcolor.slice(1, 3), 16);
            const g = parseInt(hexcolor.slice(3, 5), 16);
            const b = parseInt(hexcolor.slice(5, 7), 16);
            const yiq = ((r * 299) + (g * 587) + (b * 114)) / 1000;
            return (yiq >= 128) ? "#1a1a1a" : "#ffffff"; // 밝으면 검정, 어두우면 하양
        };

        function App() {
            // URL 파라미터에서 초기값 읽어오기 (공유 기능)
            const params = new URLSearchParams(window.location.search);
            const initialTitle = params.get('t') || "나의 필모 정복기";
            const initialColor = params.get('c') || "#121212";
            const initialStamp = params.get('s') || "完";

            const [slots, setSlots] = useState(Array(16).fill(null));
            const [boardTitle, setBoardTitle] = useState(initialTitle);
            const [boardColor, setBoardColor] = useState(initialColor);
            const [currentStamp, setCurrentStamp] = useState(initialStamp);
            const [isSearchOpen, setIsSearchOpen] = useState(false);
            const [activeIndex, setActiveIndex] = useState(null);
            const [query, setQuery] = useState("");
            const [results, setResults] = useState([]);
            const boardRef = useRef(null);

            const stampColor = getContrastColor(boardColor);

            useEffect(() => {
                if (query.length < 2) return;
                const delay = setTimeout(async () => {
                    const resp = await fetch(`https://api.themoviedb.org/3/search/tv?api_key=${API_KEY}&query=${query}&language=ko-KR`);
                    const data = await resp.json();
                    setSearchResults(data.results || []);
                }, 500);
                return () => clearTimeout(delay);
            }, [query]);

            const shareLink = () => {
                const url = new URL(window.location.href);
                url.searchParams.set('t', boardTitle);
                url.searchParams.set('c', boardColor);
                url.searchParams.set('s', currentStamp);
                
                navigator.clipboard.writeText(url.toString()).then(() => {
                    alert("공유 링크가 복사되었습니다! 친구에게 보내보세요.");
                });
            };

            const downloadImage = async () => {
                const canvas = await html2canvas(boardRef.current, { backgroundColor: null, scale: 2, useCORS: true });
                const link = document.createElement('a');
                link.download = `${boardTitle}.png`;
                link.href = canvas.toDataURL();
                link.click();
            };

            return (
                <div className="max-w-md mx-auto p-4 min-h-screen flex flex-col items-center pb-40">
                    <header className="py-6 text-center">
                        <h1 className="text-3xl font-serif font-black text-red-600 tracking-tighter drop-shadow-lg">STAMP BREAK</h1>
                    </header>

                    {/* 도장판 (이 박스 색상만 변함) */}
                    <div ref={boardRef} style={{ backgroundColor: boardColor }} className="p-6 rounded-xl shadow-[0_20px_50px_rgba(0,0,0,0.5)] border border-white/10 w-full transition-colors duration-700">
                        <div className="flex flex-col items-center mb-6 border-b border-white/10 pb-4">
                            <input 
                                type="text"
                                value={boardTitle}
                                onChange={(e) => setBoardTitle(e.target.value)}
                                style={{ color: stampColor === "#ffffff" ? "#fff" : "#000" }}
                                className="title-input text-2xl font-serif font-black opacity-90"
                            />
                            <div style={{ color: stampColor === "#ffffff" ? "#dc2626" : stampColor }} className="font-serif font-bold text-xl mt-1 opacity-80">{currentStamp}</div>
                        </div>

                        <div className="grid grid-cols-4 gap-2">
                            {slots.map((slot, i) => (
                                <Slot 
                                    key={i} 
                                    data={slot} 
                                    stampText={currentStamp} 
                                    boardColor={boardColor}
                                    stampColor={stampColor}
                                    onClick={() => { setActiveIndex(i); setIsSearchOpen(true); }} 
                                />
                            ))}
                        </div>
                    </div>

                    {/* 하단 커스텀 툴바 */}
                    <div className="fixed bottom-0 left-0 right-0 bg-zinc-900/90 backdrop-blur-xl border-t border-white/10 p-5 z-40">
                        <div className="max-w-md mx-auto space-y-5">
                            <div className="flex justify-between items-center">
                                <div className="flex items-center gap-3">
                                    <div className="color-dot border-2 border-white/20 shadow-inner" style={{ backgroundColor: boardColor }}>
                                        <input type="color" value={boardColor} onChange={(e) => setBoardColor(e.target.value)} />
                                    </div>
                                    <span className="text-[10px] font-mono text-zinc-500 uppercase tracking-widest font-bold">Pick Color</span>
                                </div>
                                <div className="flex gap-2">
                                    {['完', '愛', '賞', '★'].map(s => (
                                        <button key={s} onClick={() => setCurrentStamp(s)} className={`w-8 h-8 font-serif ${currentStamp === s ? 'text-red-500 font-bold scale-110' : 'text-zinc-500'}`}>{s}</button>
                                    ))}
                                </div>
                            </div>
                            <div className="grid grid-cols-2 gap-3">
                                <button onClick={shareLink} className="bg-zinc-800 hover:bg-zinc-700 py-3 rounded-lg font-bold text-xs flex items-center justify-center gap-2 border border-white/5 transition-all">
                                    🔗 링크 공유하기
                                </button>
                                <button onClick={downloadImage} className="bg-red-700 hover:bg-red-600 py-3 rounded-lg font-bold text-xs flex items-center justify-center gap-2 shadow-lg shadow-red-900/20 transition-all">
                                    💾 이미지 저장
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* 검색창 (생략 없이 동일) */}
                    {isSearchOpen && (
                        <div className="fixed inset-0 bg-black/95 z-50 p-6 flex flex-col animate-in slide-in-from-bottom duration-300">
                            <div className="flex justify-between items-center mb-6 text-red-600 font-serif font-bold text-xl">
                                <span>작품 검색</span>
                                <button onClick={() => setIsSearchOpen(false)} className="text-3xl text-zinc-600">&times;</button>
                            </div>
                            <input autoFocus className="w-full bg-zinc-900 p-4 rounded-xl border border-zinc-800 mb-6" placeholder="드라마 제목..." onChange={(e) => setQuery(e.target.value)} />
                            <div className="grid grid-cols-3 gap-3 overflow-y-auto pb-20">
                                {results.map(d => (
                                    <div key={d.id} onClick={() => {
                                        const n = [...slots]; n[activeIndex] = { title: d.name, poster: d.poster_path ? IMAGE_BASE + d.poster_path : 'https://via.placeholder.com/300x400' };
                                        setSlots(n); setIsSearchOpen(false);
                                    }} className="cursor-pointer">
                                        <img src={IMAGE_BASE + d.poster_path} className="rounded shadow-lg" />
                                        <p className="text-[10px] mt-2 text-center truncate text-zinc-500">{d.name}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function Slot({ data, onClick, stampText, stampColor, boardColor }) {
            const [done, setDone] = useState(false);
            const isBright = getContrastColor(boardColor) === "#1a1a1a";
            
            return (
                <div onClick={() => data ? setDone(!done) : onClick()} className="relative aspect-[3/4] bg-black/20 rounded-lg overflow-hidden border border-white/5 cursor-pointer">
                    {data ? (
                        <>
                            <img src={data.poster} className={`w-full h-full object-cover transition-all duration-500 ${done ? 'grayscale-0 scale-105' : 'grayscale brightness-50'}`} />
                            {done && (
                                <div className="absolute inset-0 flex items-center justify-center animate-in zoom-in duration-200">
                                    <div 
                                        style={{ 
                                            borderColor: isBright ? '#1a1a1a' : '#dc2626', 
                                            color: isBright ? '#1a1a1a' : '#dc2626',
                                            backgroundColor: isBright ? 'rgba(0,0,0,0.1)' : 'rgba(255,255,255,0.1)'
                                        }} 
                                        className="border-2 font-serif font-black text-2xl p-1 rotate-[-15deg] backdrop-blur-[1px]"
                                    >
                                        {stampText}
                                    </div>
                                </div>
                            )}
                        </>
                    ) : <div className="h-full flex items-center justify-center text-white/5 text-xl">+</div>}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
