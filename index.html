<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STAMP BREAK : 프로 에디션</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #ffffff; color: #1a1a1a; font-family: 'Gaegu', cursive; overflow-x: hidden; }
        .font-gaegu { font-family: 'Gaegu', cursive; }
        input:focus { outline: none; }
        
        @keyframes stamp-bang {
            0% { transform: scale(3) rotate(0deg); opacity: 0; }
            100% { transform: scale(1) rotate(-12deg); opacity: 0.9; }
        }
        .animate-stamp { animation: stamp-bang 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        
        .doodle-border { border: 2.5px solid #1a1a1a; border-radius: 255px 15px 225px 15px/15px 225px 15px 255px; }
        .doodle-button { border: 2px solid #1a1a1a; border-radius: 10px 20px 10px 25px/15px 10px 25px 12px; transition: all 0.2s; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        
        /* 검정색 슬라이더 */
        input[type=range] { -webkit-appearance: none; background: transparent; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 6px; background: #1a1a1a; border-radius: 3px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 18px; width: 18px; border-radius: 50%; background: #ffffff; border: 3px solid #1a1a1a; margin-top: -6px; cursor: pointer; }

        .ott-badge { width: 18px; height: 18px; background: white; border-radius: 4px; padding: 1px; border: 1px solid rgba(0,0,0,0.1); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1a1a1a; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const TMDB_KEY = "YOUR_TMDB_API_KEY"; // 여기에 본인의 API KEY를 넣으세요
        const IMAGE_BASE = "https://image.tmdb.org/t/p/w500";
        const STAMP_SOUND = new Audio("https://assets.mixkit.co/active_storage/sfx/2005/2005-preview.mp3");

        function App() {
            const [album, setAlbum] = useState(() => JSON.parse(localStorage.getItem('sb_album') || '[]'));
            const [viewerMode, setViewerMode] = useState(false);
            const [otherBoards, setOtherBoards] = useState([]); 
            const [isSearchOpen, setIsSearchOpen] = useState(false);
            const [activeIndex, setActiveIndex] = useState(null);
            const [results, setResults] = useState([]);
            const [manualAdd, setManualAdd] = useState(false);
            const [manualData, setManualData] = useState({ title: '', poster: '' });

            const [currentBoard, setCurrentBoard] = useState({
                id: Date.now(), title: "나의 정복 리스트", author: "USER", color: "#fefefe", 
                stamp: "完", stampColor: "#e11d48", isIconMode: false, slots: Array(16).fill(null), dones: Array(16).fill(false)
            });

            // 실제 참여자 수 계산 (앨범 개수 + 외부 유입 시뮬레이션)
            const realParticipantCount = useMemo(() => album.length + otherBoards.length + 1, [album, otherBoards]);

            useEffect(() => { localStorage.setItem('sb_album', JSON.stringify(album)); }, [album]);

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const data = params.get('data');
                if (data) {
                    try {
                        const parsed = JSON.parse(decodeURIComponent(atob(data)));
                        const newBoard = { ...parsed, id: Date.now(), dones: Array(parsed.slots.length).fill(false) };
                        setCurrentBoard(newBoard);
                        setOtherBoards([newBoard]);
                    } catch(e) { console.error(e); }
                }
            }, []);

            const textColor = useMemo(() => {
                const hex = currentBoard.color;
                const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
                return ((r * 299) + (g * 587) + (b * 114)) / 1000 >= 128 ? "#1a1a1a" : "#ffffff";
            }, [currentBoard.color]);

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [currentBoard, viewerMode, album, isSearchOpen, manualAdd]);

            const fetchSearchResults = async (q) => {
                if (q.length < 2) return;
                try {
                    const resp = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${TMDB_KEY}&query=${encodeURIComponent(q)}&language=ko-KR`);
                    const data = await resp.json();
                    setResults(data.results || []);
                } catch (e) { console.error(e); }
            };

            const getOTTProviders = async (id, type) => {
                try {
                    const resp = await fetch(`https://api.themoviedb.org/3/${type}/${id}/watch/providers?api_key=${TMDB_KEY}`);
                    const data = await resp.json();
                    const providers = data.results?.KR?.flatrate || [];
                    return providers.map(p => `https://image.tmdb.org/t/p/original${p.logo_path}`);
                } catch (e) { return []; }
            };

            const handleSelectContent = async (d) => {
                const ottLogos = await getOTTProviders(d.id, d.media_type);
                const newSlots = [...currentBoard.slots];
                newSlots[activeIndex] = { 
                    title: d.name || d.title, 
                    poster: d.poster_path ? IMAGE_BASE + d.poster_path : '', 
                    otts: ottLogos 
                };
                setCurrentBoard({...currentBoard, slots: newSlots});
                setIsSearchOpen(false);
            };

            const handleManualSave = () => {
                const newSlots = [...currentBoard.slots];
                newSlots[activeIndex] = { ...manualData, otts: [] };
                setCurrentBoard({...currentBoard, slots: newSlots});
                setManualAdd(false);
                setIsSearchOpen(false);
                setManualData({ title: '', poster: '' });
            };

            return (
                <div className="max-w-4xl mx-auto p-6 flex flex-col items-center pb-32 relative">
                    <header className="py-8 flex justify-between items-center w-full mb-4">
                        <h1 className="text-4xl font-black italic font-gaegu tracking-tighter">STAMP BREAK</h1>
                        <button onClick={() => setViewerMode(!viewerMode)} className={`doodle-button px-4 py-2 font-bold font-gaegu shadow-[2px_2px_0px_#000] transition-all ${viewerMode ? 'bg-yellow-300' : 'bg-white grayscale opacity-50'}`}>
                            {viewerMode ? '👁️ VIEWER ON' : '👁️ VIEWER OFF'}
                        </button>
                    </header>

                    {viewerMode && otherBoards.length > 0 && (
                        <div className="fixed inset-y-0 left-0 right-0 pointer-events-none flex justify-between items-center px-4 z-50">
                            <button className="pointer-events-auto p-4 bg-white border-2 border-black rounded-full shadow-[4px_4px_0px_#000]"><i data-lucide="chevron-left"></i></button>
                            <button className="pointer-events-auto p-4 bg-white border-2 border-black rounded-full shadow-[4px_4px_0px_#000]"><i data-lucide="chevron-right"></i></button>
                        </div>
                    )}

                    <main className={`w-full transition-all duration-500 ${viewerMode ? 'scale-95' : 'scale-100'}`}>
                        {viewerMode && (
                            <div className="text-center mb-6 font-gaegu text-xl font-bold animate-bounce">
                                현재 <span className="underline decoration-yellow-400">{realParticipantCount}명</span>이 함께 도전 중!
                            </div>
                        )}

                        <div style={{ backgroundColor: currentBoard.color }} className="p-6 md:p-12 doodle-border border-[3px] border-black shadow-[12px_12px_0px_#000] relative">
                            <div className="mb-14 flex flex-col items-center">
                                <input className="bg-transparent text-5xl md:text-7xl font-bold w-full text-center outline-none font-gaegu pb-4" style={{ color: textColor }} value={currentBoard.title} onChange={(e) => setCurrentBoard({...currentBoard, title: e.target.value})} />
                                <div className="flex items-center text-xl font-bold opacity-70 mt-4 font-gaegu" style={{ color: textColor }}>
                                    <span className="mr-2">By</span>
                                    <input className="bg-transparent border-b border-dashed border-current w-32 text-center" value={currentBoard.author} onChange={(e) => setCurrentBoard({...currentBoard, author: e.target.value})} />
                                </div>
                            </div>
                            
                            <div className="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 gap-4">
                                {currentBoard.slots.map((slot, i) => (
                                    <Slot key={i} data={slot} isDone={currentBoard.dones[i]} idx={i} stamp={currentBoard.stamp} stampColor={currentBoard.stampColor} isIconMode={currentBoard.isIconMode} 
                                        onToggle={() => {
                                            const newDones = [...currentBoard.dones];
                                            newDones[i] = !newDones[i];
                                            if (newDones[i]) { STAMP_SOUND.currentTime = 0; STAMP_SOUND.play().catch(()=>{}); }
                                            setCurrentBoard({...currentBoard, dones: newDones});
                                        }} 
                                        onSearch={() => { setActiveIndex(i); setIsSearchOpen(true); }}
                                        onClear={() => { const newSlots = [...currentBoard.slots]; newSlots[i] = null; setCurrentBoard({...currentBoard, slots: newSlots}); }} 
                                    />
                                ))}
                            </div>
                        </div>
                    </main>

                    {/* 설정 사이드바 (Bottom Bar 스타일) */}
                    <section className="w-full mt-10 p-8 bg-gray-50 rounded-3xl border-2 border-black/10 grid grid-cols-1 md:grid-cols-3 gap-8">
                        <div className="flex flex-col gap-3">
                            <label className="text-xs font-bold uppercase text-gray-400 font-gaegu">1. 슬롯 개수 조절 ({currentBoard.slots.length})</label>
                            <input type="range" min="9" max="25" value={currentBoard.slots.length} onChange={(e) => {
                                const n = parseInt(e.target.value);
                                let s = currentBoard.slots.slice(0, n);
                                let d = currentBoard.dones.slice(0, n);
                                if(n > currentBoard.slots.length) {
                                    const diff = n - currentBoard.slots.length;
                                    s = [...s, ...Array(diff).fill(null)]; d = [...d, ...Array(diff).fill(false)];
                                }
                                setCurrentBoard({...currentBoard, slots: s, dones: d});
                            }} />
                        </div>
                        <div className="flex flex-col gap-3">
                            <label className="text-xs font-bold uppercase text-gray-400 font-gaegu">2. 배경 및 도장 색상</label>
                            <div className="flex gap-4">
                                <div className="flex flex-col items-center gap-1">
                                    <div className="w-8 h-8 rounded border border-black overflow-hidden relative" style={{ backgroundColor: currentBoard.color }}><input type="color" className="absolute inset-0 opacity-0 cursor-pointer" value={currentBoard.color} onChange={(e) => setCurrentBoard({...currentBoard, color: e.target.value})} /></div>
                                    <span className="text-[10px]">배경</span>
                                </div>
                                <div className="flex flex-col items-center gap-1">
                                    <div className="w-8 h-8 rounded border border-black overflow-hidden relative" style={{ backgroundColor: currentBoard.stampColor }}><input type="color" className="absolute inset-0 opacity-0 cursor-pointer" value={currentBoard.stampColor} onChange={(e) => setCurrentBoard({...currentBoard, stampColor: e.target.value})} /></div>
                                    <span className="text-[10px]">도장</span>
                                </div>
                            </div>
                        </div>
                        <div className="flex flex-col gap-3">
                            <label className="text-xs font-bold uppercase text-gray-400 font-gaegu">3. 도장 모양 설정</label>
                            <div className="flex gap-2">
                                <input className="w-10 h-10 border-2 border-black rounded text-center font-bold" value={currentBoard.isIconMode ? "" : currentBoard.stamp} onChange={(e) => setCurrentBoard({...currentBoard, stamp: e.target.value.slice(-2), isIconMode: false})} />
                                {['heart', 'star', 'check', 'smile'].map(icon => (
                                    <button key={icon} onClick={() => setCurrentBoard({...currentBoard, stamp: icon, isIconMode: true})} className={`w-10 h-10 flex items-center justify-center border-2 border-black rounded ${currentBoard.isIconMode && currentBoard.stamp === icon ? 'bg-black text-white' : 'bg-white'}`}><i data-lucide={icon} className="w-5 h-5"></i></button>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* 액션 버튼 (독립 배치) */}
                    <div className="flex gap-4 mt-8">
                        <button onClick={() => { setAlbum([...album, { ...currentBoard, id: Date.now() }]); alert("앨범에 저장되었습니다!"); }} className="doodle-button bg-white px-8 py-4 font-bold font-gaegu text-xl shadow-[4px_4px_0px_#000]">💾 ALBUM SAVE</button>
                        <button onClick={() => {
                            const { dones, ...safeData } = currentBoard;
                            const data = btoa(encodeURIComponent(JSON.stringify(safeData)));
                            navigator.clipboard.writeText(`${window.location.origin}${window.location.pathname}?data=${data}`).then(() => alert("공유 링크가 복사되었습니다!"));
                        }} className="doodle-button bg-black text-white px-8 py-4 font-bold font-gaegu text-xl shadow-[4px_4px_0px_rgba(0,0,0,0.3)]">🔗 SHARE LINK</button>
                    </div>

                    {/* 앨범 목록 */}
                    {album.length > 0 && (
                        <div className="w-full mt-16 p-6 border-t-2 border-dashed border-gray-200">
                            <h2 className="text-2xl font-bold font-gaegu mb-6 opacity-40 italic">My Collections</h2>
                            <div className="flex gap-4 overflow-x-auto pb-4 custom-scrollbar">
                                {album.map(b => (
                                    <div key={b.id} onClick={() => setCurrentBoard(b)} className="min-w-[120px] aspect-square bg-white border-2 border-black p-3 cursor-pointer shadow-[3px_3px_0px_#000] relative">
                                        <button onClick={(e) => { e.stopPropagation(); setAlbum(album.filter(i => i.id !== b.id)); }} className="absolute -top-2 -right-2 bg-red-500 text-white w-6 h-6 rounded-full text-xs">×</button>
                                        <div className="h-full flex flex-col items-center justify-center">
                                            <span className="text-2xl" style={{ color: b.stampColor }}>{b.isIconMode ? '●' : b.stamp}</span>
                                            <p className="text-xs font-bold mt-2 truncate w-full text-center">{b.title}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* 검색 모달 */}
                    {isSearchOpen && (
                        <div className="fixed inset-0 bg-white/98 z-[100] p-6 flex flex-col items-center font-gaegu">
                            <div className="w-full max-w-md">
                                <div className="flex justify-between items-center mb-6">
                                    <span className="text-3xl font-black">SEARCH</span>
                                    <div className="flex gap-2">
                                        <button onClick={() => setManualAdd(!manualAdd)} className="text-sm border-2 border-black px-2 py-1 rounded">직접 추가</button>
                                        <button onClick={() => setIsSearchOpen(false)} className="text-3xl">&times;</button>
                                    </div>
                                </div>
                                
                                {manualAdd ? (
                                    <div className="flex flex-col gap-4 border-4 border-black p-6 doodle-border">
                                        <input className="w-full border-b-2 border-black p-2 outline-none" placeholder="작품 제목" value={manualData.title} onChange={e => setManualData({...manualData, title: e.target.value})} />
                                        <input className="w-full border-b-2 border-black p-2 outline-none text-xs" placeholder="포스터 이미지 URL (선택)" value={manualData.poster} onChange={e => setManualData({...manualData, poster: e.target.value})} />
                                        <button onClick={handleManualSave} className="bg-black text-white p-3 font-bold">슬롯에 추가하기</button>
                                    </div>
                                ) : (
                                    <>
                                        <input className="w-full bg-white p-4 border-4 border-black text-xl mb-6 doodle-border" placeholder="무엇을 찾으시나요?" onChange={(e) => fetchSearchResults(e.target.value)} autoFocus />
                                        <div className="grid grid-cols-3 gap-4 overflow-y-auto max-h-[60vh] p-2">
                                            {results.map(d => (
                                                <div key={d.id} onClick={() => handleSelectContent(d)} className="cursor-pointer border-2 border-black p-1 hover:scale-105 transition-transform bg-white">
                                                    <img src={d.poster_path ? IMAGE_BASE + d.poster_path : 'https://via.placeholder.com/150x225?text=No+Image'} className="w-full aspect-[2/3] object-cover mb-1" />
                                                    <p className="text-[10px] font-bold truncate">{d.name || d.title}</p>
                                                </div>
                                            ))}
                                        </div>
                                    </>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function Slot({ data, isDone, onToggle, idx, stamp, stampColor, isIconMode, onClear, onSearch }) {
            return (
                <div onClick={() => data ? onToggle() : onSearch()} className="relative aspect-[3/4] bg-white border-2 border-black overflow-hidden cursor-pointer shadow-[3px_3px_0px_#000] group">
                    {data ? (
                        <>
                            <button onClick={(e) => { e.stopPropagation(); onClear(); }} className="absolute top-1 right-1 text-white z-20 drop-shadow-md opacity-0 group-hover:opacity-100">×</button>
                            {data.poster ? <img src={data.poster} className={`w-full h-full object-cover transition-all ${isDone ? 'opacity-100' : 'opacity-20 grayscale'}`} /> : <div className="w-full h-full bg-gray-50 flex items-center justify-center p-2 text-center text-xs font-bold">{data.title}</div>}
                            
                            <div className="absolute bottom-1.5 left-1.5 flex gap-0.5 z-10">
                                {data.otts?.map((url, i) => <img key={i} src={url} className="ott-badge" />)}
                            </div>

                            {(!isDone && data.poster) && <div className="absolute inset-0 flex items-center justify-center p-2 text-center text-sm font-bold font-gaegu">{data.title}</div>}
                            
                            {isDone && (
                                <div className="absolute bottom-1 right-1 animate-stamp z-30 pointer-events-none">
                                    <div className="border-2 p-1 bg-transparent" style={{ borderColor: stampColor }}>
                                        <div className="font-gaegu font-black text-2xl leading-none" style={{ color: stampColor }}>
                                            {isIconMode ? <i data-lucide={stamp} className="w-6 h-6 stroke-[3px]"></i> : <span>{stamp}</span>}
                                        </div>
                                    </div>
                                </div>
                            )}
                        </>
                    ) : <div className="h-full flex items-center justify-center text-gray-100 text-4xl hover:text-gray-300 transition-colors font-gaegu">+</div>}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
