<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도장격파 : Hand-drawn Edition</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #ffffff; color: #1a1a1a; font-family: 'Gaegu', cursive; -webkit-font-smoothing: antialiased; }
        .font-gaegu { font-family: 'Gaegu', cursive; }
        
        /* 슬라이더 검은색 테마 */
        input[type=range] { -webkit-appearance: none; background: #e5e7eb; border-radius: 10px; height: 6px; border: 1px solid #1a1a1a; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; background: #1a1a1a; border-radius: 50%; cursor: pointer; border: 1px solid #000; }

        @keyframes stamp-bang {
            0% { transform: scale(5) rotate(-45deg); opacity: 0; }
            100% { transform: scale(1) rotate(-12deg); opacity: 1; }
        }
        .animate-stamp { animation: stamp-bang 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        
        .doodle-border { border: 2.5px solid #1a1a1a; border-radius: 255px 15px 225px 15px/15px 225px 15px 255px; }
        .doodle-button { border: 2px solid #1a1a1a; border-radius: 10px 20px 10px 25px/15px 10px 25px 12px; transition: all 0.1s; cursor: pointer; }
        .doodle-button:active { transform: scale(0.97); }
        
        .palette-box { border: 2px solid #1a1a1a; border-radius: 4px; overflow: hidden; position: relative; width: 100%; height: 40px; }
        .palette-box input[type="color"] { position: absolute; top: -10px; left: -10px; width: 200%; height: 200%; cursor: pointer; opacity: 0; }

        /* 캡처 시 글자 짤림 방지 여백 */
        .capture-safe-area { padding: 40px !important; }
        .title-input { line-height: 1.5 !important; padding-top: 10px; padding-bottom: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const API_KEY = "291299eef434b2f459b25d72c4c667a1"; 
        const IMAGE_BASE = "https://image.tmdb.org/t/p/w500";
        const getCORSImageUrl = (url) => url ? `${url}?t=${new Date().getTime()}` : null;

        function App() {
            const boardRef = useRef(null);
            const [album, setAlbum] = useState(() => JSON.parse(localStorage.getItem('sb_album') || '[]'));
            const [currentBoard, setCurrentBoard] = useState(() => {
                const params = new URLSearchParams(window.location.search);
                const sharedData = params.get('data');
                if (sharedData) {
                    try { 
                        const parsed = JSON.parse(decodeURIComponent(atob(sharedData)));
                        // 공유받은 데이터에 앨범 정보가 섞이지 않도록 초기화
                        return { ...parsed, id: Date.now() }; 
                    } catch(e) { console.error(e); }
                }
                return {
                    id: Date.now(), title: "나의 드라마 정복기", author: "CHALLENGER", color: "#fefefe", 
                    stamp: "完", stampColor: "#e11d48", isIconMode: false, slots: Array(16).fill(null), dones: Array(16).fill(false)
                };
            });

            const [isSearchOpen, setIsSearchOpen] = useState(false);
            const [activeIndex, setActiveIndex] = useState(null);
            const [results, setResults] = useState([]);

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [currentBoard, results, isSearchOpen, album]);
            useEffect(() => { localStorage.setItem('sb_album', JSON.stringify(album)); }, [album]);

            const exportAsImage = async () => {
                if (!boardRef.current) return;
                await document.fonts.ready;

                const options = {
                    useCORS: true,
                    scale: 2,
                    backgroundColor: "#ffffff",
                    scrollX: 0,
                    scrollY: -window.scrollY,
                    onclone: (clonedDoc) => {
                        const board = clonedDoc.querySelector('.board-to-export');
                        if (board) {
                            board.style.transform = "none";
                            board.style.margin = "40px"; // 캡처본 테두리 잘림 방지용 여백
                            board.querySelectorAll('.delete-btn').forEach(btn => btn.style.display = 'none');
                            // 제목 줄간격 강제 확보
                            const title = board.querySelector('.title-input');
                            if(title) title.style.padding = "20px 0";
                        }
                    }
                };

                html2canvas(boardRef.current, options).then(canvas => {
                    const link = document.createElement("a");
                    link.href = canvas.toDataURL("image/png", 1.0);
                    link.download = `${currentBoard.title}.png`;
                    link.click();
                });
            };

            const shareLink = () => {
                // 중요: 앨범(album) 정보를 제외하고 현재 보드 설정만 공유
                const { id, ...shareableData } = currentBoard; 
                const dataToShare = { ...shareableData, dones: Array(currentBoard.slots.length).fill(false) };
                const encodedData = btoa(encodeURIComponent(JSON.stringify(dataToShare)));
                
                const url = `${window.location.origin}${window.location.pathname}?data=${encodedData}`;
                navigator.clipboard.writeText(url).then(() => alert("공유 링크가 복사되었습니다! (내 앨범은 공유되지 않습니다)"));
            };

            return (
                <div className="max-w-5xl mx-auto p-6 flex flex-col items-center pb-40">
                    <header className="py-8 flex justify-between items-end w-full max-w-2xl mb-12">
                        <h1 className="text-6xl font-black italic rotate-[-2deg] font-gaegu leading-none tracking-tighter">STAMP BREAK</h1>
                        <button onClick={() => setCurrentBoard({...currentBoard, id: Date.now(), title: "새로운 판", author: "YOUR NAME", slots: Array(16).fill(null), dones: Array(16).fill(false)})} className="doodle-button bg-gray-100 px-4 py-2 font-bold font-gaegu">+ NEW</button>
                    </header>

                    <div className="flex flex-col md:flex-row gap-10 items-start justify-center w-full">
                        {/* 사이드바 */}
                        <div className="flex flex-col gap-6 order-2 md:order-1 w-full md:w-64 p-6 bg-gray-50 rounded-xl border-2 border-black/5">
                            <div className="flex flex-col gap-2">
                                <label className="text-xs font-bold text-gray-400 flex justify-between uppercase"><span>Slots</span><span className="text-black">{currentBoard.slots.length}</span></label>
                                <input type="range" min="9" max="25" value={currentBoard.slots.length} onChange={(e) => {
                                    const newCount = parseInt(e.target.value);
                                    let newSlots = [...currentBoard.slots];
                                    let newDones = [...currentBoard.dones];
                                    if (newCount > currentBoard.slots.length) {
                                        newSlots = [...newSlots, ...Array(newCount - currentBoard.slots.length).fill(null)];
                                        newDones = [...newDones, ...Array(newCount - currentBoard.dones.length).fill(false)];
                                    } else {
                                        newSlots = newSlots.slice(0, newCount);
                                        newDones = newDones.slice(0, newCount);
                                    }
                                    setCurrentBoard({...currentBoard, slots: newSlots, dones: newDones});
                                }} />
                            </div>
                            <div className="flex gap-4">
                                <div className="flex-1 text-center">
                                    <label className="text-xs font-bold text-gray-400 uppercase block mb-1">Board</label>
                                    <div className="palette-box mx-auto" style={{ backgroundColor: currentBoard.color }}><input type="color" value={currentBoard.color} onChange={(e) => setCurrentBoard(prev => ({...prev, color: e.target.value}))} /></div>
                                </div>
                                <div className="flex-1 text-center">
                                    <label className="text-xs font-bold text-gray-400 uppercase block mb-1">Stamp</label>
                                    <div className="palette-box mx-auto" style={{ backgroundColor: currentBoard.stampColor }}><input type="color" value={currentBoard.stampColor} onChange={(e) => setCurrentBoard(prev => ({...prev, stampColor: e.target.value}))} /></div>
                                </div>
                            </div>
                            <div className="flex flex-col gap-2">
                                <label className="text-xs font-bold text-gray-400 uppercase">Stamp Style</label>
                                <div className="flex gap-2">
                                    <input className="w-12 h-10 bg-white border-2 border-black rounded-lg text-center font-bold text-xl font-gaegu" value={currentBoard.isIconMode ? "" : currentBoard.stamp} onChange={(e) => setCurrentBoard({...currentBoard, stamp: e.target.value.slice(-2), isIconMode: false})} />
                                    <div className="grid grid-cols-4 gap-1 bg-white p-1 rounded-md border border-black/10 flex-grow">
                                        {['check', 'heart', 'star', 'award', 'zap', 'flag', 'smile', 'circle'].map(icon => (
                                            <button key={icon} onClick={() => setCurrentBoard({...currentBoard, stamp: icon, isIconMode: true})} className={`w-7 h-7 flex items-center justify-center rounded ${currentBoard.isIconMode && currentBoard.stamp === icon ? 'bg-black text-white' : 'text-gray-300 hover:text-gray-500'}`}><i data-lucide={icon} className="w-4 h-4"></i></button>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* 도장판 본체 */}
                        <div className="order-1 md:order-2 flex-grow w-full max-w-3xl" ref={boardRef}>
                            <div style={{ backgroundColor: currentBoard.color }} className="board-to-export p-10 md:p-16 doodle-border border-[3px] border-black shadow-[10px_10px_0px_#000] rotate-[0.3deg]">
                                <div className="mb-6">
                                    <input className="title-input bg-transparent text-5xl font-bold w-full text-center outline-none border-b-2 border-black/10 focus:border-black/30 font-gaegu" style={{ color: getContrastColor(currentBoard.color) }} value={currentBoard.title} onChange={(e) => setCurrentBoard({...currentBoard, title: e.target.value})} />
                                </div>
                                <div className="flex items-center justify-center gap-2 text-sm font-bold opacity-60 mb-10">
                                    <span style={{ color: getContrastColor(currentBoard.color) }}>BY</span>
                                    <input className="bg-transparent border-b border-dashed border-black/30 w-32 text-center font-gaegu text-xl" style={{ color: getContrastColor(currentBoard.color) }} value={currentBoard.author} onChange={(e) => setCurrentBoard({...currentBoard, author: e.target.value.toUpperCase()})} />
                                </div>

                                <div className={`grid gap-5 ${currentBoard.slots.length <= 11 ? 'grid-cols-3' : currentBoard.slots.length <= 20 ? 'grid-cols-4' : 'grid-cols-5'}`}>
                                    {currentBoard.slots.map((slot, i) => (
                                        <Slot key={i} data={slot} isDone={currentBoard.dones[i]} idx={i} stamp={currentBoard.stamp} stampColor={currentBoard.stampColor} isIconMode={currentBoard.isIconMode} 
                                            onToggle={() => { const newDones = [...currentBoard.dones]; newDones[i] = !newDones[i]; setCurrentBoard({...currentBoard, dones: newDones}); }} 
                                            onSearch={() => { setActiveIndex(i); setIsSearchOpen(true); }} 
                                            onClear={(e) => { e.stopPropagation(); const newSlots = [...currentBoard.slots]; newSlots[i] = null; setCurrentBoard({...currentBoard, slots: newSlots}); }} 
                                        />
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* 하단 제어 및 앨범 */}
                    <div className="w-full max-w-2xl mt-20 flex flex-col gap-12">
                        <div className="grid grid-cols-3 gap-5">
                            <button onClick={() => { setAlbum([...album.filter(b => b.id !== currentBoard.id), currentBoard]); alert("저장되었습니다!"); }} className="doodle-button bg-white py-4 font-bold font-gaegu text-2xl shadow-[4px_4px_0px_#000]">SAVE</button>
                            <button onClick={exportAsImage} className="doodle-button bg-yellow-300 py-4 font-bold font-gaegu text-2xl shadow-[4px_4px_0px_#000]">DOWNLOAD</button>
                            <button onClick={shareLink} className="doodle-button bg-black text-white py-4 font-bold font-gaegu text-2xl shadow-[4px_4px_0px_#000]">SHARE</button>
                        </div>

                        {album.length > 0 && (
                            <div className="bg-gray-50 p-6 rounded-2xl border-2 border-black/5">
                                <h2 className="text-xs font-bold uppercase tracking-widest mb-6 opacity-40">My Album ({album.length})</h2>
                                <div className="flex gap-4 overflow-x-auto pb-4">
                                    {album.map(b => (
                                        <div key={b.id} onClick={() => setCurrentBoard(b)} className={`relative min-w-[110px] aspect-square bg-white border-2 border-black p-2 flex flex-col cursor-pointer transition-all ${currentBoard.id === b.id ? 'scale-105 shadow-[5px_5px_0px_#000]' : 'opacity-40 hover:opacity-100'}`}>
                                            <button onClick={(e) => { e.stopPropagation(); setAlbum(album.filter(item => item.id !== b.id)); }} className="absolute -top-2 -right-2 w-6 h-6 bg-black text-white rounded-full flex items-center justify-center text-xs z-10">×</button>
                                            <div className="flex-grow flex items-center justify-center text-2xl" style={{ color: b.stampColor }}>{b.isIconMode ? <i data-lucide={b.stamp} className="w-8 h-8"></i> : b.stamp}</div>
                                            <div className="text-[12px] font-bold truncate font-gaegu text-center border-t pt-1">{b.title}</div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>

                    {/* 검색창 (이전 기능 동일) */}
                    {isSearchOpen && (
                        <div className="fixed inset-0 bg-white/98 z-50 p-8 flex flex-col items-center">
                            <div className="w-full max-w-md">
                                <div className="flex justify-between items-center mb-10 font-gaegu text-4xl font-black"><span>FIND DRAMA</span><button onClick={() => setIsSearchOpen(false)}>&times;</button></div>
                                <input className="w-full bg-white p-5 border-[3px] border-black text-2xl mb-8 font-bold doodle-border font-gaegu" placeholder="제목을 입력하세요..." onChange={(e) => {
                                    const q = e.target.value;
                                    if(q.length > 1) {
                                        fetch(`https://api.themoviedb.org/3/search/tv?api_key=${API_KEY}&query=${q}&language=ko-KR`)
                                            .then(r => r.json()).then(data => setResults(data.results || []));
                                    }
                                }} autoFocus />
                                <div className="grid grid-cols-3 gap-3 overflow-y-auto max-h-[60vh]">
                                    {results.map(d => (
                                        <div key={d.id} onClick={() => { 
                                            const newSlots = [...currentBoard.slots]; 
                                            newSlots[activeIndex] = { title: d.name, poster: IMAGE_BASE + d.poster_path }; 
                                            setCurrentBoard({...currentBoard, slots: newSlots}); 
                                            setIsSearchOpen(false); 
                                        }} className="cursor-pointer bg-white p-1 border-2 border-black doodle-border shadow-[2px_2px_0px_#000]">
                                            <img src={getCORSImageUrl(IMAGE_BASE + d.poster_path)} crossOrigin="anonymous" className="w-full aspect-[2/3] object-cover" />
                                            <p className="text-[13px] font-bold font-gaegu truncate mt-1">{d.name}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function Slot({ data, isDone, onToggle, onSearch, onClear, stamp, stampColor, isIconMode, idx }) {
            const rot = [ -1.5, 1.2, -0.8, 1.5, -1.1, 0.9 ][idx % 6];
            return (
                <div onClick={() => data ? onToggle() : onSearch()} style={{ transform: `rotate(${rot}deg)` }} className="relative aspect-[3/4] bg-white border-2 border-black overflow-hidden cursor-pointer shadow-[3px_3px_0px_#000]">
                    {data ? (
                        <>
                            <button onClick={onClear} className="delete-btn absolute top-1 right-1 w-5 h-5 bg-black text-white rounded-full flex items-center justify-center text-[10px] z-30 opacity-0 hover:opacity-100 transition-opacity">×</button>
                            <img src={getCORSImageUrl(data.poster)} crossOrigin="anonymous" className={`w-full h-full object-cover ${isDone ? 'opacity-100' : 'opacity-15 grayscale'}`} />
                            {!isDone && (
                                <div className="absolute inset-0 flex flex-col items-center justify-center p-2 text-center pointer-events-none">
                                    <div className="text-[14px] font-bold text-black font-gaegu leading-tight">{data.title}</div>
                                </div>
                            )}
                            {isDone && (
                                <div className="absolute inset-0 flex items-center justify-center animate-stamp pointer-events-none z-10">
                                    <div className="border-[3px] bg-white/90 shadow-lg flex items-center justify-center min-w-[50px] min-h-[50px] rotate-[-12deg] p-1.5" style={{ borderColor: stampColor }}>
                                        <div className="flex items-center justify-center w-full h-full font-gaegu font-black text-3xl" style={{ color: stampColor }}>
                                            {isIconMode ? <i data-lucide={stamp} className="w-8 h-8 stroke-[3.5px]"></i> : <span>{stamp}</span>}
                                        </div>
                                    </div>
                                </div>
                            )}
                        </>
                    ) : <div className="h-full flex items-center justify-center text-gray-100 text-3xl font-gaegu">+</div>}
                </div>
            );
        }

        function getContrastColor(hex) {
            if(!hex) return "#1a1a1a";
            const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
            return ((r * 299) + (g * 587) + (b * 114)) / 1000 >= 128 ? "#1a1a1a" : "#ffffff";
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
