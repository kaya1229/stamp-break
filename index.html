<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도장격파 : Stamp Break Album</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0a0a0a; color: white; font-family: 'Noto Sans KR', sans-serif; }
        .font-serif { font-family: 'Noto Serif KR', serif; }
        input:focus { outline: none; }
        .custom-scrollbar::-webkit-scrollbar { height: 4px; width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#050505]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const API_KEY = "291299eef434b2f459b25d72c4c667a1"; 
        const IMAGE_BASE = "https://image.tmdb.org/t/p/w500";

        const getContrastColor = (hex) => {
            const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
            return ((r * 299) + (g * 587) + (b * 114)) / 1000 >= 128 ? "#1a1a1a" : "#ffffff";
        };

        function App() {
            // --- 데이터 상태 ---
            const [album, setAlbum] = useState(() => JSON.parse(localStorage.getItem('sb_album') || '[]'));
            const [currentBoard, setCurrentBoard] = useState(() => {
                const saved = localStorage.getItem('sb_current');
                return saved ? JSON.parse(saved) : {
                    id: Date.now(),
                    title: "새로운 정복기",
                    color: "#121212",
                    stamp: "完",
                    slots: Array(16).fill(null),
                    dones: Array(16).fill(false)
                };
            });

            const [isSearchOpen, setIsSearchOpen] = useState(false);
            const [activeIndex, setActiveIndex] = useState(null);
            const [query, setQuery] = useState("");
            const [results, setResults] = useState([]);
            const boardRef = useRef(null);

            // 로컬스토리지 자동 저장
            useEffect(() => {
                localStorage.setItem('sb_album', JSON.stringify(album));
                localStorage.setItem('sb_current', JSON.stringify(currentBoard));
            }, [album, currentBoard]);

            // URL 파라미터 읽기 (친구가 보낸 링크)
            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                if (params.get('shared')) {
                    const sharedData = {
                        id: Date.now(),
                        title: params.get('t'),
                        color: params.get('c'),
                        stamp: params.get('s'),
                        slots: JSON.parse(decodeURIComponent(params.get('sl'))),
                        dones: Array(16).fill(false) // 친구 기록은 무시
                    };
                    setCurrentBoard(sharedData);
                    window.history.replaceState({}, '', window.location.pathname);
                }
            }, []);

            const saveToAlbum = () => {
                const exists = album.find(b => b.id === currentBoard.id);
                if (exists) {
                    setAlbum(album.map(b => b.id === currentBoard.id ? currentBoard : b));
                } else {
                    setAlbum([...album, currentBoard]);
                }
                alert("앨범에 저장되었습니다!");
            };

            const shareBoard = () => {
                const url = new URL(window.location.href);
                url.searchParams.set('shared', 'true');
                url.searchParams.set('t', currentBoard.title);
                url.searchParams.set('c', currentBoard.color);
                url.searchParams.set('s', currentBoard.stamp);
                const simplifiedSlots = currentBoard.slots.map(s => s ? {n: s.title, p: s.poster} : null);
                url.searchParams.set('sl', encodeURIComponent(JSON.stringify(simplifiedSlots)));
                
                navigator.clipboard.writeText(url.toString()).then(() => alert("공유 링크 복사 완료! (내 도장 기록은 제외됩니다)"));
            };

            return (
                <div className="max-w-md mx-auto p-4 pb-48">
                    <header className="py-6 flex justify-between items-center">
                        <h1 className="text-2xl font-serif font-black text-red-600">STAMP BREAK</h1>
                        <button onClick={() => setCurrentBoard({id: Date.now(), title: "새 정복기", color: "#121212", stamp: "完", slots: Array(16).fill(null), dones: Array(16).fill(false)})} className="text-[10px] bg-zinc-800 px-3 py-1 rounded-full text-zinc-400">+ New</button>
                    </header>

                    {/* 도장판 */}
                    <div ref={boardRef} style={{ backgroundColor: currentBoard.color }} className="p-5 rounded-xl shadow-2xl transition-colors duration-500">
                        <div className="flex flex-col items-center mb-6 border-b border-white/10 pb-4 text-center">
                            <input 
                                className="bg-transparent text-xl font-serif font-black w-full text-center"
                                style={{ color: getContrastColor(currentBoard.color) }}
                                value={currentBoard.title}
                                onChange={(e) => setCurrentBoard({...currentBoard, title: e.target.value})}
                            />
                            <div className="text-red-600 font-serif font-bold text-lg">{currentBoard.stamp}</div>
                        </div>
                        <div className="grid grid-cols-4 gap-2">
                            {currentBoard.slots.map((slot, i) => (
                                <Slot 
                                    key={i} 
                                    data={slot} 
                                    isDone={currentBoard.dones[i]} 
                                    stamp={currentBoard.stamp}
                                    onToggle={() => {
                                        const newDones = [...currentBoard.dones];
                                        newDones[i] = !newDones[i];
                                        setCurrentBoard({...currentBoard, dones: newDones});
                                    }}
                                    onSearch={() => { setActiveIndex(i); setIsSearchOpen(true); }}
                                />
                            ))}
                        </div>
                    </div>

                    {/* 내 앨범 섹션 */}
                    <div className="mt-10">
                        <h2 className="text-xs font-bold text-zinc-500 uppercase tracking-widest mb-4 flex items-center gap-2">
                            <span className="w-2 h-2 bg-red-600 rounded-full"></span> My Album ({album.length})
                        </h2>
                        <div className="flex gap-3 overflow-x-auto pb-4 custom-scrollbar">
                            {album.map(b => (
                                <div key={b.id} onClick={() => setCurrentBoard(b)} className={`min-w-[100px] aspect-square rounded-lg border-2 cursor-pointer transition-all p-2 flex flex-col justify-between ${currentBoard.id === b.id ? 'border-red-600 bg-red-900/10' : 'border-zinc-800 bg-zinc-900'}`}>
                                    <div className="text-[8px] font-bold truncate leading-tight">{b.title}</div>
                                    <div className="flex justify-end"><span className="text-red-600 text-[10px] font-serif">{b.stamp}</span></div>
                                </div>
                            ))}
                            {album.length === 0 && <div className="text-[10px] text-zinc-700 italic px-2">저장된 판이 없습니다.</div>}
                        </div>
                    </div>

                    {/* 툴바 */}
                    <div className="fixed bottom-0 left-0 right-0 bg-black/80 backdrop-blur-xl border-t border-white/10 p-4 z-40">
                        <div className="max-w-md mx-auto grid grid-cols-2 gap-3">
                            <div className="flex items-center gap-3 bg-zinc-900 p-2 rounded-lg border border-white/5">
                                <div className="relative w-6 h-6 rounded-full border border-white/20" style={{backgroundColor: currentBoard.color}}>
                                    <input type="color" className="absolute inset-0 opacity-0 cursor-pointer" value={currentBoard.color} onChange={(e) => setCurrentBoard({...currentBoard, color: e.target.value})} />
                                </div>
                                <input className="w-8 bg-transparent text-center font-serif text-red-600" value={currentBoard.stamp} onChange={(e) => setCurrentBoard({...currentBoard, stamp: e.target.value.slice(-1)})} />
                            </div>
                            <button onClick={saveToAlbum} className="bg-zinc-100 text-black text-[10px] font-black rounded-lg">앨범에 저장</button>
                            <button onClick={shareBoard} className="bg-zinc-800 text-[10px] font-bold py-3 rounded-lg">🔗 링크 공유</button>
                            <button onClick={() => html2canvas(boardRef.current, {backgroundColor:null, scale:2, useCORS:true}).then(c => { const a=document.createElement('a'); a.download=`${currentBoard.title}.png`; a.href=c.toDataURL(); a.click(); })} className="bg-red-700 text-[10px] font-bold rounded-lg text-white">💾 이미지 저장</button>
                        </div>
                    </div>

                    {/* 검색창 (기능 동일) */}
                    {isSearchOpen && (
                        <div className="fixed inset-0 bg-black z-50 p-6 flex flex-col">
                            <div className="flex justify-between items-center mb-6"><span className="font-serif font-bold text-red-600">드라마 검색</span><button onClick={() => setIsSearchOpen(false)} className="text-2xl">&times;</button></div>
                            <input className="w-full bg-zinc-900 p-4 rounded-xl mb-6" placeholder="제목 입력..." onChange={(e) => {
                                const q = e.target.value;
                                if(q.length > 1) fetch(`https://api.themoviedb.org/3/search/tv?api_key=${API_KEY}&query=${q}&language=ko-KR`).then(r=>r.json()).then(d=>setResults(d.results||[]));
                            }} />
                            <div className="grid grid-cols-3 gap-3 overflow-y-auto">
                                {results.map(d => (
                                    <div key={d.id} onClick={() => {
                                        const newSlots = [...currentBoard.slots];
                                        newSlots[activeIndex] = { title: d.name, poster: IMAGE_BASE + d.poster_path };
                                        setCurrentBoard({...currentBoard, slots: newSlots});
                                        setIsSearchOpen(false);
                                    }} className="cursor-pointer">
                                        <img src={IMAGE_BASE + d.poster_path} className="rounded shadow-lg mb-1" />
                                        <p className="text-[8px] text-center truncate opacity-50">{d.name}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function Slot({ data, isDone, onToggle, onSearch, stamp }) {
            return (
                <div onClick={() => data ? onToggle() : onSearch()} className="relative aspect-[3/4] bg-zinc-900 rounded-lg overflow-hidden border border-white/5 cursor-pointer">
                    {data ? (
                        <>
                            <img src={data.poster} className={`w-full h-full object-cover transition-all duration-500 ${isDone ? 'grayscale-0 scale-105' : 'grayscale brightness-50'}`} />
                            {isDone && <div className="absolute inset-0 flex items-center justify-center"><div className="border-2 border-red-600 text-red-600 font-serif font-black text-xl p-1 rotate-[-15deg] bg-white/10 backdrop-blur-[2px] animate-bounce">{stamp}</div></div>}
                        </>
                    ) : <div className="h-full flex items-center justify-center text-white/5 text-xl">+</div>}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
